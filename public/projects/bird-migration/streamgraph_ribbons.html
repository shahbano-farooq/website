                    .on("click", function(event) {
                        event.stopPropagation();
                        selectedBirdRouteCode = r.code;
                        lastAutoDetailsRouteCode = r.code;
                        d3.select(this).raise();
                        showRouteInfo(r.code);
                    });
                const samplePath = g.append("path")
                    .attr("d", pathD)
                    .attr("fill", "none")
                    .attr("stroke", "transparent")
                    .attr("stroke-width", 14)
                    .attr("opacity", 0)
                    .style("pointer-events", "stroke");
                const node = samplePath.node();
                const length = node.getTotalLength();
                const visuals = { group: g, samplePath, node, length, seasonKey };

                if (seasonKey === "spring") {
                    const stem = g.append("path")
                        .attr("class", "bird-route-stem")
                        .attr("d", pathD)
                        .attr("fill", "none")
                        .attr("stroke", colorVal)
                        .attr("stroke-width", 0.9)
                        .attr("stroke-linecap", "round")
                        .attr("stroke-linejoin", "round");
                    applyDirectionStroke(stem, r.code);
                    let seed = 0;
                    for (let i = 0; i < (r.code + "").length; i++) seed = (seed * 31 + (r.code + "").charCodeAt(i)) >>> 0;
                    function rand() { seed = (1664525 * seed + 1013904223) >>> 0; return seed / 4294967296; }
                    const stitchSpacing = 14;
                    const stitchCount = Math.max(10, Math.floor(length / stitchSpacing));
                    const stitchEls = [];
                    for (let i = 1; i < stitchCount; i++) {
                        const len = (i / stitchCount) * length;
                        const p = node.getPointAtLength(len);
                        const p2 = node.getPointAtLength(Math.min(length, len + 1));
                        let dx = p2.x - p.x, dy = p2.y - p.y;
                        const mag = Math.sqrt(dx * dx + dy * dy) || 1;
                        dx /= mag; dy /= mag;
                        const perpX = -dy, perpY = dx;
                        const legLen = 5 + rand() * 1.2;
                        const spread = 3.2 + rand() * 1.0;
                        const tipX = p.x + perpX * ((rand() - 0.5) * 1.0);
                        const tipY = p.y + perpY * ((rand() - 0.5) * 1.0);
                        const leftX = tipX - dx * legLen + perpX * spread;
                        const leftY = tipY - dy * legLen + perpY * spread;
                        const rightX = tipX - dx * legLen - perpX * spread;
                        const rightY = tipY - dy * legLen - perpY * spread;
                        stitchEls.push(
                            g.append("path")
                                .attr("class", "bird-spring-stitch")
                                .attr("d", `M${leftX},${leftY} L${tipX},${tipY} L${rightX},${rightY}`)
                                .attr("fill", "none")
                                .attr("stroke", colorVal)
                                .attr("stroke-width", 0.75)
                                .attr("stroke-linecap", "round")
                                .attr("stroke-linejoin", "round")
                        );
                    }
                    visuals.kind = "spring";
                    visuals.stem = stem;
                    visuals.stitches = stitchEls;
                } else if (seasonKey === "summer") {
                    const outerW = 4.2;
                    const outer = g.append("path")
                        .attr("class", "bird-summer-outer")
                        .attr("d", pathD)
                        .attr("fill", "none")
                        .attr("stroke", colorVal)
                        .attr("stroke-width", outerW)
                        .attr("stroke-linecap", "round")
                        .attr("stroke-linejoin", "round");
                    applyDirectionStroke(outer, r.code);
                    const inner = g.append("path")
                        .attr("class", "bird-summer-inner")
                        .attr("d", pathD)
                        .attr("fill", "none")
                        .attr("stroke", "#f8f6f0")
                        .attr("stroke-width", Math.max(1, outerW - 2.2))
                        .attr("stroke-linecap", "round")
                        .attr("stroke-linejoin", "round");
                    const tickEls = [];
                    const tickColor = d3.interpolateRgb(colorVal, "#000000")(0.2);
                    const halfLen = outerW * 0.5;
                    const approxSpacing = Math.max(25, outerW * 3);
                    const tickCount = Math.floor(length / approxSpacing);
                    for (let i = 1; i < tickCount; i++) {
                        const l = (i / tickCount) * length;
                        const p = node.getPointAtLength(l);
                        const p2 = node.getPointAtLength(Math.min(length, l + 1));
                        const dx = p2.x - p.x, dy = p2.y - p.y;
                        const mag = Math.sqrt(dx * dx + dy * dy) || 1;
                        const nx = -dy / mag, ny = dx / mag;
                        tickEls.push(
                            g.append("line")
                                .attr("class", "bird-summer-tick")
                                .attr("x1", p.x - nx * halfLen)
                                .attr("y1", p.y - ny * halfLen)
                                .attr("x2", p.x + nx * halfLen)
                                .attr("y2", p.y + ny * halfLen)
                                .attr("stroke", tickColor)
                                .attr("stroke-width", 1.0)
                                .attr("opacity", 0.7)
                        );
                    }
                    visuals.kind = "summer";
                    visuals.outer = outer;
                    visuals.inner = inner;
                    visuals.ticks = tickEls;
                } else if (seasonKey === "autumn") {
                    const numSamples = 70;
                    const freq = 9;
                    const waveAmp = 0.42;
                    const pts = [];
                    const width = 6;
                    for (let i = 0; i <= numSamples; i++) {
                        const t = i / numSamples;
                        const len = t * length;
                        const p = node.getPointAtLength(len);
                        const p2 = node.getPointAtLength(Math.min(length, len + 2));
                        let dx = p2.x - p.x, dy = p2.y - p.y;
                        const mag = Math.sqrt(dx * dx + dy * dy) || 1;
                        dx /= mag; dy /= mag;
                        const perpX = -dy, perpY = dx;
                        const wave = 1 + waveAmp * Math.sin(t * Math.PI * freq);
                        const halfW = (width * 0.55 / 2) * wave;
                        pts.push([p.x + perpX * halfW, p.y + perpY * halfW]);
                        pts.unshift([p.x - perpX * halfW, p.y - perpY * halfW]);
                    }
                    const polygonD = "M" + pts.map(([x, y]) => `${x},${y}`).join("L") + "Z";
                    const fill = g.append("path")
                        .attr("class", "bird-autumn-fill")
                        .attr("d", polygonD)
                        .attr("fill", colorVal)
                        .attr("stroke", "none");
                    visuals.kind = "autumn";
                    visuals.fill = fill;
                } else if (seasonKey === "winter") {
                    const loopEls = [];
                    const loopSpacing = 8.8;
                    const loopCount = Math.max(14, Math.floor(length / loopSpacing));
                    const anchors = [];
                    for (let i = 0; i <= loopCount; i++) {
                        const len = (i / loopCount) * length;
                        const p = node.getPointAtLength(len);
                        anchors.push([p.x, p.y]);
                    }
                    for (let i = 0; i < anchors.length - 1; i++) {
                        const [x0, y0] = anchors[i];
                        const [x1, y1] = anchors[i + 1];
                        let dx = x1 - x0, dy = y1 - y0;
                        const mag = Math.sqrt(dx * dx + dy * dy) || 1;
                        dx /= mag; dy /= mag;
                        const perpX = -dy, perpY = dx;
                        const side = (i % 2 === 0) ? 1 : -1;
                        const depth = 4.3;
                        const mx = (x0 + x1) / 2;
                        const my = (y0 + y1) / 2;
                        const cOutX = mx + perpX * side * depth;
                        const cOutY = my + perpY * side * depth;
                        const cInX = mx - perpX * side * (depth * 0.55);
                        const cInY = my - perpY * side * (depth * 0.55);
                        const dLoop = `M${x0},${y0} Q${cOutX},${cOutY} ${x1},${y1} Q${cInX},${cInY} ${x0},${y0} Z`;
                        loopEls.push(
                            g.append("path")
                                .attr("class", "bird-winter-loop")
                                .attr("d", dLoop)
                                .attr("fill", "none")
                                .attr("stroke", colorVal)
                                .attr("stroke-width", 1.25)
                                .attr("stroke-linecap", "round")
                                .attr("stroke-linejoin", "round")
                        );
                    }
                    visuals.kind = "winter";
                    visuals.loops = loopEls;
                } else {
                    const stroke = g.append("path")
                        .attr("class", "bird-route-stroke")
                        .attr("d", pathD)
                        .attr("fill", "none")
                        .attr("stroke", colorVal)
                        .attr("stroke-width", 1.6)
                        .attr("stroke-linecap", "round")
                        .attr("stroke-linejoin", "round");
                    applyDirectionStroke(stroke, r.code);
                    visuals.kind = "default";
                    visuals.stroke = stroke;
                }

                const budPath = "M0,-3 C1.7,-2.2 2.5,-0.5 0,2.9 C-2.5,-0.5 -1.7,-2.2 0,-3 Z";
                const head = birdMapSVG.append("path")
                    .attr("d", budPath)
                    .attr("fill", r.color)
                    .attr("stroke", (d3.color(r.color) || d3.color("#444")).darker(0.45).toString())
                    .attr("stroke-width", 0.65)
                    .attr("opacity", 0.96);
                const tailSegCount = 14;
                const tailSegs = d3.range(tailSegCount).map(() => {
                    return birdMapSVG.append("line")
                        .attr("stroke", r.color)
                        .attr("stroke-linecap", "round")
                        .attr("opacity", 1);
                });
                const phaseOffset = (idx * Math.PI) / 5;
                return { ...r, ...visuals, head, tailSegs, pos: 0, phaseOffset };
            }

            function setBirdRouteVisualState(anim, inSpan, atPoint) {
                const isSelected = selectedBirdRouteCode === anim.code;
                const routeCol = d3.color(anim.color) || d3.color("#777");
                const activeStroke = routeCol.darker(0.8).toString();
                const spanStroke = routeCol.toString();
                const selectedStroke = "#9370db";
                const opacity = isSelected ? 1 : (atPoint ? 0.72 : (inSpan ? 0.28 : 0.10));
                if (anim.kind === "spring") {
                    const stroke = isSelected ? selectedStroke : (atPoint ? activeStroke : spanStroke);
                    anim.stem.attr("stroke", stroke).attr("stroke-width", isSelected ? 1.8 : 0.9).attr("opacity", opacity);
                    anim.stitches.forEach(s => s.attr("stroke", stroke).attr("stroke-width", isSelected ? 1.15 : 0.75).attr("opacity", opacity));
                } else if (anim.kind === "summer") {
                    anim.outer.attr("stroke", isSelected ? selectedStroke : (atPoint ? activeStroke : spanStroke)).attr("stroke-width", isSelected ? 5.2 : 4.2).attr("opacity", opacity);
                    anim.inner.attr("opacity", opacity * 0.95);
                    anim.ticks.forEach(t => t.attr("opacity", opacity * 0.9));
                } else if (anim.kind === "autumn") {
                    anim.fill
                        .attr("fill", isSelected ? spanStroke : (atPoint ? activeStroke : spanStroke))
                        .attr("stroke", isSelected ? selectedStroke : "none")
                        .attr("stroke-width", isSelected ? 2 : 0)
                        .attr("opacity", isSelected ? 0.9 : (atPoint ? 0.78 : (inSpan ? 0.34 : 0.12)));
                } else if (anim.kind === "winter") {
                    const stroke = isSelected ? selectedStroke : (atPoint ? activeStroke : spanStroke);
                    anim.loops.forEach(l => l.attr("stroke", stroke).attr("stroke-width", isSelected ? 1.9 : 1.25).attr("opacity", opacity));
                } else if (anim.stroke) {
                    anim.stroke.attr("stroke", isSelected ? selectedStroke : (atPoint ? activeStroke : spanStroke)).attr("stroke-width", isSelected ? 2.8 : 1.6).attr("opacity", opacity);
                }
            }

            // Precompute geometry for each route.
            const routeAnims = routes.map((r, idx) => buildBirdRouteVisual(r, idx));

            // Count records per year-month for this bird
            const countByYM = new Map();
            birdRows.forEach(d => {
                const y = +d["Migration start year"] || 0;
                const m = +d["Migration start month"] || 0;
                if (!y || !m) return;
                const ym = y * 100 + m;
                countByYM.set(ym, (countByYM.get(ym) || 0) + 1);
            });
            const globalYM = Array.from(countByYM.keys()).sort((a, b) => a - b);
            const minYM = globalYM.length ? globalYM[0] : null;
            const maxYM = globalYM.length ? globalYM[globalYM.length - 1] : null;

            // All year-months from start to end (every month in between)
            const allYearMonths = [];
            if (minYM != null && maxYM != null) {
                let y = Math.floor(minYM / 100), m = minYM % 100;
                const endY = Math.floor(maxYM / 100), endM = maxYM % 100;
                while (y < endY || (y === endY && m <= endM)) {
                    allYearMonths.push(y * 100 + m);
                    m++;
                    if (m > 12) { m = 1; y++; }
                }
            }

            const ymLabel = (v) => {
                const y = Math.floor(v / 100);
                const m = v % 100;
                const name = months[m - 1] || `M${m}`;
                return `${name} ${y}`;
            };

            // Route color for timeline squares (use first route's category)
            const timelineColor = routes.length ? routes[0].color : "#888";

            // Timeline bar sits a bit above the longitude axis, and the current
            // month/year label is shown at top-right (larger, grey).
            const timelineY = mapHeight - mapMargin.bottom - 28;
            const timelineText = birdMapSVG.append("text")
                .attr("x", mapWidth - mapMargin.right - 10)
                .attr("y", mapMargin.top + 16)
                .attr("text-anchor", "end")
                .attr("fill", "#7a7a7a")
                .attr("font-size", 16)
                .attr("font-weight", 700)
                .text(allYearMonths.length ? ymLabel(allYearMonths[0]) : "");

            // Timeline bar: grid of small squares (one per year-month)
            const tlX0 = mapMargin.left + 10;
            const tlX1 = mapWidth - mapMargin.right - 10;
            const tlW = tlX1 - tlX0;
            const tlH = 14;
            const tlY0 = timelineY - tlH / 2;
            const maxCount = Math.max(1, ...countByYM.values());

            const squareX = d3.scaleLinear()
                .domain([0, Math.max(1, allYearMonths.length - 1)])
                .range([tlX0, tlX1])
                .clamp(true);

            const squareSize = Math.max(2, Math.min(6, (tlW / Math.max(1, allYearMonths.length)) - 0.5));
            const colorScale = (count) => {
                if (count <= 0) return "#fff";
                const t = count / maxCount;
                const c = d3.color(timelineColor);
                if (!c) return timelineColor;
                return d3.interpolate(c.copy({ opacity: 0.35 }), c)(t).toString();
            };

            const squaresG = birdMapSVG.append("g")
                .attr("class", "bird-timeline-squares");
            squaresG.selectAll("rect")
                .data(allYearMonths)
                .join("rect")
                .attr("x", (ym, i) => squareX(i) - squareSize / 2)
                .attr("y", tlY0)
                .attr("width", squareSize)
                .attr("height", squareSize)
                .attr("fill", ym => colorScale(countByYM.get(ym) || 0))
                .attr("stroke", "#ddd")
                .attr("stroke-width", 0.5)
                .attr("rx", 0.5);

            // Labels at start, a few checkpoints, and end of the square timeline.
            const labelIdxCandidates = [
                0,
                Math.floor((allYearMonths.length - 1) * 0.33),
                Math.floor((allYearMonths.length - 1) * 0.66),
                Math.max(0, allYearMonths.length - 1)
            ];
            const labelIdx = Array.from(new Set(labelIdxCandidates)).filter(i => i >= 0 && i < allYearMonths.length);
            const labelG = birdMapSVG.append("g").attr("class", "bird-timeline-labels");
            labelG.selectAll("text")
                .data(labelIdx)
                .join("text")
                .attr("x", i => squareX(i) + (i === 0 ? 14 : 0))
                .attr("y", timelineY + 22)
                .attr("text-anchor", "middle")
                .attr("fill", "#666")
                .attr("font-size", 9)
                .text(i => ymLabel(allYearMonths[i]));

            // Copy of season pattern legend from main lat/long map.
            drawSeasonPatternLegendStatic(
                birdMapSVG,
                mapWidth - mapMargin.right - 136,
                mapHeight - mapMargin.bottom - 116
            );

            const playhead = birdMapSVG.append("circle")
                .attr("r", 4.2)
                .attr("cx", tlX0)
                .attr("cy", timelineY)
                .attr("fill", "#2a4b8d")
                .attr("opacity", 0.9);

            const FLIGHT_MS = 2400;
            const FADE_IN_MS = 220;
            const FADE_OUT_MS = 520;
            const FLIGHT_TOTAL_MS = FLIGHT_MS + FADE_IN_MS + FADE_OUT_MS;  // wait at data slots
            const QUICK_SLOT_MS = 80;   // fast advance across no-data months
            const tailLength = 55;
            const tailStep = 4.2;
            const wiggleAmp = 2.0;

            // Slot durations: long at data points (wait for flight), short at no-data
            const slotDurations = allYearMonths.map(ym => (countByYM.get(ym) || 0) > 0 ? FLIGHT_TOTAL_MS : QUICK_SLOT_MS);
            const slotStartTimes = [0];
            slotDurations.forEach((d, i) => slotStartTimes.push(slotStartTimes[i] + d));
            const totalTimelineMs = slotStartTimes[slotStartTimes.length - 1];

            // Quick source → destination "flight" animation per timepoint
            function spawnQuickFlight(anim) {
                if (!anim || !anim.node || !isFinite(anim.length) || anim.length <= 1) return;
                const iconSize = 20;
                // Inline SVG bird icon with spread/open wings (shallow V gull silhouette).
                const birdPath = "M -1.35,0.02 Q -0.7,-0.55 0,-0.18 Q 0.7,-0.55 1.35,0.02 Q 0.7,-0.02 0,0.22 Q -0.7,-0.02 -1.35,0.02 Z";

                // Small fading tail behind the bird (short + subtle)
                const tailSegCount = 6;
                const tailSegs = d3.range(tailSegCount).map(() => {
                    return birdMapSVG.append("line")
                        .attr("stroke", anim.color)
                        .attr("stroke-linecap", "round")
                        .attr("opacity", 0);
                });

                const birdG = birdMapSVG.append("g")
                    .attr("class", "quick-flight-bird")
                    .attr("opacity", 0)
                    .style("pointer-events", "none");

                // Bird path: light fill, route-color stroke
                const lightFill = d3.color(anim.color) ? d3.color(anim.color).copy({ opacity: 0.4 }) : "rgba(80,100,140,0.5)";
                birdG.append("path")
                    .attr("d", birdPath)
                    .attr("fill", lightFill)
                    .attr("stroke", anim.color)
                    .attr("stroke-width", 0.2)
                    .attr("stroke-linecap", "round")
                    .attr("stroke-linejoin", "round")
                    .attr("transform", `scale(${iconSize / 1.9})`)
                    .attr("opacity", 0.95);

                const cleanup = () => {
                    birdG.remove();
                    tailSegs.forEach(s => s.remove());
                };

                birdG.transition()
                    .duration(FADE_IN_MS)
                    .attr("opacity", 0.95)
                    .transition()
                    .duration(FLIGHT_MS)
                    .ease(d3.easeCubicInOut)
                    .tween("fly", () => {
                        const interpLen = d3.interpolateNumber(0, anim.length);
                        const tailLenPx = 28;     // short tail length
                        const tailStepPx = 5;     // compact sampling gap
                        const samples = Math.max(tailSegCount + 2, Math.floor(tailLenPx / tailStepPx));
                        const getAngleDeg = (headLen) => {
                            // Use forward tangent normally; switch to backward tangent near the end
                            // so the icon doesn't snap to a default vertical orientation.
                            const eps = 1.5;
                            if (headLen >= anim.length - eps) {
                                const p0 = anim.node.getPointAtLength(Math.max(0, headLen - eps));
                                const p1 = anim.node.getPointAtLength(headLen);
                                return (Math.atan2(p1.y - p0.y, p1.x - p0.x) * 180) / Math.PI;
                            }
                            const p0 = anim.node.getPointAtLength(headLen);
                            const p1 = anim.node.getPointAtLength(Math.min(anim.length, headLen + eps));
                            return (Math.atan2(p1.y - p0.y, p1.x - p0.x) * 180) / Math.PI;
                        };
                        return (t) => {
                            const headLen = interpLen(t);
                            const pBase = anim.node.getPointAtLength(headLen);
                            const angle = getAngleDeg(headLen);

                            // "Flap" illusion: slight oscillation in scale/tilt during flight
                            const flap = 1 + 0.10 * Math.sin(t * Math.PI * 10); // 5 flaps across flight
                            const flapY = 1 + 0.16 * Math.sin(t * Math.PI * 10 + Math.PI / 2);

                            birdG.attr("transform", `translate(${pBase.x},${pBase.y}) rotate(${angle + 90}) scale(${flap},${flapY})`);

                            // Tail points behind head
                            const pts = [];
                            for (let i = 0; i < samples; i++) {
                                const segLen = Math.max(0, headLen - i * tailStepPx);
                                const p = anim.node.getPointAtLength(segLen);
                                pts.push(p);
                            }
                            for (let i = 0; i < tailSegCount; i++) {
                                const p0 = pts[i];
                                const p1 = pts[i + 1] || pts[i];
                                const fade = i / Math.max(1, tailSegCount - 1);
                                const op = 0.26 * (1 - fade) + 0.02;
                                const sw = 1.35 * (1 - fade) + 0.35;
                                tailSegs[i]
                                    .attr("x1", p0.x).attr("y1", p0.y)
                                    .attr("x2", p1.x).attr("y2", p1.y)
                                    .attr("stroke-width", sw)
                                    .attr("opacity", op);
                            }
                        };
                    })
                    .transition()
                    .duration(FADE_OUT_MS)
                    .attr("opacity", 0)
                    .on("end", cleanup);
            }

            let lastIdx = -1;
            birdMapAnimTimer = d3.timer((elapsed) => {
                if (!allYearMonths.length) return;
                // Slot-based timing: wait for flight at data points, quick skip at no-data
                let idx, progressInSlot;
                if (elapsed >= totalTimelineMs) {
                    idx = allYearMonths.length - 1;
                    progressInSlot = 1;
                } else {
                    idx = 0;
                    while (idx < slotStartTimes.length - 1 && slotStartTimes[idx + 1] <= elapsed) idx++;
                    progressInSlot = (elapsed - slotStartTimes[idx]) / slotDurations[idx];
                }
                const curYM = allYearMonths[idx];
                timelineText.text(ymLabel(curYM));
                const playheadX = idx < allYearMonths.length - 1
                    ? squareX(idx) + progressInSlot * (squareX(idx + 1) - squareX(idx))
                    : squareX(idx);
                playhead.attr("cx", playheadX);

                // On entering a new month slot: spawn flights + sync details panel to a route animating now
                if (idx !== lastIdx) {
                    lastIdx = idx;
                    if ((countByYM.get(curYM) || 0) > 0) {
                        const active = routeAnims.filter(a => a.ymVals && a.ymVals.includes(curYM));
                        active.slice(0, 40).forEach(spawnQuickFlight);
                    }
                    const atPoint = a => a.ymVals && a.ymVals.includes(curYM);
                    const inSpan = a => a.minYM != null && a.maxYM != null && curYM >= a.minYM && curYM <= a.maxYM;
                    let pick = routeAnims.find(a => atPoint(a));
                    if (!pick) pick = routeAnims.find(a => inSpan(a));
                    if (pick && pick.code !== lastAutoDetailsRouteCode) {
                        lastAutoDetailsRouteCode = pick.code;
                        selectedBirdRouteCode = pick.code;
                        showRouteInfo(pick.code);
                    }
                }

                    routeAnims.forEach(anim => {
                        // Visibility of route based on whether this route spans the current YM
                        const inSpan = (anim.minYM != null && anim.maxYM != null && curYM >= anim.minYM && curYM <= anim.maxYM);
                        const atPoint = anim.ymVals && anim.ymVals.includes(curYM);
                        setBirdRouteVisualState(anim, inSpan, atPoint);

                        // Animate worm only during route's active span
                        if (!inSpan || anim.minYM == null || anim.maxYM == null || anim.maxYM === anim.minYM) {
                            anim.head.attr("opacity", 0);
                            anim.tailSegs.forEach(seg => seg.attr("opacity", 0));
                            return;
                        }

                        const localT = Math.max(0, Math.min(1, (curYM - anim.minYM) / (anim.maxYM - anim.minYM)));
                        const headLen = localT * anim.length;

                        const wigglePhase = (headLen / 40) + anim.phaseOffset;
                        const pHeadBase = anim.node.getPointAtLength(headLen);
                        const pAhead = anim.node.getPointAtLength(Math.min(anim.length, headLen + 1));
                        let dx = pAhead.x - pHeadBase.x, dy = pAhead.y - pHeadBase.y;
                        const headingDeg = (Math.atan2(dy, dx) * 180) / Math.PI;
                        const mag = Math.sqrt(dx * dx + dy * dy) || 1;
                        dx /= mag; dy /= mag;
                        const perpX = -dy, perpY = dx;
                        const wiggle = Math.sin(wigglePhase) * wiggleAmp;
                        const headX = pHeadBase.x + perpX * wiggle;
                        const headY = pHeadBase.y + perpY * wiggle;
                        anim.head
                            .attr("transform", `translate(${headX},${headY}) rotate(${headingDeg + 90})`)
                            .attr("opacity", 0.95);

                        const pts = [];
                        const samples = Math.floor(tailLength / tailStep);
                        for (let i = 0; i <= samples; i++) {
                            const segLen = Math.max(0, headLen - i * tailStep);
                            const pBase = anim.node.getPointAtLength(segLen);
                            const pFwd = anim.node.getPointAtLength(Math.min(anim.length, segLen + 1));
                            let sdx = pFwd.x - pBase.x, sdy = pFwd.y - pBase.y;
                            const smag = Math.sqrt(sdx * sdx + sdy * sdy) || 1;
                            sdx /= smag; sdy /= smag;
                            const sperpX = -sdy, sperpY = sdx;
                            const w = Math.sin(wigglePhase - i * 0.35) * (wiggleAmp * 0.85);
                            pts.push([pBase.x + sperpX * w, pBase.y + sperpY * w]);
                        }
                        for (let i = 0; i < anim.tailSegs.length; i++) {
                            const p0 = pts[i];
                            const p1 = pts[i + 1] || pts[i];
                            const tFade = i / (anim.tailSegs.length - 1);
                            const sw = 2.4 * (1 - tFade) + 0.7;
                            const op = 0.55 * (1 - tFade) + 0.05;
                            anim.tailSegs[i]
                                .attr("x1", p0[0]).attr("y1", p0[1])
                                .attr("x2", p1[0]).attr("y2", p1[1])
                                .attr("stroke-width", sw)
                                .attr("opacity", op);
                        }
                    });
            });

            // Title overlay
            birdMapSVG.append("text")
                .attr("x", mapMargin.left + 8)
                .attr("y", mapMargin.top + 14)
                .attr("fill", "#333")
                .attr("font-size", 12)
                .attr("font-weight", 600)
                .text(`${englishName} — routes over years`);
        }

        // Axes and grid
        const mapLayer = mapSVG.append("g").attr("class", "map-layer");
        // Geographic basemap layer (optional, toggled by checkbox)
        const geoLayer = mapSVG.append("g")
            .attr("class", "geo-layer")
            .attr("id", "map-geo-loupe-root");
        // Season → route pattern legend (drawn in updateMap, above temp legend)
        mapSVG.append("g").attr("class", "season-legend");
        // Group reserved for the temperature legend (drawn in updateMap)
        mapSVG.append("g").attr("class", "temp-legend");
        // Layer for map temperature blotches (always below routes)
        const cityTempLayer = mapSVG.append("g").attr("class", "city-temp-layer");

        function applyTemperatureLayerOpacity() {
            const op = temperatureLayerOpacity;
            if (!isFinite(op) || op < 0) return;
            cityTempLayer.attr("opacity", op);
            birdMapSVG.select(".bird-city-temp-layer").attr("opacity", op);
            d3.select("#details-winding").select(".details-temp-blotch-layer").attr("opacity", op);
        }

        const xAxis = d3.axisBottom(lonScale).ticks(8).tickFormat(d => `${d}°`);
        const mapYAxis = d3.axisLeft(latScale).ticks(6).tickFormat(d => `${d}°`);

        mapLayer.append("g")
            .attr("class", "x-axis")
            .attr("transform", `translate(0,${mapHeight - mapMargin.bottom})`)
            .call(xAxis);

        mapLayer.append("g")
            .attr("class", "y-axis")
            .attr("transform", `translate(${mapMargin.left},0)`)
            .call(mapYAxis);

        mapLayer.append("g")
            .attr("class", "grid-x")
            .attr("transform", `translate(0,${mapHeight - mapMargin.bottom})`)
            .call(
                d3.axisBottom(lonScale)
                    .ticks(8)
                    .tickSize(-(mapHeight - mapMargin.top - mapMargin.bottom))
                    .tickFormat("")
            );

        mapLayer.append("g")
            .attr("class", "grid-y")
            .attr("transform", `translate(${mapMargin.left},0)`)
            .call(
                d3.axisLeft(latScale)
                    .ticks(6)
                    .tickSize(-(mapWidth - mapMargin.left - mapMargin.right))
                    .tickFormat("")
            );

        mapLayer.selectAll(".grid-x .tick line, .grid-y .tick line")
            .attr("stroke", "#eee");

        // Axis labels
        mapLayer.append("text")
            .attr("x", (mapMargin.left + mapWidth - mapMargin.right) / 2)
            .attr("y", mapHeight - mapMargin.bottom + 24)
            .attr("text-anchor", "middle")
            .attr("font-size", "11px")
            .attr("fill", "#555")
            .text("Longitude (°)");

        mapLayer.append("text")
            .attr("transform", "rotate(-90)")
            .attr("x", -(mapMargin.top + (mapHeight - mapMargin.bottom)) / 2)
            .attr("y", mapMargin.left - 30)
            .attr("text-anchor", "middle")
            .attr("font-size", "11px")
            .attr("fill", "#555")
            .text("Latitude (°)");

        // Ribbons layers (above temperature blotches) – one group per season for fast toggling
        // id referenced by the focus+context loupe (<use href="#routes-layer-root">).
        const routesLayer = mapSVG.append("g")
            .attr("class", "routes-layer")
            .attr("id", "routes-layer-root");
        const seasonRouteLayers = {
            "Spring": routesLayer.append("g").attr("class", "routes-spring"),
            "Summer": routesLayer.append("g").attr("class", "routes-summer"),
            "Autumn": routesLayer.append("g").attr("class", "routes-autumn"),
            "Winter": routesLayer.append("g").attr("class", "routes-winter")
        };

        /**
         * Dual lens: (1) user-drawn lasso region = geographic magnifier (basemap + ribbons).
         * (2) fixed rectangle = directional flow summary with country labels.
         */
        let latLongLensArmed = false;
        /** @type {{ mini: object, fixed: {x,y,width,height} } | null} */
        let latLongLensPlaced = null;
        let latLongLoupeLassoDrawing = false;
        let latLongLoupeLassoPoints = [];
        let loupeLassoDrawHandlers = null;
        let latLongLoupeDragging = false;
        let latLongLoupeDragLast = null;
        let latLongLoupeRenderRaf = 0;
        let latLongLoupeChordPickData = [];
        const latLongLoupeLayer = mapSVG.append("g").attr("class", "lat-long-loupe-layer");
        const latLongLoupeStack = latLongLoupeLayer.append("g")
            .attr("class", "lat-long-loupe-stack")
            .style("display", "none")
            .style("pointer-events", "none");

        const latLongLoupeIcon = latLongLoupeLayer.append("g")
            .attr("class", "lat-long-loupe-icon")
            .attr("transform", `translate(${mapMargin.left + 1}, ${mapMargin.top + 2})`)
            .style("cursor", "pointer")
            .style("pointer-events", "all");
        latLongLoupeIcon.append("title")
            .text("Magnifier: draw a closed region on the map (return near the start to finish), then scroll or +/− to zoom. Click icon again to close.");
        latLongLoupeIcon.append("rect")
            .attr("class", "loupe-bg")
            .attr("x", 0).attr("y", 0)
            .attr("width", 34).attr("height", 30)
            .attr("rx", 6).attr("ry", 6);
        latLongLoupeIcon.append("circle")
            .attr("class", "loupe-glass")
            .attr("cx", 14).attr("cy", 12)
            .attr("r", 7);
        latLongLoupeIcon.append("line")
            .attr("class", "loupe-handle")
            .attr("x1", 19).attr("y1", 17)
            .attr("x2", 28).attr("y2", 26);

        function updateLatLongLoupeIconStyle() {
            latLongLoupeIcon
                .classed("loupe-armed", false)
                .classed("loupe-active", !!latLongLensPlaced)
                .classed("loupe-drawing", !!(latLongLoupeLassoDrawing && !latLongLensPlaced));
            mapSVG.style("cursor", latLongLoupeLassoDrawing && !latLongLensPlaced ? "crosshair" : null);
        }

        function cancelLoupeLassoDraw() {
            latLongLoupeLayer.selectAll(".loupe-lasso-draw-ui").remove();
            if (loupeLassoDrawHandlers) {
                window.removeEventListener("pointermove", loupeLassoDrawHandlers.move);
                window.removeEventListener("pointerup", loupeLassoDrawHandlers.up, true);
                window.removeEventListener("pointercancel", loupeLassoDrawHandlers.up, true);
                document.removeEventListener("keydown", loupeLassoDrawHandlers.key);
                loupeLassoDrawHandlers = null;
            }
            latLongLoupeLassoDrawing = false;
            latLongLoupeLassoPoints = [];
            updateLatLongLoupeIconStyle();
            renderDetailsDeclutterView();
        }

        function clearLatLongLoupe() {
            cancelLoupeLassoDraw();
            latLongLoupeChordPickData = [];
            latLongLensArmed = false;
            setMiniLensMapHover(null);
            latLongLensPlaced = null;
            latLongLoupeDragging = false;
            latLongLoupeDragLast = null;
            window.removeEventListener("pointermove", loupeWindowPointerMove);
            window.removeEventListener("pointerup", loupeWindowPointerEnd, true);
            window.removeEventListener("pointercancel", loupeWindowPointerEnd, true);
            if (latLongLoupeRenderRaf) cancelAnimationFrame(latLongLoupeRenderRaf);
            latLongLoupeRenderRaf = 0;
            mapSVG.select("defs").select("#lat-long-loupe-dim-mask").remove();
            mapSVG.select("defs").select("#lat-long-loupe-mag-clip").remove();
            latLongLoupeStack.style("display", "none");
            latLongLoupeStack.style("pointer-events", "none");
            latLongLoupeStack.selectAll("*").remove();
            updateLatLongLoupeIconStyle();
            renderDetailsDeclutterView();
        }

        function computeFixedLoupeLayout() {
            const width = 300;
            const height = 176;
            return {
                x: mapMargin.left + 10,
                y: mapHeight - mapMargin.bottom - height - 10,
                width,
                height
            };
        }

        function loupePolygonToPathD(pts) {
            if (!pts || pts.length < 3) return "";
            return "M" + pts.map(p => `${p[0]},${p[1]}`).join("L") + "Z";
        }

        function loupePolyBBox(pts) {
            let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
            (pts || []).forEach(([x, y]) => {
                x0 = Math.min(x0, x); y0 = Math.min(y0, y);
                x1 = Math.max(x1, x); y1 = Math.max(y1, y);
            });
            return { x0, y0, x1, y1 };
        }

        function loupePolyCentroid(pts) {
            if (!pts || !pts.length) return [0, 0];
            let sx = 0, sy = 0;
            pts.forEach(([x, y]) => { sx += x; sy += y; });
            const n = pts.length;
            return [sx / n, sy / n];
        }

        function loupePolyMaxRFromCentroid(pts, cx, cy) {
            let r = 8;
            (pts || []).forEach(([x, y]) => { r = Math.max(r, Math.hypot(x - cx, y - cy)); });
            return r;
        }

        function loupePointInPoly(x, y, poly) {
            if (!poly || poly.length < 3) return false;
            let inside = false;
            for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
                const xi = poly[i][0], yi = poly[i][1];
                const xj = poly[j][0], yj = poly[j][1];
                const inter = ((yi > y) !== (yj > y)) &&
                    (x < (xj - xi) * (y - yi) / ((yj - yi) || 1e-12) + xi);
                if (inter) inside = !inside;
            }
            return inside;
        }

        function loupePointToPolyEdgeDist(px, py, poly) {
            if (!poly || poly.length < 2) return Infinity;
            let best = Infinity;
            const n = poly.length;
            for (let i = 0; i < n; i++) {
                const j = (i + 1) % n;
                best = Math.min(best, loupeDistPointToSeg(px, py, poly[i][0], poly[i][1], poly[j][0], poly[j][1]));
            }
            return best;
        }

        function loupeSegSegHit(ax, ay, bx, by, cx, cy, dx, dy) {
            const den = (bx - ax) * (dy - cy) - (by - ay) * (dx - cx);
            if (Math.abs(den) < 1e-12) return false;
            const t = ((cx - ax) * (dy - cy) - (cy - ay) * (dx - cx)) / den;
            const u = ((cx - ax) * (by - ay) - (cy - ay) * (bx - ax)) / den;
            return t >= 0 && t <= 1 && u >= 0 && u <= 1;
        }

        function routeIntersectsLoupePolygon(coords, poly) {
            if (!poly || poly.length < 3 || !coords || coords.length < 2) return false;
            const bb = loupePolyBBox(poly);
            const pad = 6;
            for (let i = 0; i < coords.length; i++) {
                const x = coords[i][0], y = coords[i][1];
                if (x < bb.x0 - pad || x > bb.x1 + pad || y < bb.y0 - pad || y > bb.y1 + pad) continue;
                if (loupePointInPoly(x, y, poly)) return true;
            }
            for (let i = 0; i < coords.length - 1; i++) {
                const ax = coords[i][0], ay = coords[i][1], bx = coords[i + 1][0], by = coords[i + 1][1];
                if (!segmentIntersectsAABB(ax, ay, bx, by, bb.x0 - pad, bb.y0 - pad, bb.x1 + pad, bb.y1 + pad)) continue;
                for (let j = 0; j < poly.length; j++) {
                    const k = (j + 1) % poly.length;
                    if (loupeSegSegHit(ax, ay, bx, by, poly[j][0], poly[j][1], poly[k][0], poly[k][1])) return true;
                }
            }
            return false;
        }

        function routeIntersectsLoupeRegion(coords, mini) {
            if (!mini) return false;
            if (mini.kind === "lasso" && mini.points && mini.points.length >= 3)
                return routeIntersectsLoupePolygon(coords, mini.points);
            return routeIntersectsLoupeCircle(coords, mini.cx, mini.cy, mini.r || 46);
        }

        function loupeMiniPointInLens(mx, my, mini) {
            if (!mini) return false;
            if (mini.kind === "lasso" && mini.points && mini.points.length >= 3)
                return loupePointInPoly(mx, my, mini.points);
            return Math.hypot(mx - mini.cx, my - mini.cy) <= (mini.r || 46);
        }

        function loupeMiniTranslateLasso(m, dx, dy) {
            if (!m || m.kind !== "lasso" || !m.points) return;
            m.points = m.points.map(([x, y]) => [x + dx, y + dy]);
            m.cx += dx;
            m.cy += dy;
            m.bbox = loupePolyBBox(m.points);
            m.pathD = loupePolygonToPathD(m.points);
            m.r = loupePolyMaxRFromCentroid(m.points, m.cx, m.cy);
        }

        function clampLatLongLoupePosition() {
            if (!latLongLensPlaced || !latLongLensPlaced.mini) return;
            const m = latLongLensPlaced.mini;
            if (m.kind === "lasso" && m.points && m.points.length >= 3 && m.bbox) {
                const bb = m.bbox;
                let dx = 0, dy = 0;
                if (bb.x0 < mapMargin.left) dx = mapMargin.left - bb.x0;
                else if (bb.x1 > mapWidth - mapMargin.right) dx = (mapWidth - mapMargin.right) - bb.x1;
                if (bb.y0 < mapMargin.top) dy = mapMargin.top - bb.y0;
                else if (bb.y1 > mapHeight - mapMargin.bottom) dy = (mapHeight - mapMargin.bottom) - bb.y1;
                if (dx !== 0 || dy !== 0) loupeMiniTranslateLasso(m, dx, dy);
                return;
            }
            const pad = (m.r || 46) + 8;
            m.cx = Math.max(mapMargin.left + pad, Math.min(mapWidth - mapMargin.right - pad, m.cx));
            m.cy = Math.max(mapMargin.top + pad, Math.min(mapHeight - mapMargin.bottom - pad, m.cy));
        }

        /** Zoom factor for magnified <use> inside the mini lens (higher = more enlarged). */
        function adjustMiniLoupeScale(delta) {
            if (!latLongLensPlaced || !latLongLensPlaced.mini) return;
            const m = latLongLensPlaced.mini;
            const minS = 1.35, maxS = 4.6;
            m.scale = Math.max(minS, Math.min(maxS, (m.scale || 2.8) + delta));
            requestRenderLatLongLoupe();
        }

        function requestRenderLatLongLoupe() {
            if (latLongLoupeRenderRaf) return;
            latLongLoupeRenderRaf = requestAnimationFrame(() => {
                latLongLoupeRenderRaf = 0;
                renderLatLongLoupe();
            });
        }

        let loupeDragSuppressedClick = false;
        let loupePointerDownEl = null;
        let miniLensHoverRouteCode = null;

        function getMapRouteRibbonNode(routeCode) {
            const codeStr = String(routeCode);
            return mapSVG.selectAll(".route-ribbon").filter(function() {
                return this.getAttribute("data-route") === codeStr;
            }).node();
        }

        function setMiniLensMapHover(routeCode) {
            const next = routeCode != null ? String(routeCode) : null;
            if (next === miniLensHoverRouteCode) return;
            if (miniLensHoverRouteCode != null) {
                const prevNode = getMapRouteRibbonNode(miniLensHoverRouteCode);
                if (prevNode) d3.select(prevNode).classed("route-lens-hover", false).attr("transform", null);
            }
            miniLensHoverRouteCode = next;
            if (next != null) {
                const nextNode = getMapRouteRibbonNode(next);
                if (nextNode) {
                    const sel = d3.select(nextNode).classed("route-lens-hover", true);
                    try {
                        const bb = nextNode.getBBox();
                        const cx = bb.x + bb.width / 2;
                        const cy = bb.y + bb.height / 2;
                        const s = 1.12;
                        if (isFinite(cx) && isFinite(cy) && (bb.width > 0 || bb.height > 0))
                            sel.attr("transform", `translate(${cx},${cy}) scale(${s}) translate(${-cx},${-cy})`);
                    } catch (_) { /* leave transform unset */ }
                    sel.raise();
                }
                setLinkedRouteHover([next], { skipMapPurpleOverlay: true });
            } else {
                clearLinkedRouteHover();
            }
        }

        /** Point on rectangle edge toward (tx, ty) from rect center. */
        function loupeRectEdgeToward(fr, tx, ty) {
            const cx = fr.x + fr.width / 2, cy = fr.y + fr.height / 2;
            const dx = tx - cx, dy = ty - cy;
            const dist = Math.hypot(dx, dy) || 1;
            const ux = dx / dist, uy = dy / dist;
            const hw = fr.width / 2, hh = fr.height / 2;
            const txEdge = Math.abs(ux) < 1e-12 ? Infinity : hw / Math.abs(ux);
            const tyEdge = Math.abs(uy) < 1e-12 ? Infinity : hh / Math.abs(uy);
            const t = Math.min(txEdge, tyEdge);
            return [cx + ux * t, cy + uy * t];
        }

        function dualLoupeConnectorPath(state) {
            if (!state || !state.mini || !state.fixed) return "";
            const m = state.mini;
            const f = state.fixed;
            const dx = f.x + f.width / 2 - m.cx;
            const dy = f.y + f.height / 2 - m.cy;
            const dist = Math.hypot(dx, dy) || 1;
            const ux = dx / dist, uy = dy / dist;
            const x1 = m.cx + ux * m.r;
            const y1 = m.cy + uy * m.r;
            const [x2, y2] = loupeRectEdgeToward(f, m.cx, m.cy);
            return `M${x1},${y1} L${x2},${y2}`;
        }

        function loupeWindowPointerMove(event) {
            if (!latLongLoupeDragging || !latLongLensPlaced || !latLongLensPlaced.mini) return;
            event.preventDefault();
            const p = d3.pointer(event, mapSVG.node());
            const dx = p[0] - latLongLoupeDragLast[0];
            const dy = p[1] - latLongLoupeDragLast[1];
            if (Math.hypot(dx, dy) > 2) loupeDragSuppressedClick = true;
            latLongLoupeDragLast = p;
            const m = latLongLensPlaced.mini;
            if (m.kind === "lasso" && m.points) loupeMiniTranslateLasso(m, dx, dy);
            else {
                m.cx += dx;
                m.cy += dy;
            }
            clampLatLongLoupePosition();
            requestRenderLatLongLoupe();
        }

        function loupeWindowPointerEnd(event) {
            if (!latLongLoupeDragging) return;
            latLongLoupeDragging = false;
            latLongLoupeDragLast = null;
            latLongLoupeStack.select(".loupe-mini-wrap .loupe-drag-hit").style("cursor", "default");
            if (loupePointerDownEl && event && event.pointerId != null) {
                try { loupePointerDownEl.releasePointerCapture(event.pointerId); } catch (_) { /* ignore */ }
            }
            loupePointerDownEl = null;
            window.removeEventListener("pointermove", loupeWindowPointerMove);
            window.removeEventListener("pointerup", loupeWindowPointerEnd, true);
            window.removeEventListener("pointercancel", loupeWindowPointerEnd, true);
            renderLatLongLoupe();
            setTimeout(() => { loupeDragSuppressedClick = false; }, 0);
        }

        function loupeDistPointToSeg(px, py, x1, y1, x2, y2) {
            const dx = x2 - x1, dy = y2 - y1;
            const len2 = dx * dx + dy * dy;
            if (len2 < 1e-12) return Math.hypot(px - x1, py - y1);
            let t = ((px - x1) * dx + (py - y1) * dy) / len2;
            t = Math.max(0, Math.min(1, t));
            const qx = x1 + t * dx, qy = y1 + t * dy;
            return Math.hypot(px - qx, py - qy);
        }

        /** Rim band (px): grab near polygon edge or circle rim to drag the lens. */
        function loupeMiniDragEdgePx(m) {
            if (m && m.kind === "lasso" && m.points && m.points.length >= 3) {
                const closed = m.points.concat([m.points[0]]);
                const perim = polylineArcLength(closed);
                return Math.max(12, Math.min(22, Math.max(40, perim) * 0.035));
            }
            return Math.max(10, Math.min(18, (m.r || 46) * 0.24));
        }

        function routeVisibleOnLoupe(routeCode) {
            if (selectedSeason === "All") return true;
            const meta = getRouteMeta(routeCode);
            if (!meta) return true;
            return meta.season === selectedSeason;
        }

        function routeCoordsForLoupe(routeCode, arr) {
            const order = { "Origin": 1, "Transit locations": 2, "Destination": 3 };
            const pts = arr.filter(d => d.GPS_xx != null && d.GPS_yy != null).sort((a, b) => {
                const oa = (order[(a["Migration nodes"] || "").trim()] || 99);
                const ob = (order[(b["Migration nodes"] || "").trim()] || 99);
                if (oa !== ob) return oa - ob;
                return (a["Migration start year"] || 0) * 100 + (a["Migration start month"] || 0) -
                    (b["Migration start year"] || 0) * 100 - (b["Migration start month"] || 0);
            });
            if (pts.length < 2) return null;
            const coordsBase = pts.map(d => mapProjection([+d.GPS_xx, +d.GPS_yy]));
            const jitterSeed = (routeCode + "").split("").reduce((h, ch) => ((h << 5) - h) + ch.charCodeAt(0), 0);
            const jitterAngle = (Math.abs(jitterSeed) % 360) * Math.PI / 180;
            const jitterMag = 3;
            const jx = Math.cos(jitterAngle) * jitterMag;
            const jy = Math.sin(jitterAngle) * jitterMag;
            return coordsBase.map(([x, y]) => [x + jx, y + jy]);
        }

        function segmentIntersectsAABB(x1, y1, x2, y2, L, T, R, B) {
            const dx = x2 - x1, dy = y2 - y1;
            let u0 = 0, u1 = 1;
            function clip(p, q) {
                if (Math.abs(p) < 1e-12) return q >= 0;
                const r = q / p;
                if (p < 0) {
                    if (r > u1) return false;
                    if (r > u0) u0 = r;
                } else {
                    if (r < u0) return false;
                    if (r < u1) u1 = r;
                }
                return true;
            }
            if (!clip(-dx, x1 - L)) return false;
            if (!clip(dx, R - x1)) return false;
            if (!clip(-dy, y1 - T)) return false;
            if (!clip(dy, B - y1)) return false;
            return u0 <= u1;
        }

        function routeIntersectsLoupeCircle(coords, cx, cy, r) {
            const e = 4;
            const rr = r + e;
            for (let i = 0; i < coords.length; i++) {
                if (Math.hypot(coords[i][0] - cx, coords[i][1] - cy) <= rr) return true;
            }
            for (let i = 0; i < coords.length - 1; i++) {
                const [x1, y1] = coords[i], [x2, y2] = coords[i + 1];
                const d = loupeDistPointToSeg(cx, cy, x1, y1, x2, y2);
                if (d <= rr) return true;
            }
            return false;
        }

        /** Segment–circle intersections (points on the segment, inclusive). */
        function loupeSegmentCircleIntersections(ax, ay, bx, by, cx, cy, r) {
            const dx = bx - ax, dy = by - ay;
            const fx = ax - cx, fy = ay - cy;
            const a = dx * dx + dy * dy;
            const b = 2 * (fx * dx + fy * dy);
            const c = fx * fx + fy * fy - r * r;
            const disc = b * b - 4 * a * c;
            if (disc < 0 || a < 1e-14) return [];
            const sqrtD = Math.sqrt(Math.max(0, disc));
            const t1 = (-b - sqrtD) / (2 * a);
            const t2 = (-b + sqrtD) / (2 * a);
            const out = [];
            for (const t of [t1, t2]) {
                if (t >= -1e-8 && t <= 1 + 1e-8) {
                    out.push([ax + t * dx, ay + t * dy]);
                }
            }
            if (out.length === 2 && Math.hypot(out[0][0] - out[1][0], out[0][1] - out[1][1]) < 1e-6) return [out[0]];
            return out.sort((p, q) => Math.hypot(p[0] - ax, p[1] - ay) - Math.hypot(q[0] - ax, q[1] - ay));
        }

        /** Clip a polyline to the interior of a disk (map space). */
        function clipPolylineToDisk(coords, cx, cy, r) {
            if (!coords || coords.length < 2) return null;
            const rr = r * r;
            const inside = p => {
                const dx = p[0] - cx, dy = p[1] - cy;
                return dx * dx + dy * dy <= rr + 1e-5;
            };
            const pts = [];
            function add(p) {
                if (!pts.length) { pts.push([p[0], p[1]]); return; }
                const last = pts[pts.length - 1];
                if (Math.hypot(p[0] - last[0], p[1] - last[1]) > 1e-5) pts.push([p[0], p[1]]);
            }
            for (let i = 0; i < coords.length - 1; i++) {
                const ax = coords[i][0], ay = coords[i][1];
                const bx = coords[i + 1][0], by = coords[i + 1][1];
                const Ain = inside(coords[i]), Bin = inside(coords[i + 1]);
                if (Ain && Bin) {
                    if (!pts.length) add(coords[i]);
                    add(coords[i + 1]);
                } else if (Ain && !Bin) {
                    const inter = loupeSegmentCircleIntersections(ax, ay, bx, by, cx, cy, r);
                    if (!pts.length) add(coords[i]);
                    if (inter.length) add(inter[inter.length - 1]);
                } else if (!Ain && Bin) {
                    const inter = loupeSegmentCircleIntersections(ax, ay, bx, by, cx, cy, r);
                    if (inter.length) add(inter[0]);
                    add(coords[i + 1]);
                } else {
                    const inter = loupeSegmentCircleIntersections(ax, ay, bx, by, cx, cy, r);
                    if (inter.length >= 2) {
                        add(inter[0]);
                        add(inter[inter.length - 1]);
                    }
                }
            }
            return pts.length >= 2 ? pts : null;
        }

        function polylineArcLength(pts) {
            let L = 0;
            for (let i = 1; i < pts.length; i++) {
                L += Math.hypot(pts[i][0] - pts[i - 1][0], pts[i][1] - pts[i - 1][1]);
            }
            return L;
        }

        /** Evenly sample n points along a polyline (first and last included). */
        function resamplePolyline(pts, n) {
            if (!pts || pts.length < 2) return pts ? pts.slice() : [];
            const total = polylineArcLength(pts);
            if (total < 1e-9) return [pts[0].slice(), pts[pts.length - 1].slice()];
            const nSeg = Math.max(2, n);
            const out = [];
            let acc = 0;
            let segIdx = 0;
            let segLen = Math.hypot(pts[1][0] - pts[0][0], pts[1][1] - pts[0][1]);
            for (let k = 0; k < nSeg; k++) {
                const target = (k / (nSeg - 1)) * total;
                let t = target;
                while (t - acc > segLen + 1e-9 && segIdx < pts.length - 2) {
                    acc += segLen;
                    segIdx++;
                    segLen = Math.hypot(pts[segIdx + 1][0] - pts[segIdx][0], pts[segIdx + 1][1] - pts[segIdx][1]);
                }
                const u = segLen > 1e-12 ? (t - acc) / segLen : 0;
                const x = pts[segIdx][0] + u * (pts[segIdx + 1][0] - pts[segIdx][0]);
                const y = pts[segIdx][1] + u * (pts[segIdx + 1][1] - pts[segIdx][1]);
                out.push([x, y]);
            }
            return out;
        }

        function loupeOriginDestCountries(arr) {
            const o = arr.find(d => (d["Migration nodes"] || "").trim() === "Origin");
            const d = arr.find(d => (d["Migration nodes"] || "").trim() === "Destination");
            const oCountry = String(o?.["Countries"] || o?.["Country"] || "").trim() || "—";
            const dCountry = String(d?.["Countries"] || d?.["Country"] || "").trim() || "—";
            return { oCountry, dCountry };
        }

        function loupeTruncateFlowLabel(s, n) {
            const t = String(s || "").trim() || "—";
            return t.length > n ? t.slice(0, Math.max(0, n - 1)) + "…" : t;
        }

        function polylineCumulativeLengths(pts) {
            const cum = [0];
            for (let i = 1; i < pts.length; i++) {
                cum.push(cum[i - 1] + Math.hypot(pts[i][0] - pts[i - 1][0], pts[i][1] - pts[i - 1][1]));
            }
            return cum;
        }

        /**
         * Map clipped map-space polyline into a horizontal band: flow axis encodes migration progress;
         * extent along flow is (routeLength / maxLength) * band inner span (longest route uses full span).
         */
        function mapRoutePolylineToBandFlow(pts, dir, band, laneIndex, nLanes, Lmax) {
            const L = polylineArcLength(pts);
            if (L < 1e-9) return [];
            const cum = polylineCumulativeLengths(pts);
            const pad = 5;
            const innerX0 = band.x + pad;
            const innerY0 = band.y + pad;
            const innerW = band.w - 2 * pad;
            const innerH = band.h - 2 * pad;
            const nl = Math.max(1, nLanes);
            let mx = 0, my = 0;
            pts.forEach(p => { mx += p[0]; my += p[1]; });
            mx /= pts.length;
            my /= pts.length;
            const out = [];

            if (dir === "North to South") {
                let maxDev = 0;
                pts.forEach(p => { maxDev = Math.max(maxDev, Math.abs(p[0] - mx)); });
                const k = maxDev > 1e-6 ? (innerW / nl * 0.4) / maxDev : 0;
                const laneCenterX = innerX0 + (laneIndex + 0.5) * (innerW / nl);
                for (let i = 0; i < pts.length; i++) {
                    const si = cum[i];
                    const px = laneCenterX + (pts[i][0] - mx) * k;
                    const py = innerY0 + (si / Lmax) * innerH;
                    out.push({ x: px, y: py });
                }
            } else if (dir === "South to North") {
                let maxDev = 0;
                pts.forEach(p => { maxDev = Math.max(maxDev, Math.abs(p[0] - mx)); });
                const k = maxDev > 1e-6 ? (innerW / nl * 0.4) / maxDev : 0;
                const laneCenterX = innerX0 + (laneIndex + 0.5) * (innerW / nl);
                const bottomY = innerY0 + innerH;
                for (let i = 0; i < pts.length; i++) {
                    const si = cum[i];
                    const px = laneCenterX + (pts[i][0] - mx) * k;
                    const py = bottomY - (si / Lmax) * innerH;
                    out.push({ x: px, y: py });
                }
            } else if (dir === "East to West") {
                let maxDev = 0;
                pts.forEach(p => { maxDev = Math.max(maxDev, Math.abs(p[1] - my)); });
                const k = maxDev > 1e-6 ? (innerH / nl * 0.4) / maxDev : 0;
                const laneCenterY = innerY0 + (laneIndex + 0.5) * (innerH / nl);
                for (let i = 0; i < pts.length; i++) {
                    const si = cum[i];
                    const px = innerX0 + (si / Lmax) * innerW;
                    const py = laneCenterY + (pts[i][1] - my) * k;
                    out.push({ x: px, y: py });
                }
            } else if (dir === "West to East") {
                let maxDev = 0;
                pts.forEach(p => { maxDev = Math.max(maxDev, Math.abs(p[1] - my)); });
                const k = maxDev > 1e-6 ? (innerH / nl * 0.4) / maxDev : 0;
                const laneCenterY = innerY0 + (laneIndex + 0.5) * (innerH / nl);
                const rightX = innerX0 + innerW;
                for (let i = 0; i < pts.length; i++) {
                    const si = cum[i];
                    const px = rightX - (si / Lmax) * innerW;
                    const py = laneCenterY + (pts[i][1] - my) * k;
                    out.push({ x: px, y: py });
                }
            }
            return out;
        }

        /**
         * Fixed rectangle lens with shared country anchors:
         * - origin countries are shown once on top
         * - destination countries are shown once at bottom
         * - each route goes from its origin anchor to destination anchor
         * - route length in mini lens controls the solid portion; remaining part is faded
         * @param {{ x,y,width,height }} st
         * @param {{ miniFilter?: {cx,cy,r}, useAllVisible?: boolean }} options
         */
        function drawLoupeDirectionalRectLens(drawLayer, st, options) {
            options = options || {};
            const useAllVisible = !!options.useAllVisible;
            const miniFilter = options.miniFilter;
            const targetSvg = options.targetSvg || mapSVG;
            const onRouteClick = typeof options.onRouteClick === "function" ? options.onRouteClick : null;
            const showCaption = options.showCaption !== false;
            drawLayer.selectAll(".loupe-unbundle-root").remove();
            latLongLoupeChordPickData = [];
            const stCx = st.x + st.width / 2;
            const stCy = st.y + st.height / 2;
            const stR = Math.min(st.width, st.height) / 2;

            const candidates = [];
            const visiblePool = [];
            Object.keys(dataByRoute).forEach(routeCode => {
                if (!routeVisibleOnLoupe(routeCode)) return;
                const arr = dataByRoute[routeCode];
                const meta = getRouteMeta(routeCode);
                const raw = routeCoordsForLoupe(routeCode, arr);
                if (!raw) return;
                const cat = meta
                    ? meta.category
                    : (arr[0] && (arr[0]["Bird Category"] || arr[0]["bird families"] || arr[0]["english name"])) || "Unknown";
                const item = { routeCode, colorVal: color(cat), raw, arr };
                if (miniFilter) {
                    visiblePool.push(item);
                    if (routeIntersectsLoupeRegion(raw, miniFilter)) candidates.push(item);
                } else if (useAllVisible) {
                    candidates.push(item);
                } else {
                    visiblePool.push(item);
                    if (routeIntersectsLoupeCircle(raw, stCx, stCy, stR)) candidates.push(item);
                }
            });
            if (!candidates.length) candidates.push(...visiblePool);
            if (!candidates.length) return;
            candidates.sort((a, b) => String(a.routeCode).localeCompare(String(b.routeCode), void 0, { numeric: true }));

            const MAX_ROUTES = 48;
            const list = candidates.slice(0, MAX_ROUTES);
            const m = miniFilter;
            if (!m || !m.r) return;

            const prepared = [];
            let Lmax = 0;
            list.forEach(c => {
                const clipped = clipPolylineToDisk(c.raw, m.cx, m.cy, m.r);
                if (!clipped || clipped.length < 2) return;
                const L = polylineArcLength(clipped);
                if (L < 1e-6) return;
                const od = loupeOriginDestCountries(c.arr);
                const meta = getRouteMeta(c.routeCode);
                prepared.push({
                    routeCode: c.routeCode,
                    colorVal: c.colorVal,
                    clipped,
                    length: L,
                    season: meta ? meta.season : monthToSeason((c.arr && c.arr[0] && c.arr[0]["Migration start month"]) || null),
                    oCountry: od.oCountry,
                    dCountry: od.dCountry
                });
                Lmax = Math.max(Lmax, L);
            });
            if (!prepared.length || Lmax < 1e-9) return;

            const srcCountries = Array.from(new Set(prepared.map(r => r.oCountry))).sort((a, b) => a.localeCompare(b));
            const dstCountries = Array.from(new Set(prepared.map(r => r.dCountry))).sort((a, b) => a.localeCompare(b));
            const srcY = d3.scalePoint().domain(srcCountries).range([st.y + 26, st.y + st.height - 16]).padding(0.55);
            const dstY = d3.scalePoint().domain(dstCountries).range([st.y + 26, st.y + st.height - 16]).padding(0.55);

            const xLeft = st.x + 24;
            const xRight = st.x + st.width - 24;
            const xSpan = Math.max(10, xRight - xLeft);

            const root = drawLayer.append("g").attr("class", "loupe-unbundle-root");
            const clipId = "loupe-fixed-unbundle-clip";
            const defs = targetSvg.select("defs");
            if (!defs.empty()) {
                defs.select("#" + clipId).remove();
                defs.append("clipPath").attr("id", clipId)
                    .append("rect")
                    .attr("x", st.x + 0.5)
                    .attr("y", st.y + 0.5)
                    .attr("width", Math.max(0, st.width - 1))
                    .attr("height", Math.max(0, st.height - 1));
            }
            const routesG = root.append("g")
                .attr("class", "loupe-unbundle-routes")
                .attr("clip-path", defs.empty() ? null : `url(#${clipId})`);
            const labelsG = root.append("g")
                .attr("class", "loupe-rect-country-labels")
                .attr("clip-path", defs.empty() ? null : `url(#${clipId})`);

            const lineGen = d3.line()
                .curve(d3.curveCatmullRom.alpha(0.6))
                .x(d => d.x)
                .y(d => d.y);

            labelsG.append("text")
                .attr("class", "loupe-unbundle-caption")
                .attr("x", st.x + 8)
                .attr("y", st.y + 11)
                .attr("text-anchor", "start")
                .text("Source");
            labelsG.append("text")
                .attr("class", "loupe-unbundle-caption")
                .attr("x", st.x + st.width - 8)
                .attr("y", st.y + 11)
                .attr("text-anchor", "end")
                .text("Destination");

            srcCountries.forEach(cn => {
                labelsG.append("text")
                    .attr("class", "loupe-rect-flow-label")
                    .attr("x", st.x + 6)
                    .attr("y", srcY(cn))
                    .attr("text-anchor", "start")
                    .attr("dominant-baseline", "middle")
                    .text(loupeTruncateFlowLabel(cn, 15));
            });
            dstCountries.forEach(cn => {
                labelsG.append("text")
                    .attr("class", "loupe-rect-flow-label loupe-rect-label-dest")
                    .attr("x", st.x + st.width - 6)
                    .attr("y", dstY(cn))
                    .attr("text-anchor", "end")
                    .attr("dominant-baseline", "middle")
                    .text(loupeTruncateFlowLabel(cn, 15));
            });

            const pairLane = new Map();
            const pairCount = new Map();
            prepared.forEach(r => {
                const k = r.oCountry + "->" + r.dCountry;
                pairCount.set(k, (pairCount.get(k) || 0) + 1);
            });
            const pairSeen = new Map();
            prepared.forEach(r => {
                const k = r.oCountry + "->" + r.dCountry;
                const idx = pairSeen.get(k) || 0;
                pairSeen.set(k, idx + 1);
                const n = pairCount.get(k) || 1;
                pairLane.set(r.routeCode, idx - (n - 1) / 2);
            });

            const sw = Math.max(1.1, Math.min(2.4, 3.0 - prepared.length * 0.03));
            prepared.forEach(r => {
                const y0 = srcY(r.oCountry);
                const y1 = dstY(r.dCountry);
                if (y0 == null || y1 == null) return;
                const lane = pairLane.get(r.routeCode) || 0;
                const laneOffset = lane * 3.2;
                const cx = xLeft + xSpan * 0.52;
                const cy = (y0 + y1) / 2 + laneOffset;
                const x0 = xLeft, x1 = xRight;
                const p0 = [x0, y0], p1 = [cx, cy], p2 = [x1, y1];
                const samples = 32;
                const curve = [];
                for (let i = 0; i <= samples; i++) {
                    const t = i / samples;
                    const u = 1 - t;
                    curve.push({
                        x: u * u * p0[0] + 2 * u * t * p1[0] + t * t * p2[0],
                        y: u * u * p0[1] + 2 * u * t * p1[1] + t * t * p2[1]
                    });
                }
                const frac = Math.max(0.08, Math.min(1, r.length / Lmax));
                const cutIdx = Math.max(1, Math.min(samples - 1, Math.round(frac * samples)));
                const solid = curve.slice(0, cutIdx + 1);
                const faded = curve.slice(cutIdx);
                const col = r.colorVal && r.colorVal !== "none" ? r.colorVal : "#2a4b8d";
                const seasonKey = String(r.season || "").toLowerCase();
                const solidStrokeWidth = sw;
                const fadedStrokeWidth = Math.max(0.9, sw - 0.2);

                const solidD = lineGen(solid);
                const fadedD = lineGen(faded);
                const solidPath = routesG.append("path")
                    .attr("class", "loupe-unbundle-route loupe-route-fast")
                    .attr("data-route", r.routeCode)
                    .attr("d", solidD)
                    .attr("fill", "none")
                    .attr("stroke", col)
                    .attr("stroke-width", solidStrokeWidth)
                    .attr("stroke-opacity", 0.95)
                    .attr("stroke-linecap", "round")
                    .attr("stroke-linejoin", "round")
                    .style("pointer-events", onRouteClick ? "stroke" : "none")
                    .style("cursor", onRouteClick ? "pointer" : null);
                if (onRouteClick) {
                    solidPath.on("click", function(event) {
                        event.stopPropagation();
                        onRouteClick(r.routeCode);
                    });
                }
                solidPath.on("mouseover", function(event) {
                    event.stopPropagation();
                    setLinkedRouteHover([r.routeCode]);
                }).on("mouseout", function() {
                    clearLinkedRouteHover();
                });

                const fadedPath = routesG.append("path")
                    .attr("class", "loupe-unbundle-route-fade")
                    .attr("data-route", r.routeCode)
                    .attr("d", fadedD)
                    .attr("fill", "none")
                    .attr("stroke", col)
                    .attr("stroke-width", fadedStrokeWidth)
                    .attr("stroke-opacity", 0.22)
                    .attr("stroke-dasharray", "2.4 2.4")
                    .attr("stroke-linecap", "round")
                    .attr("stroke-linejoin", "round");

                const solidMeasure = routesG.append("path")
                    .attr("d", solidD)
                    .attr("fill", "none")
                    .attr("stroke", "none")
                    .attr("visibility", "hidden");
                const measureNode = solidMeasure.node();
                const totalLen = measureNode ? measureNode.getTotalLength() : 0;

                if (seasonKey === "spring" && measureNode && totalLen > 1) {
                    solidPath.attr("stroke-width", 0.95);
                    let seed = 0;
                    for (let i = 0; i < (r.routeCode + "").length; i++) seed = (seed * 31 + (r.routeCode + "").charCodeAt(i)) >>> 0;
                    function rand() { seed = (1664525 * seed + 1013904223) >>> 0; return seed / 4294967296; }
                    const spacing = 14;
                    const stitchCount = Math.max(8, Math.floor(totalLen / spacing));
                    for (let i = 1; i < stitchCount; i++) {
                        const len = (i / stitchCount) * totalLen;
                        const p = measureNode.getPointAtLength(len);
                        const p2 = measureNode.getPointAtLength(Math.min(totalLen, len + 1));
                        let dx = p2.x - p.x, dy = p2.y - p.y;
                        const mag = Math.hypot(dx, dy) || 1;
                        dx /= mag; dy /= mag;
                        const perpX = -dy, perpY = dx;
                        const legLen = 4.7 + rand() * 1.1;
                        const spread = 3.0 + rand() * 0.9;
                        const tipX = p.x + perpX * ((rand() - 0.5) * 0.8);
                        const tipY = p.y + perpY * ((rand() - 0.5) * 0.8);
                        const leftX = tipX - dx * legLen + perpX * spread;
                        const leftY = tipY - dy * legLen + perpY * spread;
                        const rightX = tipX - dx * legLen - perpX * spread;
                        const rightY = tipY - dy * legLen - perpY * spread;
                        routesG.append("path")
                            .attr("class", "loupe-unbundle-route spring-stitch")
                            .attr("data-route", r.routeCode)
                            .attr("d", `M${leftX},${leftY} L${tipX},${tipY} L${rightX},${rightY}`)
                            .attr("fill", "none")
                            .attr("stroke", col)
                            .attr("stroke-width", 0.82)
                            .attr("stroke-linecap", "round")
                            .attr("stroke-linejoin", "round")
                            .style("pointer-events", "none");
                    }
                } else if (seasonKey === "summer" && measureNode && totalLen > 1) {
                    const outerW = Math.max(2.2, solidStrokeWidth * 0.95);
                    solidPath.attr("stroke-width", outerW).attr("stroke-dasharray", null);
                    routesG.append("path")
                        .attr("class", "loupe-unbundle-route loupe-unbundle-route-core")
                        .attr("data-route", r.routeCode)
                        .attr("d", solidD)
                        .attr("fill", "none")
                        .attr("stroke", "#f8f6f0")
                        .attr("stroke-width", Math.max(1, outerW - 2.1))
                        .attr("stroke-opacity", 0.95)
                        .attr("stroke-linecap", "round")
                        .attr("stroke-linejoin", "round")
                        .style("pointer-events", "none");
                    const tickColor = d3.interpolateRgb(col, "#000000")(0.2);
                    const halfLen = outerW * 0.5;
                    const approxSpacing = Math.max(22, outerW * 2.8);
                    const tickCount = Math.floor(totalLen / approxSpacing);
                    for (let i = 1; i < tickCount; i++) {
                        const l = (i / tickCount) * totalLen;
                        const p = measureNode.getPointAtLength(l);
                        const p2 = measureNode.getPointAtLength(Math.min(totalLen, l + 1));
                        const dx = p2.x - p.x, dy = p2.y - p.y;
                        const mag = Math.hypot(dx, dy) || 1;
                        const nx = -dy / mag, ny = dx / mag;
                        routesG.append("line")
                            .attr("class", "loupe-unbundle-route ribbon-tick")
                            .attr("data-route", r.routeCode)
                            .attr("x1", p.x - nx * halfLen)
                            .attr("y1", p.y - ny * halfLen)
                            .attr("x2", p.x + nx * halfLen)
                            .attr("y2", p.y + ny * halfLen)
                            .attr("stroke", tickColor)
                            .attr("stroke-width", 1.05)
                            .attr("opacity", 0.75)
                            .style("pointer-events", "none");
                    }
                    routesG.append("path")
                        .attr("class", "loupe-unbundle-route-fade-core")
                        .attr("data-route", r.routeCode)
                        .attr("d", fadedD)
                        .attr("fill", "none")
                        .attr("stroke", "#f8f6f0")
                        .attr("stroke-width", Math.max(0.65, fadedStrokeWidth * 0.44))
                        .attr("stroke-opacity", 0.58)
                        .attr("stroke-linecap", "round")
                        .attr("stroke-linejoin", "round")
                        .style("pointer-events", "none");
                } else if (seasonKey === "autumn" && measureNode && totalLen > 1) {
                    const numSamples = 60;
                    const freq = 8.2;
