            drawLoupeDirectionalRectLens(wrap, st, {
                miniFilter: latLongLensPlaced.mini,
                targetSvg: svg,
                showCaption: false,
                onRouteClick: (routeCode) => {
                    const codeStr = String(routeCode);
                    const node = mapSVG.selectAll(".route-ribbon").filter(function() {
                        return this.getAttribute("data-route") === codeStr;
                    }).node();
                    if (node) d3.select(node).dispatch("click", { bubbles: true });
                }
            });
        }

        function loupeScreenToMapLayer(mx, my, mini) {
            const s = mini.scale;
            const tx = mini.cx * (1 - s);
            const ty = mini.cy * (1 - s);
            return [(mx - tx) / s, (my - ty) / s];
        }

        function loupeMiniPickRouteFromMap(mx, my, mini) {
            const [ox, oy] = loupeScreenToMapLayer(mx, my, mini);
            const svg = mapSVG.node();
            const rl = routesLayer.node();
            if (svg.getIntersectionList) {
                try {
                    const rect = svg.createSVGRect();
                    rect.x = ox - 6;
                    rect.y = oy - 6;
                    rect.width = 12;
                    rect.height = 12;
                    let list = rl ? svg.getIntersectionList(rect, rl) : null;
                    if (!list || !list.length) list = svg.getIntersectionList(rect, null);
                    if (list && list.length) {
                        for (let i = list.length - 1; i >= 0; i--) {
                            let el = list[i];
                            if (rl && !rl.contains(el)) continue;
                            while (el && el !== svg) {
                                if (el.classList && el.classList.contains("route-ribbon")) {
                                    return el.getAttribute("data-route");
                                }
                                el = el.parentElement;
                            }
                        }
                    }
                } catch (_) { /* ignore */ }
            }
            let best = null, bestD = 24;
            mapSVG.selectAll(".route-ribbon").each(function() {
                try {
                    const bb = this.getBBox();
                    const cx = bb.x + bb.width / 2, cy = bb.y + bb.height / 2;
                    const d = Math.hypot(ox - cx, oy - cy);
                    if (d < bestD) {
                        bestD = d;
                        best = this.getAttribute("data-route");
                    }
                } catch (_) { /* ignore */ }
            });
            return best;
        }

        function renderLatLongLoupe() {
            latLongLoupeChordPickData = [];
            latLongLoupeStack.selectAll("*").remove();
            if (!latLongLensPlaced || !latLongLensPlaced.mini || !latLongLensPlaced.fixed) {
                latLongLoupeStack.style("display", "none");
                latLongLoupeStack.style("pointer-events", "none");
                return;
            }
            clampLatLongLoupePosition();
            const state = latLongLensPlaced;
            const m = state.mini;

            latLongLoupeStack.style("display", null);
            latLongLoupeStack.style("pointer-events", "auto");

            const maskId = "lat-long-loupe-dim-mask";
            const clipId = "lat-long-loupe-mag-clip";
            let defs = mapSVG.select("defs");
            if (defs.empty()) defs = mapSVG.append("defs");
            defs.select(`#${maskId}`).remove();
            defs.select(`#${clipId}`).remove();

            const mask = defs.append("mask").attr("id", maskId);
            mask.append("rect")
                .attr("x", 0).attr("y", 0)
                .attr("width", mapWidth).attr("height", mapHeight)
                .attr("fill", "white");
            const useLasso = m.kind === "lasso" && m.pathD;
            if (useLasso) {
                mask.append("path")
                    .attr("class", "loupe-mask-hole")
                    .attr("d", m.pathD)
                    .attr("fill", "black");
            } else {
                mask.append("circle")
                    .attr("class", "loupe-mask-hole")
                    .attr("cx", m.cx).attr("cy", m.cy).attr("r", m.r || 46)
                    .attr("fill", "black");
            }

            latLongLoupeStack.append("rect")
                .attr("class", "loupe-dim-rect")
                .attr("x", 0).attr("y", 0)
                .attr("width", mapWidth).attr("height", mapHeight)
                .attr("fill", "rgba(248, 246, 240, 0.48)")
                .attr("mask", `url(#${maskId})`)
                .style("pointer-events", "none");

            if (useLasso) {
                latLongLoupeStack.append("path")
                    .attr("class", "loupe-mini-cover")
                    .attr("d", m.pathD)
                    .attr("fill", "#ffffff")
                    .style("pointer-events", "none");
            } else {
                latLongLoupeStack.append("circle")
                    .attr("class", "loupe-mini-cover")
                    .attr("cx", m.cx).attr("cy", m.cy).attr("r", m.r || 46)
                    .attr("fill", "#ffffff")
                    .style("pointer-events", "none");
            }

            const clipG = defs.append("clipPath").attr("id", clipId);
            if (useLasso) {
                clipG.append("path").attr("class", "loupe-clip-shape").attr("d", m.pathD);
            } else {
                clipG.append("circle")
                    .attr("class", "loupe-clip-circle")
                    .attr("cx", m.cx).attr("cy", m.cy).attr("r", m.r || 46);
            }

            const miniWrap = latLongLoupeStack.append("g")
                .attr("class", "loupe-mini-wrap")
                .attr("clip-path", `url(#${clipId})`)
                .style("pointer-events", "none");

            const s = m.scale;
            const tx = m.cx * (1 - s);
            const ty = m.cy * (1 - s);
            const magT = `translate(${tx},${ty}) scale(${s})`;
            miniWrap.append("use")
                .attr("class", "loupe-use-magnify-geo")
                .attr("href", "#map-geo-loupe-root")
                .attr("transform", magT)
                .attr("opacity", 1);
            miniWrap.append("use")
                .attr("class", "loupe-use-magnify")
                .attr("href", "#routes-layer-root")
                .attr("transform", magT)
                .attr("opacity", 1);

            if (useLasso) {
                latLongLoupeStack.append("path")
                    .attr("class", "loupe-mini-outline")
                    .attr("d", m.pathD)
                    .attr("fill", "none")
                    .attr("stroke", "#d3d3d3")
                    .attr("stroke-width", 1.5)
                    .style("pointer-events", "none");
            } else {
                latLongLoupeStack.append("circle")
                    .attr("class", "loupe-mini-outline")
                    .attr("cx", m.cx).attr("cy", m.cy).attr("r", m.r || 46)
                    .attr("fill", "none")
                    .attr("stroke", "#d3d3d3")
                    .attr("stroke-width", 1.5)
                    .style("pointer-events", "none");
            }

            let miniHit;
            if (useLasso) {
                miniHit = miniWrap.append("path")
                    .attr("class", "loupe-drag-hit")
                    .attr("d", m.pathD)
                    .attr("fill", "#ffffff")
                    .attr("fill-opacity", 0.001)
                    .attr("stroke", "none")
                    .style("cursor", "default")
                    .style("pointer-events", "all");
            } else {
                miniHit = miniWrap.append("circle")
                    .attr("class", "loupe-drag-hit")
                    .attr("cx", m.cx).attr("cy", m.cy).attr("r", m.r || 46)
                    .attr("fill", "#ffffff")
                    .attr("fill-opacity", 0.001)
                    .attr("stroke", "none")
                    .style("cursor", "default")
                    .style("pointer-events", "all");
            }

            miniHit.on("mousemove", function(event) {
                if (latLongLoupeDragging) return;
                const cur = latLongLensPlaced;
                if (!cur || !cur.mini) return;
                const mm = cur.mini;
                const [mx, my] = d3.pointer(event, mapSVG.node());
                if (!loupeMiniPointInLens(mx, my, mm)) {
                    this.style.cursor = "default";
                    setMiniLensMapHover(null);
                    return;
                }
                const edgePx = loupeMiniDragEdgePx(mm);
                let onEdge;
                if (mm.kind === "lasso" && mm.points && mm.points.length >= 3)
                    onEdge = loupePointToPolyEdgeDist(mx, my, mm.points) < edgePx;
                else {
                    const distC = Math.hypot(mx - mm.cx, my - mm.cy);
                    onEdge = distC > (mm.r || 46) - edgePx;
                }
                if (onEdge) {
                    this.style.cursor = "grab";
                    setMiniLensMapHover(null);
                    return;
                }
                const mapCode = loupeMiniPickRouteFromMap(mx, my, mm);
                if (mapCode == null) {
                    this.style.cursor = "grab";
                    setMiniLensMapHover(null);
                    return;
                }
                this.style.cursor = "pointer";
                setMiniLensMapHover(mapCode);
            });

            miniHit.on("mouseleave", function() {
                if (!latLongLoupeDragging) setMiniLensMapHover(null);
            });

            miniHit.on("click", function(event) {
                if (loupeDragSuppressedClick) return;
                const cur = latLongLensPlaced;
                if (!cur || !cur.mini) return;
                const mm = cur.mini;
                const [mx, my] = d3.pointer(event, mapSVG.node());
                if (!loupeMiniPointInLens(mx, my, mm)) return;
                const code = loupeMiniPickRouteFromMap(mx, my, mm);
                if (code == null) return;
                event.stopPropagation();
                const codeStr = String(code);
                const node = mapSVG.selectAll(".route-ribbon").filter(function() {
                    return this.getAttribute("data-route") === codeStr;
                }).node();
                if (node) d3.select(node).dispatch("click", { bubbles: true });
            });

            miniHit.on("pointerdown", function(event) {
                if (event.button != null && event.button !== 0) return;
                const curPd = latLongLensPlaced;
                if (curPd && curPd.mini) {
                    const mm = curPd.mini;
                    const [px, py] = d3.pointer(event, mapSVG.node());
                    if (loupeMiniPointInLens(px, py, mm)) {
                        const edgePx = loupeMiniDragEdgePx(mm);
                        let onEdge;
                        if (mm.kind === "lasso" && mm.points && mm.points.length >= 3)
                            onEdge = loupePointToPolyEdgeDist(px, py, mm.points) < edgePx;
                        else {
                            const distC = Math.hypot(px - mm.cx, py - mm.cy);
                            onEdge = distC > (mm.r || 46) - edgePx;
                        }
                        const onRoute = loupeMiniPickRouteFromMap(px, py, mm) != null;
                        if (!onEdge && onRoute) return;
                    }
                }
                event.stopPropagation();
                loupeDragSuppressedClick = false;
                latLongLoupeDragging = true;
                setMiniLensMapHover(null);
                this.style.cursor = "grabbing";
                latLongLoupeDragLast = d3.pointer(event, mapSVG.node());
                loupePointerDownEl = this;
                if (event.pointerId != null && this.setPointerCapture) {
                    try { this.setPointerCapture(event.pointerId); } catch (_) { /* ignore */ }
                }
                window.addEventListener("pointermove", loupeWindowPointerMove, { passive: false });
                window.addEventListener("pointerup", loupeWindowPointerEnd, true);
                window.addEventListener("pointercancel", loupeWindowPointerEnd, true);
            });

            miniHit.on("wheel", function(event) {
                event.preventDefault();
                event.stopPropagation();
                const dy = event.deltaY || 0;
                adjustMiniLoupeScale(dy > 0 ? -0.14 : 0.14);
            });

            const zoomX = (useLasso && m.bbox) ? m.bbox.x1 + 12 : (m.cx + (m.r || 46) + 12);
            const zoomY = (useLasso && m.bbox) ? m.bbox.y0 - 14 : (m.cy - 14);
            const zoomWrap = latLongLoupeStack.append("g")
                .attr("class", "loupe-zoom-controls")
                .attr("transform", `translate(${zoomX}, ${zoomY})`);

            function makeZoomBtn(offsetY, label, onClick) {
                const g = zoomWrap.append("g")
                    .attr("class", "loupe-zoom-btn")
                    .attr("transform", `translate(0, ${offsetY})`)
                    .style("cursor", "pointer")
                    .style("pointer-events", "all");
                g.append("circle")
                    .attr("r", 9)
                    .attr("fill", "#f5f8ff")
                    .attr("stroke", "#2a4b8d")
                    .attr("stroke-width", 1);
                g.append("text")
                    .attr("text-anchor", "middle")
                    .attr("dominant-baseline", "middle")
                    .attr("fill", "#1f365f")
                    .attr("font-size", 12)
                    .text(label);
                g.on("click", function(event) {
                    event.stopPropagation();
                    onClick();
                });
            }
            makeZoomBtn(0, "+", () => adjustMiniLoupeScale(0.28));
            makeZoomBtn(22, "−", () => adjustMiniLoupeScale(-0.28));

            renderDetailsDeclutterView();
        }

        function finalizeLoupeLassoFromPoints(openPts) {
            if (!openPts || openPts.length < 3) return false;
            const pts = openPts.slice();
            const pathD = loupePolygonToPathD(pts);
            if (!pathD) return false;
            const [cx, cy] = loupePolyCentroid(pts);
            const bbox = loupePolyBBox(pts);
            const r = loupePolyMaxRFromCentroid(pts, cx, cy);
            cancelLoupeLassoDraw();
            latLongLensPlaced = {
                mini: {
                    kind: "lasso",
                    points: pts,
                    pathD,
                    cx,
                    cy,
                    r,
                    bbox,
                    scale: 2.85
                },
                fixed: computeFixedLoupeLayout()
            };
            clampLatLongLoupePosition();
            setDetailsTab("declutter");
            renderLatLongLoupe();
            updateLatLongLoupeIconStyle();
            return true;
        }

        function startLoupeLassoDraw() {
            cancelLoupeLassoDraw();
            latLongLoupeLassoDrawing = true;
            latLongLoupeLassoPoints = [];
            const plotL = mapMargin.left;
            const plotT = mapMargin.top;
            const plotW = mapWidth - mapMargin.left - mapMargin.right;
            const plotH = mapHeight - mapMargin.top - mapMargin.bottom;
            const ui = latLongLoupeLayer.append("g").attr("class", "loupe-lasso-draw-ui");
            const hitRect = ui.append("rect")
                .attr("x", plotL).attr("y", plotT)
                .attr("width", plotW).attr("height", plotH)
                .attr("fill", "rgba(42,75,139,0.07)")
                .style("cursor", "crosshair")
                .style("pointer-events", "all");
            ui.append("text")
                .attr("class", "loupe-lasso-hint")
                .attr("x", plotL + plotW / 2)
                .attr("y", plotT + 20)
                .attr("text-anchor", "middle")
                .text("Drag to outline an area. Release near the start point to finish (Esc to cancel).");
            const previewPath = ui.append("path").attr("class", "loupe-lasso-preview");
            const startDot = ui.append("circle").attr("class", "loupe-lasso-start-dot").attr("r", 0);

            const CLOSE_DIST = 14;
            const MIN_PERIM = 52;
            let drawing = false;
            let captureEl = null;

            function pointerToMap(e) {
                const p = d3.pointer(e, mapSVG.node());
                const x = Math.max(plotL, Math.min(plotL + plotW, p[0]));
                const y = Math.max(plotT, Math.min(plotT + plotH, p[1]));
                return [x, y];
            }
            function dist2(a, b) {
                return Math.hypot(a[0] - b[0], a[1] - b[1]);
            }
            function redrawPreview(pts, nearClose) {
                if (!pts.length) {
                    previewPath.attr("d", null);
                    startDot.attr("r", 0);
                    return;
                }
                previewPath.attr("d", pts.length < 2 ? null : ("M" + pts.map(p => `${p[0]},${p[1]}`).join("L")));
                startDot.attr("cx", pts[0][0]).attr("cy", pts[0][1]).attr("r", 5);
                startDot.classed("loupe-lasso-near-close", !!nearClose);
            }

            function onDown(e) {
                if (e.button != null && e.button !== 0) return;
                e.stopPropagation();
                const p = pointerToMap(e);
                latLongLoupeLassoPoints = [p];
                drawing = true;
                captureEl = e.currentTarget;
                redrawPreview(latLongLoupeLassoPoints, false);
                if (e.pointerId != null && captureEl && captureEl.setPointerCapture) {
                    try { captureEl.setPointerCapture(e.pointerId); } catch (_) { /* ignore */ }
                }
            }

            function onMove(e) {
                if (!drawing) return;
                e.preventDefault();
                const p = pointerToMap(e);
                const pts = latLongLoupeLassoPoints;
                const last = pts[pts.length - 1];
                if (!last || dist2(last, p) >= 2.5) pts.push(p);
                const near = pts.length >= 3 && dist2(p, pts[0]) < CLOSE_DIST && polylineArcLength(pts) >= MIN_PERIM;
                redrawPreview(pts, near);
            }

            function onUp(e) {
                if (!drawing) return;
                drawing = false;
                if (e.pointerId != null && captureEl && captureEl.releasePointerCapture) {
                    try { captureEl.releasePointerCapture(e.pointerId); } catch (_) { /* ignore */ }
                }
                captureEl = null;
                const pts = latLongLoupeLassoPoints;
                const p = pointerToMap(e);
                const last = pts.length ? pts[pts.length - 1] : p;
                const closed = pts.length >= 3 && dist2(last, pts[0]) < CLOSE_DIST && polylineArcLength(pts) >= MIN_PERIM;
                if (closed) finalizeLoupeLassoFromPoints(pts);
                else {
                    latLongLoupeLassoPoints = [];
                    redrawPreview([], false);
                }
            }

            function onKey(e) {
                if (e.key === "Escape") {
                    e.preventDefault();
                    cancelLoupeLassoDraw();
                }
            }

            hitRect.on("pointerdown", onDown);
            loupeLassoDrawHandlers = { move: onMove, up: onUp, key: onKey };
            window.addEventListener("pointermove", onMove, { passive: false });
            window.addEventListener("pointerup", onUp, true);
            window.addEventListener("pointercancel", onUp, true);
            document.addEventListener("keydown", onKey);
            updateLatLongLoupeIconStyle();
            setDetailsTab("declutter");
            renderDetailsDeclutterView();
        }

        latLongLoupeIcon.on("click", function(event) {
            event.stopPropagation();
            if (latLongLensPlaced) {
                clearLatLongLoupe();
                return;
            }
            if (latLongLoupeLassoDrawing) {
                cancelLoupeLassoDraw();
                return;
            }
            latLongLensArmed = false;
            startLoupeLassoDraw();
        });

        // Precompute cluster widths once: how many routes share almost same path
        const monthToSeason = m => {
            const mm = +m;
            if ([12, 1, 2].includes(mm)) return "Winter";
            if ([3, 4, 5].includes(mm)) return "Spring";
            if ([6, 7, 8].includes(mm)) return "Summer";
            return "Autumn";
        };

        const routeClusterCounts = new Map();    // clusterKey -> count
        const routeMetaByCode = new Map();       // routeCode -> {category, season, clusterKey}

        (function buildRouteMeta() {
            const byRouteAll = d3.groups(allData, d => d["Migratory route codes"]);
            byRouteAll.forEach(([code, arr]) => {
                const originRow = arr.find(d => (d["Migration nodes"] || "").trim() === "Origin") || arr[0];
                const destRow = arr.find(d => (d["Migration nodes"] || "").trim() === "Destination") || arr[arr.length - 1];

                if (!originRow || !destRow) return;

                const cat = originRow["Bird Category"] || originRow["bird families"] || originRow["english name"] || "Unknown";
                const ym = `${originRow["Migration start year"]}-${originRow["Migration start month"]}`;
                const season = monthToSeason(originRow["Migration start month"]);

                const oLat = +originRow.GPS_yy, oLon = +originRow.GPS_xx;
                const dLat = +destRow.GPS_yy, dLon = +destRow.GPS_xx;
                if (!isFinite(oLat) || !isFinite(oLon) || !isFinite(dLat) || !isFinite(dLon)) return;

                const clusterKey = [
                    cat,
                    Math.round(oLat / 5) * 5,
                    Math.round(oLon / 5) * 5,
                    Math.round(dLat / 5) * 5,
                    Math.round(dLon / 5) * 5
                ].join("|");

                routeClusterCounts.set(clusterKey, (routeClusterCounts.get(clusterKey) || 0) + 1);
                // Always string keys: Object.keys(dataByRoute) yields strings; d3.autoType may use numeric codes.
                routeMetaByCode.set(String(code), { category: cat, season, clusterKey, yearMonth: ym });
            });
        })();

        function getRouteMeta(routeCode) {
            if (routeCode == null) return undefined;
            return routeMetaByCode.get(String(routeCode)) ?? routeMetaByCode.get(routeCode);
        }

        /** Same category→color resolution as map ribbons (exact colorMap key + case-insensitive fallback). */
        function mapRouteColor(routeCode, arr) {
            const meta = getRouteMeta(routeCode);
            const raw = (meta && meta.category != null && String(meta.category).trim() !== "")
                ? meta.category
                : (arr && arr[0] && (arr[0]["Bird Category"] || arr[0]["bird families"] || arr[0]["english name"])) || "";
            const s = String(raw || "").trim();
            if (s && colorMap[s] != null) return colorMap[s];
            const nl = s.toLowerCase();
            for (let i = 0; i < keys.length; i++) {
                const k = keys[i];
                if (String(k || "").toLowerCase() === nl) return colorMap[k];
            }
            return color(s);
        }

        // Enrich streamgraph dots with season information once route metadata is available.
        routeDotsData = routeDotsData.map(d => {
            const meta = getRouteMeta(d.routeCode);
            const season = meta ? meta.season : monthToSeason((d.yearMonth || "").split("-")[1]);
            return { ...d, season };
        });

        // Use a single, consistent base width for all routes so that even
        // closely overlapping routes remain visually separate rather than
        // being merged into very thick corridors.
        const baseRouteWidth = 6;

        function drawTemporalRibbonOnMap(routeCode, arr) {
            const meta = getRouteMeta(routeCode);
            if (!meta) return;

            const cat = meta.category;
            const season = meta.season;
            const clusterKey = meta.clusterKey;
            const colorVal = color(cat);

            const pts = arr
                .filter(d => d.GPS_xx != null && d.GPS_yy != null)
                .sort((a, b) => {
                    const order = { "Origin": 1, "Transit locations": 2, "Destination": 3 };
                    const oa = (order[(a["Migration nodes"] || "").trim()] || 99);
                    const ob = (order[(b["Migration nodes"] || "").trim()] || 99);
                    if (oa !== ob) return oa - ob;
                    return (a["Migration start year"] || 0) * 100 + (a["Migration start month"] || 0) -
                        (b["Migration start year"] || 0) * 100 - (b["Migration start month"] || 0);
                });

            if (pts.length < 2) return;
            const coordsBase = pts.map(d => mapProjection([+d.GPS_xx, +d.GPS_yy]));

            // Tiny, consistent positional jitter per route so overlapping routes
            // remain visually separable within the compounded corridor.
            const jitterSeed = (routeCode + "").split("").reduce((h, ch) => ((h << 5) - h) + ch.charCodeAt(0), 0);
            const jitterAngle = (Math.abs(jitterSeed) % 360) * Math.PI / 180;
            // Slightly larger jitter so very close routes do not collapse
            // into a single line visually.
            const jitterMag = 3;
            const jx = Math.cos(jitterAngle) * jitterMag;
            const jy = Math.sin(jitterAngle) * jitterMag;
            const coords = coordsBase.map(([x, y]) => [x + jx, y + jy]);

            const pathGen = d3.line().curve(d3.curveCatmullRom.alpha(0.6));
            const pathD = pathGen(coords);

            const width = baseRouteWidth;

            // Gradient along route (time progression)
            let defs = mapSVG.select("defs");
            if (defs.empty()) defs = mapSVG.append("defs");
            const gradId = `ribbon-grad-${routeCode}`;
            const [sx, sy] = coords[0];
            const [ex, ey] = coords[coords.length - 1];
            const grad = defs.append("linearGradient")
                .attr("id", gradId)
                .attr("gradientUnits", "userSpaceOnUse")
                .attr("x1", sx).attr("y1", sy)
                .attr("x2", ex).attr("y2", ey);

            // Base colors for this route (used by seasonal patterns as well).
            const c0 = d3.interpolateRgb(colorVal, "#ffffff")(0.85); // light variant
            const c1 = colorVal;                                     // base color
            const c2 = d3.interpolateRgb(colorVal, "#000000")(0.5);  // darker variant

            // Solid color along the entire route: keep color consistent instead of
            // using opacity/lightness to encode origin vs destination.
            grad.append("stop").attr("offset", "0%").attr("stop-color", c1).attr("stop-opacity", 1);
            grad.append("stop").attr("offset", "100%").attr("stop-color", c1).attr("stop-opacity", 1);

            // Spring: tapered needle — gradient with opacity fade (sharp head → faint tail)
            const gradIdSpring = gradId + "-spring";
            const gradSpring = defs.append("linearGradient")
                .attr("id", gradIdSpring)
                .attr("gradientUnits", "userSpaceOnUse")
                .attr("x1", sx).attr("y1", sy)
                .attr("x2", ex).attr("y2", ey);
            // Use the same base color and full opacity for the whole spring route;
            // pattern is expressed purely through geometry, not opacity.
            gradSpring.append("stop").attr("offset", "0%").attr("stop-color", colorVal).attr("stop-opacity", 1);
            gradSpring.append("stop").attr("offset", "45%").attr("stop-color", colorVal).attr("stop-opacity", 1);
            gradSpring.append("stop").attr("offset", "100%").attr("stop-color", colorVal).attr("stop-opacity", 1);

            const routeSelector = `[data-route="${routeCode}"]`;
            const seasonKey = (season || "").toLowerCase();
            const directionKey = (routeDirection[routeCode] || "West to East").toLowerCase();

            // Direction-of-travel encoding lives on the stroke pattern (dasharray)
            // so it stays orthogonal to seasonal texture.
            function applyDirectionStroke(selection) {
                let dash = null;
                switch (directionKey) {
                    case "east to west":
                        // Backward-leaning feel: shorter dashes, more gaps
                        dash = "4,6";
                        break;
                    case "north to south":
                        // Fine, even stipple along the line
                        dash = "2,4";
                        break;
                    case "south to north":
                        // Dash–dot rhythm
                        dash = "8,3,2,3";
                        break;
                    default: // "west to east" and fallbacks
                        dash = null; // solid
                }
                if (dash) selection.attr("stroke-dasharray", dash);
                else selection.attr("stroke-dasharray", null);
            }

            // Choose per-season layer so we can toggle entire seasons quickly.
            const seasonLayer = seasonRouteLayers[season] || routesLayer;
            const g = seasonLayer.append("g")
                .attr("class", "route route-ribbon")
                .attr("data-route", routeCode)
                .attr("data-base-width", width)
                .on("click", function() {
                    clearRouteHighlights();
                    // Bring the selected route visually to the top of the routes layer.
                    d3.select(this).raise();
                    mapSVG.selectAll(routeSelector).classed("route-highlight", true);
                    mapSVG.selectAll(routeSelector).each(function() {
                        const sel = d3.select(this);
                        sel.selectAll("path.route-fill").attr("stroke", "#9370db").attr("stroke-width", 2);
                        sel.selectAll(".winter-mark").each(function() {
                            const p = d3.select(this);
                            const baseW = +p.attr("data-base-stroke-width") || +p.attr("stroke-width") || 1;
                            p.attr("stroke", "#9370db").attr("stroke-width", baseW + 1.4);
                        });
                    });
                    showRouteInfo(routeCode);
                })
                .on("mouseenter", function() {
                    const sel = d3.select(this);
                    sel.attr("opacity", 1);
                    setLinkedRouteHover([routeCode]);
                    sel.selectAll("path.route-stroke").each(function() {
                        const p = d3.select(this);
                        const groupBase = +sel.attr("data-base-width") || +sel.attr("stroke-width") || width;
                        const baseW = +p.attr("data-base-stroke-width") || +p.attr("stroke-width") || groupBase;
                        p.attr("stroke", "#9370db");
                        p.attr("stroke-width", baseW + 3);
                    });
                    // Autumn (and any route-fill): show highlight stroke so hover is visible
                    sel.selectAll("path.route-fill").attr("stroke", "#9370db").attr("stroke-width", 2);
                    // Winter chain stitch: brighten and thicken on hover
                    sel.selectAll(".winter-mark").each(function() {
                        const p = d3.select(this);
                        const baseW = +p.attr("data-base-stroke-width") || +p.attr("stroke-width") || 1;
                        p.attr("stroke", "#9370db").attr("stroke-width", baseW + 1.0);
                    });
                })
                .on("mouseleave", function() {
                    clearLinkedRouteHover();
                });

            // Path used for sampling length/points (and for spring/summer stroke)
            const samplePath = g.append("path")
                .attr("d", pathD)
                .attr("fill", "none")
                .attr("stroke", "none")
                .attr("visibility", "hidden");
            const pathNode = samplePath.node();
            const totalLen = pathNode.getTotalLength();

            if (seasonKey === "spring") {
                // Spring: non-photo-realistic embroidery "fly stitch" with a thin stem/spine.
                g.append("path")
                    .attr("class", "route-stroke")
                    .attr("d", pathD)
                    .attr("fill", "none")
                    .attr("stroke", `url(#${gradIdSpring})`)
                    .attr("stroke-width", 0.95)
                    .attr("data-base-stroke-width", 0.95)
                    .attr("stroke-linecap", "round")
                    .attr("stroke-linejoin", "round");

                // Deterministic pseudo-random for stable stitch jitter per route
                let seed = 0;
                for (let i = 0; i < (routeCode + "").length; i++) seed = (seed * 31 + (routeCode + "").charCodeAt(i)) >>> 0;
                function rand() { seed = (1664525 * seed + 1013904223) >>> 0; return seed / 4294967296; }

                const spacing = 14;
                const stitchCount = Math.max(10, Math.floor(totalLen / spacing));
                for (let i = 1; i < stitchCount; i++) {
                    const len = (i / stitchCount) * totalLen;
                    const p = pathNode.getPointAtLength(len);
                    const p2 = pathNode.getPointAtLength(Math.min(totalLen, len + 1));
                    let dx = p2.x - p.x, dy = p2.y - p.y;
                    const mag = Math.sqrt(dx * dx + dy * dy) || 1;
                    dx /= mag; dy /= mag;
                    const perpX = -dy, perpY = dx;

                    const legLen = 5.0 + rand() * 1.2;
                    const spread = 3.2 + rand() * 1.0;
                    const back = 0.8 + rand() * 0.6;
                    const tipX = p.x + perpX * ((rand() - 0.5) * 1.0);
                    const tipY = p.y + perpY * ((rand() - 0.5) * 1.0);

                    const leftX = tipX - dx * legLen + perpX * spread;
                    const leftY = tipY - dy * legLen + perpY * spread;
                    const rightX = tipX - dx * legLen - perpX * spread;
                    const rightY = tipY - dy * legLen - perpY * spread;
                    const midX = tipX - dx * (legLen * back);
                    const midY = tipY - dy * (legLen * back);

                    // Two legs meeting at a forward tip (fly stitch "V")
                    g.append("path")
                        .attr("class", "spring-stitch")
                        .attr("d", `M${leftX},${leftY} L${tipX},${tipY} L${rightX},${rightY}`)
                        .attr("fill", "none")
                        .attr("stroke", colorVal)
                        .attr("stroke-width", 0.8)
                        .attr("stroke-linecap", "round")
                        .attr("stroke-linejoin", "round");
                }
            } else if (seasonKey === "summer") {
                // Hollow ribbon: thick outline, inner “cutout” for double-line look
                const summerOuterW = Math.max(2.2, width * 0.72);
                applyDirectionStroke(
                    g.append("path")
                    .attr("class", "route-stroke")
                    .attr("d", pathD)
                    .attr("fill", "none")
                    .attr("stroke", `url(#${gradId})`)
                    .attr("stroke-width", summerOuterW)
                    .attr("data-base-stroke-width", summerOuterW)
                    .attr("stroke-linecap", "round")
                    .attr("stroke-linejoin", "round")
                );
                g.append("path")
                    .attr("d", pathD)
                    .attr("fill", "none")
                    .attr("stroke", "#f8f6f0")
                    .attr("stroke-width", Math.max(1, summerOuterW - 2.2))
                    .attr("stroke-linecap", "round")
                    .attr("stroke-linejoin", "round");
                const tickColor = d3.interpolateRgb(colorVal, "#000000")(0.2);
                const halfLen = summerOuterW * 0.5;
                const approxSpacing = Math.max(25, summerOuterW * 3);
                const tickCount = Math.floor(totalLen / approxSpacing);
                for (let i = 1; i < tickCount; i++) {
                    const l = (i / tickCount) * totalLen;
                    const p = pathNode.getPointAtLength(l);
                    const p2 = pathNode.getPointAtLength(Math.min(totalLen, l + 1));
                    const dx = p2.x - p.x, dy = p2.y - p.y;
                    const mag = Math.sqrt(dx * dx + dy * dy) || 1;
                    const nx = -dy / mag, ny = dx / mag;
                    // Attach ticks to the same route group so that
                    // per-season layer visibility also hides their ticks.
                    g.append("line")
                        .attr("class", "ribbon-tick")
                        .attr("x1", p.x - nx * halfLen)
                        .attr("y1", p.y - ny * halfLen)
                        .attr("x2", p.x + nx * halfLen)
                        .attr("y2", p.y + ny * halfLen)
                        .attr("stroke", tickColor)
                        .attr("stroke-width", 1.1)
                        .attr("opacity", 0.7);
                }
            } else if (seasonKey === "autumn") {
                // Variable-width ribbon: thinner, with more frequent sine-wave twists
                const numSamples = 70;
                const freq = 9;
                const waveAmp = 0.42;
                const pts = [];
                for (let i = 0; i <= numSamples; i++) {
                    const t = i / numSamples;
                    const len = t * totalLen;
                    const p = pathNode.getPointAtLength(len);
                    const p2 = pathNode.getPointAtLength(Math.min(totalLen, len + 2));
                    let dx = p2.x - p.x, dy = p2.y - p.y;
                    const mag = Math.sqrt(dx * dx + dy * dy) || 1;
                    dx /= mag; dy /= mag;
                    const perpX = -dy, perpY = dx;
                    const wave = 1 + waveAmp * Math.sin(t * Math.PI * freq);
                    // Make autumn ribbons slightly thinner overall so they feel
                    // more like twisting strands than solid bands.
                    const halfW = (width * 0.55 / 2) * wave;
                    pts.push([p.x + perpX * halfW, p.y + perpY * halfW]);
                    pts.unshift([p.x - perpX * halfW, p.y - perpY * halfW]);
                }
                const polygonD = "M" + pts.map(([x, y]) => `${x},${y}`).join("L") + "Z";
                g.attr("data-hover-stroke", d3.interpolateRgb(colorVal, "#000000")(0.4));
                g.append("path")
                    .attr("class", "route-fill")
                    .attr("d", polygonD)
                    .attr("fill", `url(#${gradId})`)
                    .attr("stroke", "none");
            } else if (seasonKey === "winter") {
                // Winter: chain stitch along the route.
                // Non-photo-realistic: each stitch is a loop (closed outline) that shares
                // anchor points with neighbors so loops visually connect into a chain.
                const loopSpacing = 8.8;
                const loopCount = Math.max(14, Math.floor(totalLen / loopSpacing));
                const anchors = [];
                for (let i = 0; i <= loopCount; i++) {
                    const len = (i / loopCount) * totalLen;
                    const p = pathNode.getPointAtLength(len);
                    anchors.push([p.x, p.y]);
                }
                for (let i = 0; i < anchors.length - 1; i++) {
                    const [x0, y0] = anchors[i];
                    const [x1, y1] = anchors[i + 1];
                    let dx = x1 - x0, dy = y1 - y0;
                    const mag = Math.sqrt(dx * dx + dy * dy) || 1;
                    dx /= mag; dy /= mag;
                    const perpX = -dy, perpY = dx;

                    // Slight hand-drawn wobble, but keep chain hugging the route
                    const side = (i % 2 === 0) ? 1 : -1;
                    const depth = 4.3;
                    const wobble = (Math.random() - 0.5) * 0.6;
                    const mx = (x0 + x1) / 2 + perpX * wobble;
                    const my = (y0 + y1) / 2 + perpY * wobble;

                    const cOutX = mx + perpX * side * depth;
                    const cOutY = my + perpY * side * depth;
                    const cInX = mx - perpX * side * (depth * 0.55);
                    const cInY = my - perpY * side * (depth * 0.55);

                    const dLoop = `M${x0},${y0} Q${cOutX},${cOutY} ${x1},${y1} Q${cInX},${cInY} ${x0},${y0} Z`;
                    g.append("path")
                        .attr("class", "winter-mark")
                        .attr("d", dLoop)
                        .attr("fill", "none")
                        .attr("stroke", colorVal)
                        .attr("stroke-width", 1.35)
                        .attr("data-base-stroke", colorVal)
                        .attr("data-base-stroke-width", 1.35)
                        .attr("stroke-linecap", "round")
                        .attr("stroke-linejoin", "round");
                }
            } else {
                // Default: solid ribbon (same as before for unknown season)
                applyDirectionStroke(
                    g.append("path")
                    .attr("class", "route-stroke")
                    .attr("d", pathD)
                    .attr("fill", "none")
                    .attr("stroke", `url(#${gradId})`)
                    .attr("stroke-width", width)
                    .attr("data-base-stroke-width", width)
                    .attr("stroke-linecap", "round")
                    .attr("stroke-linejoin", "round")
                );
                const tickColor = d3.interpolateRgb(colorVal, "#000000")(0.2);
                const halfLen = width * 0.5;
                const approxSpacing = Math.max(25, width * 3);
                const tickCount = Math.floor(totalLen / approxSpacing);
                for (let i = 1; i < tickCount; i++) {
                    const l = (i / tickCount) * totalLen;
                    const p = pathNode.getPointAtLength(l);
                    const p2 = pathNode.getPointAtLength(Math.min(totalLen, l + 1));
                    const dx = p2.x - p.x, dy = p2.y - p.y;
                    const mag = Math.sqrt(dx * dx + dy * dy) || 1;
                    const nx = -dy / mag, ny = dx / mag;
                    mapSVG.append("line")
                        .attr("class", "ribbon-tick")
                        .attr("x1", p.x - nx * halfLen)
                        .attr("y1", p.y - ny * halfLen)
                        .attr("x2", p.x + nx * halfLen)
                        .attr("y2", p.y + ny * halfLen)
                        .attr("stroke", tickColor)
                        .attr("stroke-width", 1.1)
                        .attr("opacity", 0.7);
                }
            }

            // Keep original color metadata so hover-out always restores correctly.
            g.selectAll("path.route-stroke").each(function() {
                const p = d3.select(this);
                if (!p.attr("data-base-stroke")) p.attr("data-base-stroke", p.attr("stroke") || colorVal);
            });
        }

        function updateMap() {
            // Clear all per-season route layers; we redraw all seasons and then
            // control visibility via seasonRouteLayers + selectedSeason.
            Object.values(seasonRouteLayers).forEach(layer => layer.selectAll(".route").remove());
            mapSVG.selectAll(".ribbon-tick").remove();
            mapSVG.selectAll(".city-temp-layer .city-temp-blotch").remove();
            clearRouteInfo();

            let mapData;
            if (selectedYearMonth.length > 0) {
                mapData = allData.filter(d => selectedYearMonth.includes(d.yearMonth));
            } else {
                const byRoute = d3.groups(allData, d => d["Migratory route codes"]);
                const routesDir = byRoute.filter(([code]) => selectedDirections.includes(routeDirection[code] || "West to East"));
                const getCat = ([, arr]) => arr[0]["Bird Category"] || arr[0]["bird families"] || arr[0]["english name"];
                const byCat = d3.groups(routesDir, getCat);
                const maxRoutesPerCategory = 80;
                const sampled = byCat.flatMap(([, routes]) => routes.slice(0, maxRoutesPerCategory));
                mapData = sampled.flatMap(([, arr]) => arr);
            }

            mapData = mapData.filter(d => selectedDirections.includes(routeDirection[d["Migratory route codes"]] || "West to East"));
            if (selectedCategory) {
                mapData = mapData.filter(d => (d["Bird Category"] || d["bird families"] || d["english name"]) === selectedCategory);
            }

            const byRoute = d3.groups(mapData, d => d["Migratory route codes"]);
            dataByRoute = {};
            byRoute.forEach(([route, arr]) => { dataByRoute[route] = arr; });

            byRoute.forEach(([route, arr]) => {
                drawTemporalRibbonOnMap(route, arr);
            });

            // Optional geographic basemap behind lat/long chart
            geoLayer.selectAll("*").remove();
            if (showGeographicMap && world && world.features) {
                // Use the SAME projection as the ribbons: lonScale / latScale via mapProjection,
                // so country outlines align exactly with the lat/long grid and route positions.
                const proj = d3.geoTransform({
                    point(lon, lat) {
                        const [x, y] = mapProjection([lon, lat]);
                        this.stream.point(x, y);
                    }
                });
                const path = d3.geoPath(proj);
                geoLayer.selectAll("path.country")
                    .data(world.features)
                    .enter()
                    .append("path")
                    .attr("class", "country")
                    .attr("d", path)
                    .attr("fill", "#f6f6f6")
                    .attr("stroke", "#cccccc")
                    .attr("stroke-width", 0.5)
                    .attr("opacity", 0.9);
            }

            // Temperature blotches from API (fetch missing waypoints then redraw if needed)
            if (temperatureLayerEnabled && temperatureDataLoaded) {
                const order = { "Origin": 1, "Transit locations": 2, "Destination": 3 };
                const missing = [];
                const seen = new Set();
                byRoute.forEach(([route, arr]) => {
                    const sorted = arr.slice()
                        .filter(d => d.GPS_xx != null && d.GPS_yy != null)
                        .sort((a, b) => {
                            const o = (order[(a["Migration nodes"] || "").trim()] || 0) - (order[(b["Migration nodes"] || "").trim()] || 0);
                            if (o !== 0) return o;
                            return (a["Migration start year"] || 0) * 100 + (a["Migration start month"] || 0) - (b["Migration start year"] || 0) * 100 - (b["Migration start month"] || 0);
                        });
                    let lastKey = "";
                    sorted.forEach(d => {
                        const key = String(d["Countries"] || d["Country"] || "").trim() + "|" + String(d["Provinces"] || d["Province"] || d["City"] || "").trim();
                        if (key === lastKey) return;
                        lastKey = key;
                        const lat = +d.GPS_yy, lon = +d.GPS_xx, year = d["Migration start year"], month = d["Migration start month"];
                        const ck = tempCacheKey(lat, lon, year, month);
                        if (ck && getTemperatureByCoords(lat, lon, year, month) == null && !seen.has(ck)) {
                            seen.add(ck);
                            missing.push({ lat, lon, year, month });
                        }
                    });
                });
                if (missing.length > 0) {
                    loadTemperatureDataViaAPI(missing).then(() => updateMap());
                    renderLatLongLoupe();
                    return;
                }
                byRoute.forEach(([route, arr]) => {
                    const sorted = arr.slice()
                        .filter(d => d.GPS_xx != null && d.GPS_yy != null)
                        .sort((a, b) => {
                            const o = (order[(a["Migration nodes"] || "").trim()] || 0) - (order[(b["Migration nodes"] || "").trim()] || 0);
                            if (o !== 0) return o;
                            return (a["Migration start year"] || 0) * 100 + (a["Migration start month"] || 0) - (b["Migration start year"] || 0) * 100 - (b["Migration start month"] || 0);
                        });
                    let lastKey = "";
                    sorted.forEach(d => {
                        const key = String(d["Countries"] || d["Country"] || "").trim() + "|" + String(d["Provinces"] || d["Province"] || d["City"] || "").trim();
                        if (key === lastKey) return;
                        lastKey = key;
                        const year = d["Migration start year"], month = d["Migration start month"];
                        const temp = getTemperatureByCoords(+d.GPS_yy, +d.GPS_xx, year, month);
                        const [x, y] = mapProjection([+d.GPS_xx, +d.GPS_yy]);
                        const fill = (temp != null && isFinite(+temp)) ? tempColorScale(+temp) : tempColorScale(15);
                        drawVanGoghBlotch(cityTempLayer, x, y, fill);
                    });
                });
            }

            // Temperature legend on map (same scale as details)
            // Ensure gradient definition exists
            let defs = mapSVG.select("defs");
            if (defs.empty()) defs = mapSVG.append("defs");
            let tempGrad = defs.select("#temp-legend-gradient");
            if (tempGrad.empty()) {
                tempGrad = defs.append("linearGradient")
                    .attr("id", "temp-legend-gradient")
                    .attr("x1", "0%").attr("y1", "0%")
                    .attr("x2", "100%").attr("y2", "0%");
            }
            tempGrad.selectAll("stop").remove();
            tempGrad.append("stop").attr("offset", "0%").attr("stop-color", tempColorScale(30));
            tempGrad.append("stop").attr("offset", "22%").attr("stop-color", tempColorScale(22));
            tempGrad.append("stop").attr("offset", "45%").attr("stop-color", tempColorScale(15));
            tempGrad.append("stop").attr("offset", "65%").attr("stop-color", tempColorScale(10));
            tempGrad.append("stop").attr("offset", "82%").attr("stop-color", tempColorScale(0));
            tempGrad.append("stop").attr("offset", "100%").attr("stop-color", tempColorScale(-10));

            const seasonLegX = mapWidth - mapMargin.right - 152;
            const seasonLegY0 = mapHeight - mapMargin.bottom - 106;
            const seasonLeg = mapSVG.select("g.season-legend");
            seasonLeg.selectAll("*").remove();
            seasonLeg.append("text").attr("class", "season-legend-title").attr("x", seasonLegX).attr("y", seasonLegY0).text("Seasonal Route Pattern)");
            const seasons = [
                { label: "All", icon: "all" },
                { label: "Spring", icon: "needle" },
                { label: "Summer", icon: "hollow" },
                { label: "Autumn", icon: "wavy" },
                { label: "Winter", icon: "stipple" }
            ];
            const rowH = 14;
            const iconW = 36;
            seasons.forEach((s, i) => {
                const y = seasonLegY0 + 14 + i * rowH + 7;
                const g = seasonLeg.append("g")
                    .attr("class", "season-legend-item")
                    .attr("data-season", s.label)
                    .attr("transform", `translate(${seasonLegX},${y})`)
                    .style("cursor", "pointer");
                // Larger hit-area for easier selection.
                g.append("rect")
                    .attr("x", -4).attr("y", -7)
                    .attr("width", iconW + 8).attr("height", 14)
                    .attr("fill", "transparent")
                    .attr("stroke", "none")
                    .attr("stroke-width", 0)
                    .attr("rx", 4).attr("ry", 4);
                if (s.icon === "all") {
                    // Simple horizontal band indicating all seasons combined.
                    g.append("rect")
                        .attr("x", 0).attr("y", -3)
                        .attr("width", iconW).attr("height", 6)
                        .attr("fill", "#999")
                        .attr("rx", 3).attr("ry", 3)
                        .attr("opacity", 0.85);
                } else if (s.icon === "needle") {
                    // Spring: non-photo-realistic fly-stitch embroidery
                    g.append("line")
                        .attr("x1", 0).attr("y1", 0).attr("x2", iconW).attr("y2", 0)
                        .attr("stroke", "#555")
                        .attr("stroke-width", 1.05)
                        .attr("stroke-linecap", "round");
                    const sx = [7, 16, 25, 34];
                    sx.forEach((x) => {
                        const tipX = x, tipY = 0;
                        const leg = 4.2, spread = 2.6;
                        g.append("path")
                            .attr("d", `M${tipX - leg},${tipY + spread} L${tipX},${tipY} L${tipX - leg},${tipY - spread}`)
                            .attr("fill", "none")
                            .attr("stroke", "#555")
                            .attr("stroke-width", 1.0)
                            .attr("stroke-linecap", "round")
                            .attr("stroke-linejoin", "round");
                    });
                } else if (s.icon === "hollow") {
                    // Summer worm: soft hollow ribbon + transverse ticks
                    const wormY = 0;
                    g.append("line")
                        .attr("x1", 0).attr("y1", wormY).attr("x2", iconW).attr("y2", wormY)
                        .attr("stroke", "#777").attr("stroke-width", 4)
                        .attr("stroke-linecap", "round");
                    g.append("line")
                        .attr("x1", 0).attr("y1", wormY).attr("x2", iconW).attr("y2", wormY)
                        .attr("stroke", "#fff").attr("stroke-width", 2.4)
                        .attr("stroke-linecap", "round")
                        .attr("opacity", 0.9);
                    const tickHalf = 3.2;
                    [6, 12, 18, 24, 30].forEach((tx, k) => {
                        const tilt = (k % 2 === 0) ? -0.6 : 0.6;
                        g.append("line")
                            .attr("x1", tx - tilt).attr("y1", wormY - tickHalf)
                            .attr("x2", tx + tilt).attr("y2", wormY + tickHalf)
                            .attr("stroke", "#666").attr("stroke-width", 1.05)
                            .attr("stroke-linecap", "round")
                            .attr("opacity", 0.95);
                    });
                } else if (s.icon === "wavy") {
                    // Autumn: miniature ribbon with a central twist, drawn as a filled band
                    // using two slightly offset curves to suggest thickness and wobble.
                    const w = iconW;
                    const amp = 3;
                    const mid = 0;
                    const steps = 8;
                    const topPts = [];
                    const botPts = [];
                    for (let k = 0; k <= steps; k++) {
                        const t = k / steps;
                        const x = t * w;
                        const phase = t * Math.PI * 2;
                        const yCore = mid + Math.sin(phase) * (k === Math.floor(steps / 2) ? amp : amp * 0.6);
                        const halfThick = 1.4 + 0.4 * Math.sin(phase * 2);
                        topPts.push([x, yCore - halfThick]);
                        botPts.push([x, yCore + halfThick]);
                    }
                    const pts = topPts.concat(botPts.reverse());
                    const dRibbon = "M" + pts.map(([x, y]) => `${x},${y}`).join("L") + "Z";
                    g.append("path")
                        .attr("d", dRibbon)
                        .attr("fill", "#666")
                        .attr("stroke", "#444")
                        .attr("stroke-width", 0.7);
                } else {
                    // Winter: chain stitch icon (linked ovals)
                    const pts = [
                        [6, 0],
                        [14, 0],
                        [22, 0],
                        [30, 0],
                        [36, 0]
                    ];
                    for (let i = 0; i < pts.length - 1; i++) {
                        const [x0, y0] = pts[i];
                        const [x1, y1] = pts[i + 1];
                        const mx = (x0 + x1) / 2;
                        const my = (y0 + y1) / 2;
                        const side = (i % 2 === 0) ? 1 : -1;
                        const depth = 3.8;
                        const dLoop = `M${x0},${y0} Q${mx},${my + side * depth} ${x1},${y1} Q${mx},${my - side * (depth * 0.55)} ${x0},${y0} Z`;
                        g.append("path")
                            .attr("d", dLoop)
                            .attr("fill", "none")
                            .attr("stroke", "#555")
                            .attr("stroke-width", 1.25)
                            .attr("stroke-linecap", "round")
                            .attr("stroke-linejoin", "round");
                    }
                }
                const label = seasonLeg.append("text")
                    .attr("class", "season-legend-label")
                    .attr("x", seasonLegX + iconW + 6)
                    .attr("y", y + 4)
                    .text(s.label)
                    .style("cursor", "pointer");
                // Add an invisible hit area behind the label too (helps clicking).
                const labelHit = seasonLeg.append("rect")
                    .attr("x", seasonLegX + iconW + 2)
                    .attr("y", y - 8)
                    .attr("width", 70)
                    .attr("height", 14)
                    .attr("fill", "transparent")
                    .attr("data-season", s.label)
                    .style("cursor", "pointer");

                function applySeasonSelection() {
                    selectedSeason = s.label;
                    // Toggle per-season map layers for fast visual feedback.
                    Object.entries(seasonRouteLayers).forEach(([seasonName, layer]) => {
                        const show = (selectedSeason === "All" || selectedSeason === seasonName);
                        layer.style("display", show ? null : "none");
                    });
                    // Other views (streamgraph dots, lens, overlay) still use data filtering.
                    updateRouteDots();
                    if (currentLensSelection) {
                        updateLens(currentLensSelection);
                    }
                    updateBeakOverlay();
                }

                // Clicking icon OR label sets the active season filter.
                g.on("click", applySeasonSelection);
                label.on("click", applySeasonSelection);
                labelHit.on("click", applySeasonSelection);
            });

            const legendGrp = mapSVG.select("g.temp-legend");
            legendGrp.selectAll("*").remove();
            if (temperatureLayerEnabled) {
                const barW = 140, barH = 10;
                const legX = (mapWidth - barW) / 2;
                const legY = mapHeight - mapMargin.bottom - 30;
                legendGrp.append("text").attr("class", "temp-legend-title").attr("x", legX).attr("y", legY - 2).text("Temperature (°C)");
                legendGrp.append("rect").attr("x", legX).attr("y", legY).attr("width", barW).attr("height", barH).attr("fill", "url(#temp-legend-gradient)").attr("stroke", "#333").attr("stroke-width", 0.5);
                const ticks = [30, 22, 15, 10, 0, -10];
                ticks.forEach((t, i) => {
                    const px = legX + (i / (ticks.length - 1)) * barW;
                    legendGrp.append("text").attr("class", "temp-legend-label").attr("x", px).attr("y", legY + barH + 12).attr("text-anchor", "middle").text(t + "°");
                });
            }

            applyTemperatureLayerOpacity();
            renderLatLongLoupe();
        }

        function showBirdRoutesList(englishName, routeCodes) {
            // Open the bird timeline tab and animate this bird's routes in lat/long space
            showBirdRoutesOnMap(englishName, routeCodes);
        }

        function getRouteRows(routeCode) {
            const currentRows = dataByRoute[routeCode];
            if (currentRows && currentRows.length) return currentRows;
            return allData.filter(d => d["Migratory route codes"] === routeCode);
        }

        function showRouteDetails(routeCode) {
            const panel = document.getElementById("details-panel");
            const contentEl = document.getElementById("details-content");
            const windingEl = document.getElementById("details-winding");
            const listEl = document.getElementById("details-list");
            if (listEl) listEl.style.display = "none";
            if (windingEl) windingEl.style.display = "block";
            let rows = getRouteRows(routeCode);
            if (!rows || rows.length === 0) {
                panel.classList.remove("has-route");
                windingEl.innerHTML = "";
                contentEl.querySelectorAll(".details-node").forEach(el => el.remove());
                return;
            }
            panel.classList.add("has-route");
            contentEl.querySelectorAll(".details-node").forEach(el => el.remove());
            const order = { "Origin": 1, "Transit locations": 2, "Destination": 3 };
            const sorted = rows.slice().sort((a, b) => {
                const o = (order[(a["Migration nodes"] || "").trim()] || 0) - (order[(b["Migration nodes"] || "").trim()] || 0);
                if (o !== 0) return o;
                return (a["Migration start year"] || 0) * 100 + (a["Migration start month"] || 0) - (b["Migration start year"] || 0) * 100 - (b["Migration start month"] || 0);
            });
            const nodes = sorted.map(d => {
                const type = (d["Migration nodes"] || "").trim() || "Transit";
                const country = String(d["Countries"] || d["Country"] || "").trim() || "—";
                const city = String(d["Provinces"] || d["Province"] || d["City"] || "").trim() || "—";
                const year = d["Migration start year"];
                const month = d["Migration start month"];
                const temp = getTemperatureByCoords(+d.GPS_yy, +d.GPS_xx, year, month);
                return { type, country, city, month, year, temp };
            });
            const deduped = [];
            let lastKey = "";
            nodes.forEach(n => {
                // Keep one entry per (country, city, year, month) so each month's stop is visible
                const key = n.country + "|" + n.city + "|" + (n.year ?? "") + "|" + (n.month ?? "");
                if (key === lastKey) return;
                lastKey = key;
                deduped.push(n);
            });
            if (deduped.length === 0) return;
            const birdName = String(rows[0]["english name"] || rows[0]["English Name"] || "").trim();
            if (birdName) deduped[0].englishName = birdName;

            const w = contentEl.clientWidth || panel.clientWidth || 240;
            const padding = 50;
            const stepY = 56;
            const contentHeight = Math.max(460, padding * 2 + (deduped.length - 1) * stepY);
            contentEl.style.height = contentHeight + "px";

            const centerX = w / 2;
            const pathPoints = deduped.map((_, i) => {
                const y = padding + i * stepY;
                const x = centerX + 55 * Math.sin(i * 0.85);
                return [x, y];
            });

            windingEl.innerHTML = "";
            windingEl.setAttribute("width", w);
            windingEl.setAttribute("height", contentHeight);
            const pathD = d3.line().curve(d3.curveCatmullRom.alpha(0.5))(pathPoints);
            d3.select(windingEl).append("path").attr("d", pathD).attr("fill", "none").attr("stroke", "#9370db").attr("stroke-width", 2).attr("opacity", 0.7);
            // Van Gogh–style temperature blotches at each node (no circles)
            const blotchGrp = d3.select(windingEl).append("g")
                .attr("class", "details-path-dots details-temp-blotch-layer")
                .attr("opacity", temperatureLayerOpacity);
            deduped.forEach((n, i) => {
                const [px, py] = pathPoints[i];
                const fill = (n.temp != null && isFinite(+n.temp)) ? tempColorScale(+n.temp) : tempColorScale(15);
                const g = blotchGrp.append("g").attr("class", "city-temp-blotch").attr("transform", `translate(${px},${py}) scale(3.5)`);
                drawVanGoghBlotch(g, 0, 0, fill);
            });

            deduped.forEach((n, i) => {
                const [px, py] = pathPoints[i];
                const leftSide = i % 2 === 0;
                const div = document.createElement("div");
                div.className = "details-node";
                const tempStr = n.temp != null ? n.temp.toFixed(1) + " °C" : "—";
                div.style.color = "#000";
                div.style.top = (py - 24) + "px";
                if (leftSide) {
                    div.style.left = Math.max(8, px - 98) + "px";
                    div.style.right = "auto";
                } else {
                    div.style.left = "auto";
                    div.style.right = Math.max(8, w - px - 98) + "px";
                }
                const nameLine = n.englishName ? `<div class="node-bird">${n.englishName}</div>` : "";
                const cityLine = n.city && n.city !== "—" ? `<div class="node-city">${n.city}</div>` : "";
                const monthStr = (n.month != null && n.year != null)
                    ? `${months[(n.month - 1 + 12) % 12] || ""} ${n.year}`
                    : "—";
                const dateLine = `<div class="node-date">${monthStr}</div>`;
                div.innerHTML = `${nameLine}${cityLine}${dateLine}<div class="node-country">${n.country}</div><div class="node-temp">${tempStr}</div>`;
                contentEl.appendChild(div);
            });
        }

        function showRouteInfo(routeCode) {
            const infoDiv = document.getElementById("route-info");
            let rows = getRouteRows(routeCode);
            if (!rows || rows.length === 0) {
                infoDiv.style.display = "none";
                return;
            }
            updateSelectedRouteInStreamgraph(routeCode);
            setDetailsTab("route");
            showRouteDetails(routeCode);
            infoDiv.style.display = "none";
        }

        // Clear route info and highlight
        function clearRouteInfo(){
            const infoDiv = document.getElementById("route-info");
            infoDiv.innerHTML = "";
            infoDiv.style.display = "none";
            clearLinkedRouteHover();
            updateSelectedRouteInStreamgraph(null);
            const panel = document.getElementById("details-panel");
            if (panel) {
                panel.classList.remove("has-route");
                panel.querySelectorAll(".details-node").forEach(el => el.remove());
                const w = document.getElementById("details-winding");
                if (w) w.innerHTML = "";
                const listEl = document.getElementById("details-list");
                if (listEl) { listEl.innerHTML = ""; listEl.style.display = "none"; }
                if (w) w.style.display = "block";
            }
            clearRouteHighlights();
        }
        window.clearRouteHighlights = function() {
            const map = d3.select("#map");
            map.selectAll(".route")
                .classed("route-highlight", false)
                .classed("route-overlay-highlight", false)
                .each(function() {
                    const sel = d3.select(this);
                    const groupBase = +sel.attr("data-base-width") || +sel.attr("stroke-width") || 1.8;
                    sel.attr("opacity", null);
                    sel.selectAll("path.route-stroke").each(function() {
                        const p = d3.select(this);
                        const baseW = +p.attr("data-base-stroke-width") || +p.attr("stroke-width") || groupBase;
                        const bs = p.attr("data-base-stroke");
                        if (bs != null && bs !== "") p.attr("stroke", bs);
                        p.attr("stroke-width", baseW);
                    });
                    sel.selectAll("path.route-fill").attr("stroke", "none").attr("stroke-width", null);
                    sel.selectAll(".winter-mark").each(function() {
                        const p = d3.select(this);
                        const baseCol = p.attr("data-base-stroke");
                        const baseW = +p.attr("data-base-stroke-width") || +p.attr("stroke-width") || 1;
                        if (baseCol != null && baseCol !== "") p.attr("stroke", baseCol);
                        p.attr("stroke-width", baseW);
                    });
                    if (sel.attr("stroke-width") != null) sel.attr("stroke-width", groupBase);
                });
            map.selectAll("circle.route").attr("r", 3);
            map.selectAll("g.route-flower").each(function() {
                const base = d3.select(this).attr("data-transform-base");
                if (base) d3.select(this).attr("transform", base);
            });
        };

        (function initTemperatureOpacitySlider() {
            const slider = document.getElementById("temperature-layer-opacity");
            const valueEl = document.getElementById("temperature-layer-opacity-value");
            if (!slider || !valueEl) return;
            function syncFromSlider() {
                const v = Math.max(0, Math.min(100, +slider.value));
                temperatureLayerOpacity = v / 100;
                valueEl.textContent = Math.round(v) + "%";
                applyTemperatureLayerOpacity();
            }
            slider.addEventListener("input", syncFromSlider);
            syncFromSlider();
        })();

        // Temperature layer: fetch from Open-Meteo API when user enables the option
        document.getElementById("show-temperature-layer").addEventListener("change", function() {
            const checked = this.checked;
            temperatureLayerEnabled = !!checked;
            if (checked && !temperatureDataLoaded) {
                const loadingEl = document.getElementById("temp-loading");
                if (loadingEl) loadingEl.style.display = "block";
                const waypoints = isBirdTabActive() && currentBirdTimelineName
                    ? getBirdWaypoints(currentBirdTimelineName)
                    : getVisibleWaypoints();
                loadTemperatureDataViaAPI(waypoints).then(function() {
                    temperatureDataLoaded = true;
                    if (isBirdTabActive() && currentBirdTimelineName) {
                        showBirdRoutesOnMap(currentBirdTimelineName, currentBirdTimelineRouteCodes);
                    } else {
                        updateMap();
                    }
                    const el = document.getElementById("temp-loading");
                    if (el) el.style.display = "none";
                }).catch(() => {
                    const el = document.getElementById("temp-loading");
                    if (el) el.style.display = "none";
                });
            } else {
                if (isBirdTabActive() && currentBirdTimelineName) {
                    showBirdRoutesOnMap(currentBirdTimelineName, currentBirdTimelineRouteCodes);
                } else {
                    updateMap();
                }
            }
        });

        // Geographic basemap toggle
        document.getElementById("show-geographic-map").addEventListener("change", function() {
            showGeographicMap = !!this.checked;
            if (isBirdTabActive() && currentBirdTimelineName) {
                showBirdRoutesOnMap(currentBirdTimelineName, currentBirdTimelineRouteCodes);
            } else {
                updateMap();
            }
        });

        // Initial draw (no temperature load until user opts in)
        updateMap();
    });
</script>
