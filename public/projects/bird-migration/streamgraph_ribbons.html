<!DOCTYPE html>
<html lang="en">
<head>

    <style>

<body>
<div id="temp-loading" style="display: none;" class="temp-loading-msg">Loading temperature from API…</div>
<div class="container">
    <div class="view-title">Bird Migration Data Collected from Books</div>
    <div class="layout-grid">
        <div class="grid-left" style="grid-row: 1 / span 3;">
            <div class="flow-stack">
                <svg id="streamgraph" width="1000" height="226"></svg>

                <div class="map-wrapper">
                    <div class="map-tab-panel" id="map-main-panel">
                        <svg id="map" width="1000" height="460"></svg>
                    </div>
                    <div class="map-tab-panel" id="map-bird-panel" style="display:none">

                    </div>
                    <div class="map-tabs">

                        <button class="map-tab" data-map-tab="bird">Bird timeline</button>

        </div>
        <div class="grid-right right-column" style="grid-row: 1 / span 3;">
            <div class="direction-panel">
                <h4>Route direction</h4>
                <label><input type="checkbox" name="dir" value="East to West" checked> East → West</label>
                <label><input type="checkbox" name="dir" value="West to East" checked> West → East</label>

                <label><input type="checkbox" name="dir" value="South to North" checked> South → North</label>

                <div class="temp-opacity-control">

                        <span class="temp-opacity-label" id="temperature-layer-opacity-label">Opacity</span>
                        <input type="range" id="temperature-layer-opacity" min="0" max="100" value="85" step="1" aria-labelledby="temperature-layer-opacity-label" aria-valuemin="0" aria-valuemax="100">
                        <span class="temp-opacity-value" id="temperature-layer-opacity-value">85%</span>
                    </div>
                </div>

            <div id="details-panel" class="details-panel tall">
                <div class="details-tabs">
                    <button class="details-tab details-tab-active" data-details-tab="route">Route details</button>
                    <button class="details-tab" data-details-tab="declutter">Untangled routes</button>
                </div>
                <div id="details-route-pane" class="details-pane">
                    <div id="details-placeholder" class="details-placeholder">Select a route on the map to see details.</div>
                    <div id="details-scroll" class="details-scroll">
                        <div id="details-content" class="details-content">
                            <svg id="details-winding" class="details-winding"></svg>

                        </div>
                    </div>
                </div>
                <div id="details-declutter-pane" class="details-pane details-declutter-pane" style="display:none;">
                    <svg id="details-declutter-svg" class="details-declutter-svg"></svg>
                </div>
            </div>
        </div>

        <!-- left grid row 3 is now occupied by the streamgraph/overlay/map stack above -->
    </div>
    <div id="route-info"></div>
</div>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script>
    // Configuration
    const streamWidth = 1000, streamHeight = 160, margin = {top:30, right:16, bottom:36, left:52};
    const mapWidth = 1000, mapHeight = 460;
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const predatorBeakImageHref = "file:///C:/Users/shahb/.cursor/projects/c-Users-shahb-OneDrive-Desktop-Information-Visualization-D3-Bird-migration/assets/c__Users_shahb_AppData_Roaming_Cursor_User_workspaceStorage_198a00839b213e03cd2247ad2da1fe4a_images_Gemini_Generated_Image_w6md4zw6md4zw6md-2b6b6869-0443-4383-bea2-5f174f63d327.png";

    let allData, yearMonths, keys, streamData, x, y, color, dataByRoute = {};
    let routeDirection = {};  // routeCode -> "East to West" | "West to East" | "North to South" | "South to North"
    let routeDotsData = [];   // { yearMonth, routeCode, category, direction }
    let selectedDirections = ["East to West", "West to East", "North to South", "South to North"];
    let selectedCategory = null;  // null = all categories; string = single Bird Category
    let selectedSeason = "All";   // "All" or one of "Spring","Summer","Autumn","Winter"
    let temperatureLookup = {};   // "lat_lon_ym" -> AverageTemperature (from API)
    let temperatureLayerEnabled = false;
    let temperatureDataLoaded = false;
    /** Overall opacity for Van Gogh temperature blotches (maps + route details). */
    let temperatureLayerOpacity = 0.85;
    let showGeographicMap = false;
    let activeDetailsTab = "route";
    let linkedHoverRouteSet = null; // Set<string> | null
    let selectedRouteCodeGlobal = null; // selected route from map/details interactions
    // Temperature color: very hot red → orange (hot) → yellow (warm) → light blue (10 °C) → dark blue (cold) → grey (minus temps).
    const tempColorScale = d3.scaleLinear()
        .domain([30, 22, 15, 10, 3, 0, -10])
        .range(["#b2182b", "#ef8a62", "#fee090", "#abd9e9", "#74add1", "#4575b4", "#777777"])
        .clamp(true);
    const tempLegendDomain = [30, -10];  // for legend and consistent mapping

    function classifyDirection(originLon, originLat, destLon, destLat) {
        const dLon = destLon - originLon, dLat = destLat - originLat;
        if (Math.abs(dLon) >= Math.abs(dLat)) return dLon < 0 ? "East to West" : "West to East";
        return dLat < 0 ? "North to South" : "South to North";
    }

    function tempCacheKey(lat, lon, year, month) {
        if (year == null || month == null || lat == null || lon == null) return null;
        const ym = year + "-" + ("0" + month).slice(-2);
        const rlat = Math.round(+lat * 10) / 10, rlon = Math.round(+lon * 10) / 10;
        return rlat + "_" + rlon + "_" + ym;
    }

    function getTemperatureByCoords(lat, lon, year, month) {
        const key = tempCacheKey(lat, lon, year, month);
        return key != null ? (temperatureLookup[key] ?? null) : null;
    }

    function fetchTemperatureFromAPI(lat, lon, year, month) {
        const key = tempCacheKey(lat, lon, year, month);
        if (!key || temperatureLookup[key] != null) return Promise.resolve(temperatureLookup[key]);
        const y = parseInt(year, 10), m = parseInt(month, 10);
        if (isNaN(y) || isNaN(m) || m < 1 || m > 12) return Promise.resolve(null);
        const lastDay = new Date(y, m, 0).getDate();
        const start = y + "-" + ("0" + m).slice(-2) + "-01";
        const end = y + "-" + ("0" + m).slice(-2) + "-" + ("0" + lastDay).slice(-2);
        const url = "https://archive-api.open-meteo.com/v1/archive?latitude=" + (+lat) + "&longitude=" + (+lon) +
            "&start_date=" + start + "&end_date=" + end + "&daily=temperature_2m_max,temperature_2m_min&timezone=auto";
        return fetch(url).then(r => r.json()).then(data => {
            const daily = data.daily;
            if (!daily || !daily.time || !daily.temperature_2m_max || !daily.temperature_2m_min) return null;
            let sum = 0, n = 0;
            for (let i = 0; i < daily.time.length; i++) {
                const max = daily.temperature_2m_max[i], min = daily.temperature_2m_min[i];
                if (max != null && min != null && isFinite(max) && isFinite(min)) {
                    sum += (max + min) / 2;
                    n++;
                }
            }
            const mean = n > 0 ? sum / n : null;
            if (mean != null) temperatureLookup[key] = mean;
            return mean;
        }).catch(() => null);
    }

    function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

    // Van Gogh–style brush strokes: short curved strokes in a rectangular patch (wider than tall)
    function vanGoghStrokes(seed) {
        const strokes = [];
        const w = 10, h = 5;  // rectangular extent: width 10, height 5
        const n = 12;
        for (let i = 0; i < n; i++) {
            const u = (i / n) + (seed % 1) * 0.15;
            const x1 = (u - 0.5) * w * 2 + (seed * 11 % 1.2);
            const y1 = ((seed * 13 + i * 0.7) % 1 - 0.5) * h * 2;
            const x2 = x1 + (seed * 17 % 4) - 2 + (i % 2) * 2;
            const y2 = y1 + (seed * 19 % 2) - 0.8;
            const cx = (x1 + x2) / 2 + (seed * 7 % 1.5);
            const cy = (y1 + y2) / 2 + (seed * 23 % 1) - 0.5;
            strokes.push(`M${x1.toFixed(2)},${y1.toFixed(2)} Q${cx.toFixed(2)},${cy.toFixed(2)} ${x2.toFixed(2)},${y2.toFixed(2)}`);
        }
        return strokes;
    }

    function drawVanGoghBlotch(layer, x, y, fillColor) {
        const g = layer.append("g").attr("class", "city-temp-blotch").attr("transform", `translate(${x},${y})`);
        const seed = Math.abs((x * 7 + y * 13) % 1000) / 1000;
        const strokes = vanGoghStrokes(seed);
        strokes.forEach((d, i) => {
            g.append("path")
                .attr("d", d)
                .attr("fill", "none")
                .attr("stroke", fillColor)
                .attr("stroke-width", 1.8 + (i % 3) * 0.3)
                    .attr("opacity", 0.5 + (seed * 31 % 8) / 100);
        });
    }

    function loadTemperatureDataViaAPI(waypoints) {
        const seen = new Set();
        const toFetch = [];
        waypoints.forEach(w => {
            const k = tempCacheKey(w.lat, w.lon, w.year, w.month);
            if (!k || temperatureLookup[k] != null || seen.has(k)) return;
            seen.add(k);
            toFetch.push({ lat: w.lat, lon: w.lon, year: w.year, month: w.month });
        });
        const CONCURRENCY = 4;
        const run = (i) => {
            if (i >= toFetch.length) return Promise.resolve();
            const batch = toFetch.slice(i, Math.min(i + CONCURRENCY, toFetch.length));
            return Promise.all(batch.map(w => fetchTemperatureFromAPI(w.lat, w.lon, w.year, w.month)))
                .then(() => delay(120)).then(() => run(i + CONCURRENCY));
        };
        return run(0);
    }

    // Load main data first so the page becomes interactive quickly
    Promise.all([
        d3.csv("https://raw.githubusercontent.com/shahbano-farooq/bird_migration_project/main/bird_migration.csv", d3.autoType),
        d3.json("https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson")
    ]).then(function([data, world]) {
        allData = data;
        // Parse year-month for x-axis
        data.forEach(d => {
            d.yearMonth = d["Migration start year"] + '-' + ('0' + d["Migration start month"]).slice(-2);
        });

        // Route direction: based only on source (Origin) and destination (Destination), not transit locations
        const byRoute = d3.groups(data, d => d["Migratory route codes"]);
        byRoute.forEach(([code, points]) => {
            const originRow = points.find(d => (d["Migration nodes"] || "").trim() === "Origin");
            const destRow = points.find(d => (d["Migration nodes"] || "").trim() === "Destination");
            if (!originRow || !destRow) {
                routeDirection[code] = "West to East";
                return;
            }
            const oLon = +originRow.GPS_xx, oLat = +originRow.GPS_yy, dLon = +destRow.GPS_xx, dLat = +destRow.GPS_yy;
            if (isFinite(oLon) && isFinite(oLat) && isFinite(dLon) && isFinite(dLat))
                routeDirection[code] = classifyDirection(oLon, oLat, dLon, dLat);
            else routeDirection[code] = "West to East";
        });

        // One dot per (yearMonth, routeCode)
        const seen = new Set();
        data.forEach(d => {
            const ym = d.yearMonth, code = d["Migratory route codes"], cat = d["Bird Category"] || d["bird families"] || d["english name"];
            const key = ym + "|" + code;
            if (seen.has(key)) return;
            seen.add(key);
            const englishName = String(d["english name"] || d["English Name"] || "").trim();
            routeDotsData.push({ yearMonth: ym, routeCode: code, category: cat, direction: routeDirection[code] || "West to East", englishName });
        });

        // Group by year-month and Bird Category
        let allKeysSet = new Set();
        data.forEach(d => {
            allKeysSet.add(d["Bird Category"] || d["bird families"] || d["english name"]);
        });
        keys = Array.from(allKeysSet);

        // Build YearMonth domain sorted
        yearMonths = Array.from(new Set(data.map(d=>d.yearMonth))).sort();

        // Streamgraph data
        streamData = yearMonths.map(ym => {
            let item = { yearMonth: ym };
            data.filter(d=>d.yearMonth===ym).forEach(d => {
                const key = d["Bird Category"] || d["bird families"] || d["english name"];
                item[key] = (item[key] || 0) + 1;
            });
            keys.forEach(k => { if(!item.hasOwnProperty(k)) item[k]=0; });
            return item;
        });

        // STREAMGRAPH
        const svg = d3.select("#streamgraph")
            .attr("width", streamWidth)
            .attr("height", streamHeight+margin.top+margin.bottom);

        x = d3.scalePoint()
            .domain(yearMonths)
            .range([margin.left, streamWidth-margin.right]);

        y = d3.scaleLinear()
            .range([streamHeight+margin.top, margin.top]);

        // Stack data
        const stack = d3.stack()
            .keys(keys)
            .order(d3.stackOrderNone)
            .offset(d3.stackOffsetWiggle);

        const series = stack(streamData);

        // Y domain: wiggle produces positive and negative values. To keep the stream readable
        // and comparable to actual route counts, compress the vertical amplitude so that the
        // maximum stacked height (total birds in a time slice) roughly sets the scale.
        const yMin = d3.min(series, s => d3.min(s, d => d[0]));
        const yMax = d3.max(series, s => d3.max(s, d => d[1]));
        const yAbs = Math.max(Math.abs(yMin), Math.abs(yMax)) || 1;

        // Max total count over all time points
        const totalsPerTime = streamData.map(row => d3.sum(keys, k => +row[k] || 0));
        const maxTotal = d3.max(totalsPerTime) || 1;
        const targetAbs = maxTotal * 1.2;  // small headroom

        if (targetAbs < yAbs) {
            const scale = targetAbs / yAbs;
            series.forEach(s => {
                s.forEach(d => {
                    d[0] *= scale;
                    d[1] *= scale;
                });
            });
            y.domain([-targetAbs, targetAbs]);
        } else {
            y.domain([-yAbs, yAbs]);
        }

        // Color scale – high-quality qualitative palette (inspired by Paul Tol),
        // tuned per bird category to be distinct and harmonious.
        const tolPalette = [
            "#332288", // dark blue
            "#88CCEE", // light cyan
            "#44AA99", // blue-green
            "#117733", // green
            "#999933", // olive
            "#DDCC77", // sand
            "#CC6677", // rose
            "#882255", // wine
            "#AA4499"  // purple
        ];
        let tolIndex = 0;
        function nextTolColor() {
            const col = tolPalette[tolIndex % tolPalette.length];
            tolIndex++;
            return col;
        }
        const colorMap = {};
        keys.forEach(k => {
            const name = (k || "").toString().toLowerCase();
            let col;
            if (name.includes("raptor") || name.includes("predator")) {
                col = "#882255"; // swapped with aerial
            } else if (name.includes("aquatic")) {
                col = "#2B2D8E"; // navy purple-blue for aquatic
            } else if (name.includes("shore")) {
                col = "#34a6ba"; // shorebirds
            } else if (name.includes("song")) {
                col = "#CC6677"; // rose for songbirds
            } else if (name.includes("aerial")) {
                col = "#D9C4B0"; // swapped with predators
            } else if (name.includes("forest") || name.includes("ground")) {
                col = "#117733"; // green for forest/ground
            } else {
                col = nextTolColor();
            }
            colorMap[k] = col;
        });
        color = function(category) {
            return colorMap[category] || nextTolColor();
        };

        // Beak shapes: Raptors, Shorebirds, Aquatic, Song, Aerial, Forest/Ground
        function getBeakPaths(category) {
            const c = (category || "").toString().toLowerCase();
            const fill = color(category);
            // Predators: cubic Bezier construction (mathematically controlled hook + lower jaw).
            if (c.includes("raptor") || c.includes("predator")) {
                const hi = d3.interpolateRgb(fill, "#ffffff")(0.28);
                const lo = d3.interpolateRgb(fill, "#000000")(0.15);
                return [
                    // Top hook (from your control points, centered around origin):
                    // P0(-6,5), P1(1,7), P2(8,0), P3(6,-7)
                    { d: "M-6,5 C1,7 8,0 6,-7 C4,-5.2 1.8,-2.8 -0.6,-0.6 C-2.8,1.4 -4.8,2.4 -6,2.9 Z", fill, stroke: null, flipY: true },
                    // Bottom jaw (Bezier continuation; P3 chosen close to tip for closure):
                    // P0(-6,3), P1(-2,1), P2(4,-3), P3(5,-6)
                    { d: "M-6,3 C-2,1 4,-3 5,-6 C3.2,-4.6 1.2,-2.9 -0.9,-1.1 C-3.1,0.7 -4.9,1.9 -6,2.5 Z", fill: lo, stroke: null },
                    // Top highlight band
                    { d: "M-5.6,4.1 C0.2,5.6 5.6,1.3 4.8,-2.0 C3.3,-0.6 1.4,0.5 -0.8,1.1 C-2.8,1.7 -4.4,2.5 -5.6,4.1 Z", fill: hi, stroke: null },
                    // Lower light edge
                    { d: "M-5.2,2.6 C-1.8,1.0 2.7,-1.9 3.9,-3.7 C2.0,-2.8 -0.2,-1.3 -2.3,0.2 C-3.8,1.3 -4.8,2.0 -5.2,2.6 Z", fill: hi, stroke: null }
                ];
            }
            // Shorebirds: long needle beak – thicker at back, thinner at tip
            if (c.includes("shore")) {
                return [{ d: "M-8,-1.2 L8,-0.25 L8,0.25 L-8,1.2 Z", fill, stroke: null }];
            }
            // Aquatic: circle (head) + short horizontal dash
            if (c.includes("aquatic")) {
                return [
                    { d: "M-2.5,0 m-1.5,0 a1.5,1.5 0 1,1 3,0 a1.5,1.5 0 1,1 -3,0", fill: "none", stroke: fill },
                    { d: "M-2.5,0 L2.5,0", fill: "none", stroke: fill }
                ];
            }
            // Song birds: wider horizontal open V with outline only, flipped to open more
            if (c.includes("song")) {
                // Two straight segments forming a very open sideways V, stroke-only, pointing left
                return [{ d: "M3,-1.8 L-3.8,0 M3,1.8 L-3.8,0", fill: "none", stroke: fill }];
            }
            // Aerial: small upwards slim beak (horizontally flipped via negative rotation)
            if (c.includes("aerial")) {
                return [{ d: "M0,4 L-1.2,-3 L0,-4 L1.2,-3 Z", fill, stroke: null, rotation: -120 }];
            }
            // Forest and Ground: two lines meeting at a point (open-beak style)
            if (c.includes("forest") || c.includes("ground")) {
                // Wedge Bezier beak (no hook), based on provided control points:
                // Upper: P0(0,4) P1(2,3.5) P2(4,2.5) P3(6,2)
                // Lower: P0(0,0) P1(2,0.5) P2(4,1.5) P3(6,2)
                // Recentered by shifting x-3, y-2 so the symbol sits near origin.
                return [
                    { d: "M-3.4,2.25 C-1.13,1.7 1.13,0.55 3.4,0 C1.13,-0.55 -1.13,-1.7 -3.4,-2.25 Z", fill, stroke: null }
                ];
            }
            return [{ d: "M0,-2.5 L2,2.5 L-2,2.5 Z", fill, stroke: null }];
        }
        function getBeakRotation(category) {
            const paths = getBeakPaths(category);
            return paths[0].rotation != null ? paths[0].rotation : 0;
        }
        function getBeakPath(category) {
            const paths = getBeakPaths(category);
            return paths[0].d;
        }
        function isBeakStrokeOnly(category) {
            const paths = getBeakPaths(category);
            return paths[0].fill === "none" && paths[0].stroke != null;
        }
        function renderBeakSymbol(g, category, opts) {
            const strokeWidth = (opts && opts.strokeWidth) != null ? opts.strokeWidth : 2.5;
            const paths = getBeakPaths(category);
            const rotation = paths[0].rotation != null ? paths[0].rotation : 0;
            const flipY = !!paths[0].flipY;
            let transform = "";
            if (rotation !== 0) transform += "rotate(" + rotation + ") ";
            if (flipY) transform += "scale(1,-1)";
            const target = transform.trim() ? g.append("g").attr("transform", transform.trim()) : g;
            paths.forEach(p => {
                if (p.imageHref) {
                    target.append("image")
                        .attr("href", p.imageHref)
                        .attr("x", p.x != null ? p.x : -8)
                        .attr("y", p.y != null ? p.y : -8)
                        .attr("width", p.width != null ? p.width : 16)
                        .attr("height", p.height != null ? p.height : 16)
                        .attr("preserveAspectRatio", "xMidYMid meet");
                    return;
                }
                const path = target.append("path").attr("d", p.d);
                if (p.fill && p.fill !== "none") {
                    // Filled beaks: solid fill, no outline stroke
                    path.attr("fill", p.fill).attr("stroke", "none");
                } else {
                    // Stroke-only beaks (e.g., aquatic head ring, song, forest/ground)
                    path.attr("fill", "none")
                        .attr("stroke", p.stroke || "#222")
                        .attr("stroke-width", strokeWidth)
                        .attr("stroke-linecap", "round");
                }
            });
        }

        // Area generator
        const area = d3.area()
            .x((d,i) => x(streamData[i].yearMonth))
            .y0(d => y(d[0]))
            .y1(d => y(d[1]))
            .curve(d3.curveCatmullRom);

        // Setup axes
        const xAxisG = svg.append("g")
            .attr("class", "x-axis-streamgraph")
            .attr("transform", `translate(0,${streamHeight+margin.top})`);
        // Labelled ticks: only a subset of year-months (so axis is readable)
        const labelStep = Math.max(1, Math.round(yearMonths.length / 15));
        const labelYearMonths = yearMonths.filter((d, i) => i % labelStep === 0);
        xAxisG.call(d3.axisBottom(x).tickValues(labelYearMonths));

        // Minor ticks: one per calendar month between each pair of labels (even if no data).
        // Position by interpolating in time between the two label positions, so many months in a gap → ticks close; few months with data between labels → ticks have space.
        const parseYM = d3.timeParse("%Y-%m");
        const minorTickPositions = [];
        for (let j = 0; j < labelYearMonths.length - 1; j++) {
            const d0 = parseYM(labelYearMonths[j]);
            const d1 = parseYM(labelYearMonths[j + 1]);
            if (!d0 || !d1) continue;
            const x0 = x(labelYearMonths[j]);
            const x1 = x(labelYearMonths[j + 1]);
            const monthsBetween = d3.timeMonths(d3.timeMonth.offset(d0, 1), d1);
            monthsBetween.forEach(d => {
                const t = (d - d0) / (d1 - d0);
                minorTickPositions.push(x0 + t * (x1 - x0));
            });
        }
        xAxisG.selectAll(".minor-tick")
            .data(minorTickPositions)
            .join("line")
            .attr("class", "minor-tick")
            .attr("x1", pos => pos)
            .attr("x2", pos => pos)
            .attr("y1", 0)
            .attr("y2", -6)
            .attr("stroke", "rgba(0,0,0,0.12)")
            .attr("stroke-width", 1);
        const streamHoverYearG = svg.append("g").attr("class", "stream-hover-year-guides");

        const yAxisGroup = svg.append("g")
            .attr("transform", `translate(${margin.left},0)`)
            .call(d3.axisLeft(y).tickFormat(d3.format("d")));
        yAxisGroup.append("text")
            .attr("transform", "rotate(-90)")
            .attr("y", -margin.left + 18)
            .attr("x", -((streamHeight + margin.top + margin.bottom) / 2))
            .attr("text-anchor", "middle")
            .attr("font-size", "11px")
            .attr("fill", "#333")
            .text("Number of birds");

        // Baseline at zero to show center reference
        const y0 = y(0);
        if (y0 >= margin.top && y0 <= streamHeight + margin.top) {
            svg.append("line")
                .attr("class", "y-baseline")
                .attr("x1", margin.left)
                .attr("x2", streamWidth - margin.right)
                .attr("y1", y0)
                .attr("y2", y0)
                .attr("stroke", "#999")
                .attr("stroke-width", 0.8)
                .attr("stroke-dasharray", "4,2")
                .attr("opacity", 0.7);
        }

        // Draw stream layers
        const streams = svg.append("g")
            .selectAll(".stream-area")
            .data(series)
            .enter().append("path")
            .attr("class", "stream-area")
            .attr("fill", d => color(d.key))
            .attr("d", area);

        // Route dots: one dot per (yearMonth, routeCode)
        let currentLensSelection = null;
        function dotX(d) {
            const base = x(d.yearMonth);
            // Keep earliest visible beaks off the y-axis area.
            if (String(d.yearMonth) === "1979-08") return base + 9;
            return base;
        }
        function dotY(d) {
            const idx = yearMonths.indexOf(d.yearMonth), ki = keys.indexOf(d.category);
            if (idx < 0 || ki < 0) return (margin.top + streamHeight / 2);
            const band = series[ki][idx];
            const mid = (band[0] + band[1]) / 2;
            // Deterministic small jitter per route so overlapping routes separate slightly
            const jitter = (() => {
                let h = 0;
                const code = (d.routeCode + "");
                for (let i = 0; i < code.length; i++) {
                    h = (h << 5) - h + code.charCodeAt(i);
                }
                return (Math.abs(h) % 7 - 3) * 1.5;
            })();
            return y(mid) + jitter;
        }
        function updateRouteDots() {
            const filtered = routeDotsData.filter(d =>
                selectedDirections.includes(d.direction) &&
                (!selectedCategory || d.category === selectedCategory) &&
                (selectedSeason === "All" || !d.season || d.season === selectedSeason)
            );

            const dots = svg.selectAll(".route-dot").data(filtered, d => d.yearMonth + "|" + d.routeCode);
            dots.enter().append("g").attr("class", "route-dot")
            .attr("data-route", d => d.routeCode)
            .attr("transform", d => {
                const name = (d.category || "").toString().toLowerCase();
                const s = (name.includes("raptor") || name.includes("predator")) ? 0.92 : (name.includes("aerial") ? 1.55 : (name.includes("forest") || name.includes("ground")) ? 1.9 : 1.35);
                return `translate(${dotX(d)},${dotY(d)}) scale(${s})`;
            })
            .on("mouseover", function(event, d) {
                event.stopPropagation();
                setLinkedRouteHover([d.routeCode]);
            })
            .on("mouseleave", function() {
                clearLinkedRouteHover();
            })
            .each(function(d) {
                    renderBeakSymbol(d3.select(this), d.category, { strokeWidth: 2.6 });
            });
            dots.attr("data-route", d => d.routeCode).attr("transform", d => {
                const name = (d.category || "").toString().toLowerCase();
                const s = (name.includes("raptor") || name.includes("predator")) ? 0.92 : (name.includes("aerial") ? 1.55 : (name.includes("forest") || name.includes("ground")) ? 1.9 : 1.35);
                return `translate(${dotX(d)},${dotY(d)}) scale(${s})`;
            });
            updateSelectedRouteInStreamgraph(selectedRouteCodeGlobal);
            dots.exit().remove();
            if (currentLensSelection) {
                const [x0, x1] = currentLensSelection;
                svg.selectAll(".route-dot").each(function(d) {
                    if (!d) return;
                    const xi = dotX(d);
                    d3.select(this).style("visibility", (xi >= x0 && xi <= x1) ? "hidden" : "visible");
                });
            } else {
                svg.selectAll(".route-dot").style("visibility", "visible");
            }
        }
        updateRouteDots();

        document.querySelectorAll(".direction-panel input[name=dir]").forEach(cb => {
            cb.addEventListener("change", () => {
                selectedDirections = Array.from(document.querySelectorAll(".direction-panel input[name=dir]:checked")).map(el => el.value);
                updateRouteDots();
                updateMap();
                updateBeakOverlay();
            });
        });

        // Legend: All + Bird Categories; click to filter stream + map
        const legendKeys = ["All", ...keys];
        // Slightly increase spacing so long labels (e.g., Forest and Ground Birds) don't overlap
        const legendSpacing = Math.min(150, (streamWidth - margin.left - margin.right - 20) / legendKeys.length);
        const legend = svg.append("g").attr("class", "legend").selectAll("g.legend-item")
            .data(legendKeys).enter()
            .append("g")
            .attr("class", "legend-item")
            .attr("transform", (d, i) => {
                const name = (d || "").toString().toLowerCase();
                if (name === "all") {
                    // Nudge "All" rightwards, closer to the first category (e.g., Predators)
                    return `translate(${margin.left + legendSpacing * 0.6}, ${15})`;
                }
                return `translate(${margin.left + i * legendSpacing}, ${15})`;
            })
            .style("cursor", "pointer")
            .on("click", (event, d) => {
                selectedCategory = d === "All" ? null : d;
                updateLegendSelection();
                updateStreamVisibility();
                updateRouteDots();
                updateMap();
                updateBeakOverlay();
            });
        function legendSymbolScale(d) {
            const name = (d || "").toString().toLowerCase();
            if (name === "all") return 1.5;
            if (name.includes("raptor") || name.includes("predator")) return 1.45;
            if (name.includes("aerial")) return 3.2;
            if (name.includes("forest") || name.includes("ground")) return 3.0;
            return 1.9;
        }
        legend.append("g").attr("class", "legend-symbol")
            .attr("transform", d => `translate(9,7) scale(${legendSymbolScale(d)})`)
            .each(function(d) {
                const g = d3.select(this);
                if (d === "All") {
                    g.append("rect").attr("x", -7).attr("y", -5.5).attr("width", 14).attr("height", 11).attr("fill", "#888");
                    return;
                }
                renderBeakSymbol(g, d);
            });
        function legendLabel(d) {
            const name = (d || "").toString();
            const lower = name.toLowerCase();
            if (lower.includes("forest") && lower.includes("ground")) return "Forest & Ground";
            return name;
        }
        legend.append("text")
            .attr("class", "legend-text")
            .attr("x", 24).attr("y", 12)
            .text(d => legendLabel(d)).attr("font-size", "12px");

        function updateLegendSelection() {
            svg.selectAll("g.legend-item").classed("legend-inactive", d => {
                if (selectedCategory == null) return false;
                return d !== "All" && d !== selectedCategory;
            });
        }
        function updateStreamVisibility() {
            svg.selectAll(".stream-area").attr("opacity", d => {
                if (selectedCategory == null) return 0.7;
                return d.key === selectedCategory ? 0.7 : 0.12;
            });
        }

        // Brush: select a time range on the stream graph; only that range is shown on the map below
        let brush = d3.brushX()
            .extent([[margin.left, margin.top], [streamWidth-margin.right, streamHeight+margin.top]])
            .on("brush", ({selection}) => updateLens(selection))
            .on("brush end", brushed);

        const brushG = svg.append("g")
            .attr("class", "brush")
            .call(brush)
            .call(g => g.selectAll(".handle").style("display", "none"));

        // Fisheye lens: show general flow of each stream in the selection and use beaks in the selected area to form separated streams
        const lensId = "streamgraph-lens-clip";
        let defs = svg.select("defs");
        if (defs.empty()) defs = svg.append("defs");
        defs.append("clipPath").attr("id", lensId);
        const lensG = svg.append("g").attr("class", "streamgraph-lens").attr("pointer-events", "none").style("visibility", "hidden");
        function updateLens(selection) {
            currentLensSelection = selection && selection[1] - selection[0] >= 4 ? selection : null;
            setBeakOverlayExpanded(!!currentLensSelection);
            if (!selection) {
                lensG.style("visibility", "hidden");
                svg.selectAll(".route-dot")
                    .style("visibility", "visible")
                    .classed("route-lens-outside", false)
                    .classed("route-dim-linked", false);
                return;
            }
            const [x0, x1] = selection;
            const w = x1 - x0;
            if (w < 4) {
                lensG.style("visibility", "hidden");
                svg.selectAll(".route-dot")
                    .style("visibility", "visible")
                    .classed("route-lens-outside", false)
                    .classed("route-dim-linked", false);
                return;
            }
            lensG.style("visibility", "visible");
            defs.select(`#${lensId}`).selectAll("*").remove();
            defs.select(`#${lensId}`).append("rect")
                .attr("x", x0).attr("y", margin.top).attr("width", w).attr("height", streamHeight);
            lensG.selectAll("*").remove();
            lensG.append("rect")
                .attr("class", "lens-bg")
                .attr("x", x0).attr("y", margin.top).attr("width", w).attr("height", streamHeight)
                .attr("fill", "#fff");

            // Use a slightly compressed vertical band layout for categories so lanes sit
            // closer together and feel more like a continuous stack.
            const usableHeight = streamHeight * 0.7;
            const bandHeight = usableHeight / keys.length;
            const laneBaseY = margin.top + (streamHeight - usableHeight) / 2;

            const selectedIndices = yearMonths
                .map((ym, i) => ({ ym, i, xi: x(ym) }))
                .filter(({ xi }) => xi >= x0 && xi <= x1)
                .map(d => d.i);

            const selectedYM = yearMonths.filter((ym) => {
                const xi = x(ym);
                return xi >= x0 && xi <= x1;
            });
            const dotsInLens = routeDotsData.filter(d =>
                selectedYM.includes(d.yearMonth) &&
                selectedDirections.includes(d.direction) &&
                (!selectedCategory || d.category === selectedCategory) &&
                (selectedSeason === "All" || !d.season || d.season === selectedSeason)
            );
            const slotCountByKey = new Map();
            dotsInLens.forEach(d => {
                const key = d.yearMonth + "|" + d.category;
                slotCountByKey.set(key, (slotCountByKey.get(key) || 0) + 1);
            });
            const slotIndexByDot = new Map();
            dotsInLens.forEach(d => {
                const key = d.yearMonth + "|" + d.category;
                const idx = slotIndexByDot.get(key) || 0;
                slotIndexByDot.set(d.yearMonth + "|" + d.routeCode, idx);
                slotIndexByDot.set(key, idx + 1);
            });
            // Spread beaks within a category more loosely along x inside the lens.
            const jitterSpread = 10;
            dotsInLens.forEach(d => {
                const xi = dotX(d);
                const ki = Math.max(0, keys.indexOf(d.category));
                const laneTop = laneBaseY + ki * bandHeight;
                let laneY = laneTop + bandHeight / 2;
                if (selectedIndices.length >= 2 && series[ki]) {
                    const seg = selectedIndices.map(i => ({
                        y0: series[ki][i][0],
                        y1: series[ki][i][1]
                    }));
                    const segYMin = d3.min(seg, p => p.y0);
                    const segYMax = d3.max(seg, p => p.y1);
                    const segRange = segYMax - segYMin || 1;
                    const idx = yearMonths.indexOf(d.yearMonth);
                    const bandMid = (idx >= 0 && series[ki][idx])
                        ? (series[ki][idx][0] + series[ki][idx][1]) / 2
                        : (segYMin + segYMax) / 2;
                    laneY = laneTop + ((bandMid - segYMin) / segRange) * bandHeight;
                }
                const n = slotCountByKey.get(d.yearMonth + "|" + d.category) || 1;
                const slotIdx = slotIndexByDot.get(d.yearMonth + "|" + d.routeCode) ?? 0;
                const offsetX = n > 1 ? (slotIdx - (n - 1) / 2) * jitterSpread : 0;
                const offsetY = n > 1 ? (slotIdx % 2 === 0 ? 0 : 4) : 0;
                const name = (d.category || "").toString().toLowerCase();
                const s = (name.includes("raptor") || name.includes("predator")) ? 0.92 : (name.includes("aerial") ? 1.55 : (name.includes("forest") || name.includes("ground")) ? 1.9 : 1.35); // match streamgraph beak sizes
                const beakG = lensG.append("g")
                    .attr("class", "lens-beak")
                    .attr("transform", `translate(${xi + offsetX},${laneY + offsetY}) scale(${s})`);
                renderBeakSymbol(beakG, d.category, { strokeWidth: 2.6 });
            });
            lensG.attr("clip-path", `url(#${lensId})`);

            svg.selectAll(".route-dot").each(function(d) {
                if (!d) return;
                const xi = dotX(d);
                const outside = !(xi >= x0 && xi <= x1);
                d3.select(this)
                    .style("visibility", outside ? "visible" : "hidden")
                    .classed("route-lens-outside", outside)
                    .classed("route-dim-linked", outside);
            });
        }

        let selectedYearMonth = [];

        function getVisibleWaypoints() {
            let mapData;
            if (selectedYearMonth.length > 0) {
                mapData = allData.filter(d => selectedYearMonth.includes(d.yearMonth));
            } else {
                const byRoute = d3.groups(allData, d => d["Migratory route codes"]);
                const routesDir = byRoute.filter(([code]) => selectedDirections.includes(routeDirection[code] || "West to East"));
                const getCat = ([, arr]) => arr[0]["Bird Category"] || arr[0]["bird families"] || arr[0]["english name"];
                const byCat = d3.groups(routesDir, getCat);
                const maxRoutesPerCategory = 80;
                const sampled = byCat.flatMap(([, routes]) => routes.slice(0, maxRoutesPerCategory));
                mapData = sampled.flatMap(([code, arr]) => arr);
            }
            mapData = mapData.filter(d => selectedDirections.includes(routeDirection[d["Migratory route codes"]] || "West to East"));
            if (selectedCategory) {
                mapData = mapData.filter(d => (d["Bird Category"] || d["bird families"] || d["english name"]) === selectedCategory);
            }
            const byRoute = d3.groups(mapData, d => d["Migratory route codes"]);
            const order = { "Origin": 1, "Transit locations": 2, "Destination": 3 };
            const waypoints = [];
            const seen = new Set();
            byRoute.forEach(([route, arr]) => {
                const sorted = arr.slice()
                    .filter(d => d.GPS_xx != null && d.GPS_yy != null)
                    .sort((a, b) => {
                        const o = (order[(a["Migration nodes"] || "").trim()] || 0) - (order[(b["Migration nodes"] || "").trim()] || 0);
                        if (o !== 0) return o;
                        return (a["Migration start year"] || 0) * 100 + (a["Migration start month"] || 0) - (b["Migration start year"] || 0) * 100 - (b["Migration start month"] || 0);
                    });
                let lastKey = "";
                sorted.forEach(d => {
                    const key = String(d["Countries"] || d["Country"] || "").trim() + "|" + String(d["Provinces"] || d["Province"] || d["City"] || "").trim();
                    if (key === lastKey) return;
                    lastKey = key;
                    const k = tempCacheKey(+d.GPS_yy, +d.GPS_xx, d["Migration start year"], d["Migration start month"]);
                    if (k && !seen.has(k)) {
                        seen.add(k);
                        waypoints.push({ lat: +d.GPS_yy, lon: +d.GPS_xx, year: d["Migration start year"], month: d["Migration start month"] });
                    }
                });
            });
            return waypoints;
        }

        let brushDebounceTimer = null;
        function brushed({selection}) {
            updateLens(selection);
            if (selection) {
                let [x0, x1] = selection;
                selectedYearMonth = yearMonths.filter(ym => {
                    let xi = x(ym);
                    return xi >= x0 && xi <= x1;
                });
                if (brushDebounceTimer != null) clearTimeout(brushDebounceTimer);
                brushDebounceTimer = setTimeout(() => {
                    brushDebounceTimer = null;
                    updateMap();
                    updateBeakOverlay();
                    clearRouteInfo();
                }, 0);
            } else {
                selectedYearMonth = [];
                if (brushDebounceTimer != null) clearTimeout(brushDebounceTimer);
                brushDebounceTimer = setTimeout(() => {
                    brushDebounceTimer = null;
                    updateMap();
                    updateBeakOverlay();
                    clearRouteInfo();
                }, 0);
            }
        }

        // Overlay between streamgraph and map: English-name labels at top; copies of beaks fall into loose piles
        const overlayHeight = 72;
        const beakOverlaySvg = d3.select("#beak-overlay").attr("height", 0);
        const beakOverlayDefs = beakOverlaySvg.append("defs");
        const beakFlowGrad = beakOverlayDefs.append("linearGradient")
            .attr("id", "beak-overlay-flow-grad")
            .attr("x1", "0%").attr("y1", "0%")
            .attr("x2", "0%").attr("y2", "100%");
        beakFlowGrad.append("stop").attr("offset", "0%").attr("stop-color", "#fffdf5").attr("stop-opacity", 0.95);
        beakFlowGrad.append("stop").attr("offset", "52%").attr("stop-color", "#f6efdd").attr("stop-opacity", 0.72);
        beakFlowGrad.append("stop").attr("offset", "100%").attr("stop-color", "#eadfbe").attr("stop-opacity", 0.22);
        const beakOverlayGrp = beakOverlaySvg.append("g").attr("class", "beak-overlay");
        const overlayMargin = { left: margin.left, right: margin.right, top: 4, bottom: 4 };

        function setBeakOverlayExpanded(expanded) {
            beakOverlaySvg.classed("overlay-expanded", !!expanded);
            beakOverlaySvg.attr("height", expanded ? overlayHeight : 0);
            if (!expanded) beakOverlayGrp.selectAll("*").remove();
        }

        function twoLineLabel(name) {
            const s = String(name || "").trim();
            if (s.length <= 10) return [s, ""];
            const i = s.lastIndexOf(" ", 10);
            const split = i > 0 ? i + 1 : 10;
            return [s.slice(0, split).trim(), s.slice(split).trim()];
        }

        function getRouteCodesForBird(englishName) {
            const target = String(englishName || "").trim().toLowerCase();
            if (!target) return [];
            const codesSet = new Set();
            allData.forEach(d => {
                const name = String(d["english name"] || d["English Name"] || "").trim().toLowerCase();
                if (name === target) {
                    const code = d["Migratory route codes"];
                    if (code != null) codesSet.add(code);
                }
            });
            return Array.from(codesSet);
        }

        function updateBeakOverlay() {
            beakOverlayGrp.selectAll("*").remove();
            if (selectedYearMonth.length === 0) return;

            const selectedDots = routeDotsData.filter(d =>
                selectedYearMonth.includes(d.yearMonth) &&
                selectedDirections.includes(d.direction) &&
                (!selectedCategory || d.category === selectedCategory) &&
                (selectedSeason === "All" || !d.season || d.season === selectedSeason) &&
                (d.englishName != null && d.englishName !== "")
            );

            const byEnglishName = d3.groups(selectedDots, d => d.englishName).sort((a, b) => a[0].localeCompare(b[0]));
            if (byEnglishName.length === 0) return;

            const binNames = byEnglishName.map(([name]) => name);
            const binScale = d3.scaleBand()
                .domain(binNames)
                .range([overlayMargin.left, streamWidth - overlayMargin.right])
                .padding(0.15);
            const binWidth = binScale.bandwidth();
            const labelY = overlayMargin.top + 8;
            const pileCenterY = overlayHeight - overlayMargin.bottom - 10;
            const flowY = pileCenterY - 2;

            // Soft visual flow from streamgraph lens selection into bird bins.
            if (currentLensSelection && currentLensSelection.length === 2) {
                const [sx0, sx1] = currentLensSelection;
                const srcMid = (sx0 + sx1) / 2;
                const srcSpread = Math.max(12, (sx1 - sx0) * 0.24);
                const flowG = beakOverlayGrp.append("g").attr("class", "beak-overlay-flow");
                const anchors = byEnglishName.map(([name], i) => {
                    const tx = (binScale(name) || 0) + binWidth / 2;
                    const rank = i - (byEnglishName.length - 1) / 2;
                    return { tx, rank };
                });
                anchors.forEach(a => {
                    const x0 = srcMid + a.rank * Math.min(14, srcSpread * 0.32);
                    const y0 = 1.5;
                    const x1 = a.tx;
                    const y1 = flowY;
                    const cx1 = x0 + (x1 - x0) * 0.25;
                    const cy1 = y0 + 10;
                    const cx2 = x0 + (x1 - x0) * 0.78;
                    const cy2 = y1 - 10;
                    flowG.append("path")
                        .attr("class", "beak-overlay-flow-path")
                        .attr("d", `M${x0},${y0} C${cx1},${cy1} ${cx2},${cy2} ${x1},${y1}`)
                        .attr("stroke-width", 4.6 + Math.min(2.8, binWidth * 0.04));
                });
            }

            function hoverRoutesForName(englishName) {
                const entry = byEnglishName.find(([name]) => name === englishName);
                if (!entry) return;
                const [, dotsForName] = entry;
                const routeCodes = Array.from(new Set(dotsForName.map(d => d.routeCode)));
                setLinkedRouteHover(routeCodes);
            }
            function clearHoverRoutes() {
                clearLinkedRouteHover();
            }

            function showDetailsForName(englishName) {
                // Prefer all routes for this bird across the dataset, not only current selection
                let routeCodes = getRouteCodesForBird(englishName);
                // Fallback: if nothing found globally, use codes from current selection
                if (!routeCodes.length) {
                    const entry = byEnglishName.find(([name]) => name === englishName);
                    if (!entry) return;
                    const [, dotsForName] = entry;
                    routeCodes = Array.from(new Set(dotsForName.map(d => d.routeCode)));
                }
                if (routeCodes.length === 0) return;
                showBirdRoutesList(englishName, routeCodes);
            }

            // Labels: transparent text, no background, sitting along the top; hover highlights routes
            byEnglishName.forEach(([englishName]) => {
                const x = binScale(englishName) + binWidth / 2;
                const lines = twoLineLabel(englishName);
                const g = beakOverlayGrp.append("g")
                    .attr("class", "beak-overlay-label-group")
                    .attr("data-name", englishName)
                    .attr("transform", `translate(${x},${labelY})`)
                    .on("mouseover", () => hoverRoutesForName(englishName))
                    .on("mouseleave", clearHoverRoutes)
                    .on("click", () => showDetailsForName(englishName));
                g.append("text")
                    .attr("class", "beak-overlay-label")
                    .attr("y", 0)
                    .attr("dy", "0.35em")
                    .text(lines[0]);
                if (lines[1]) {
                    g.append("text")
                        .attr("class", "beak-overlay-label beak-overlay-label-line2")
                        .attr("y", 8)
                        .attr("dy", "0.35em")
                        .text(lines[1]);
                }
            });

            const fallDuration = 1200;
            const fallEase = d3.easeCubicIn;

            // Falling copies of beaks: loose pile around each name, not a rigid bin; hover also highlights routes
            selectedDots.forEach((d, i) => {
                const binX = binScale(d.englishName) + binWidth / 2;
                const radiusX = binWidth * 0.3;
                const radiusY = 8;
                const jitterX = (Math.random() - 0.5) * 2 * radiusX;
                const jitterY = (Math.random() - 0.5) * 2 * radiusY;
                const targetX = binX + jitterX;
                const targetY = pileCenterY + jitterY;
                const startX = dotX(d);
                const startY = 0;

                const outer = beakOverlayGrp.append("g")
                    .attr("class", "beak-overlay-falling")
                    .attr("data-route", d.routeCode)
                    .attr("data-name", d.englishName)
                    .attr("transform", `translate(${startX},${startY})`)
                    .on("mouseover", () => hoverRoutesForName(d.englishName))
                    .on("mouseleave", clearHoverRoutes)
                    .on("click", () => showDetailsForName(d.englishName));
                outer.append("g").attr("transform", () => {
                    const n = (d.category || "").toString().toLowerCase();
                    const s = (n.includes("raptor") || n.includes("predator")) ? 1.05 : (n.includes("aerial") ? 1.75 : (n.includes("forest") || n.includes("ground")) ? 2.05 : 1.2);
                    return `scale(${s})`;
                }).each(function() { renderBeakSymbol(d3.select(this), d.category, { strokeWidth: 2.7 }); });
                outer.transition().delay(i * 35).duration(fallDuration).ease(fallEase).attr("transform", `translate(${targetX},${targetY})`);
            });
        }

        // MAP (ribbon view): optional geographic basemap + lat/lon axes + temporal ribbons
        const mapSVG = d3.select("#map");
        const birdMapSVG = d3.select("#map-bird");
        let birdMapAnimTimer = null;
        let currentBirdTimelineName = null;
        let currentBirdTimelineRouteCodes = [];
        const mapMargin = { top: 20, right: 20, bottom: 32, left: 40 };

        // Lon/lat scales based on allData
        const lonExtent = d3.extent(allData, d => +d.GPS_xx);
        const latExtent = d3.extent(allData, d => +d.GPS_yy);
        const padLon = (lonExtent[1] - lonExtent[0]) * 0.05 || 1;
        const padLat = (latExtent[1] - latExtent[0]) * 0.05 || 1;

        const lonScale = d3.scaleLinear()
            .domain([lonExtent[0] - padLon, lonExtent[1] + padLon])
            .range([mapMargin.left, mapWidth - mapMargin.right]);

        const latScale = d3.scaleLinear()
            .domain([latExtent[0] - padLat, latExtent[1] + padLat])
            .range([mapHeight - mapMargin.bottom, mapMargin.top]); // lat up

        // Helper so existing code that used a projection can still call this
        const mapProjection = ([lon, lat]) => [lonScale(lon), latScale(lat)];

        function getEnglishNameForRoute(routeCode) {
            const arr = dataByRoute[routeCode];
            if (arr && arr.length) return String(arr[0]["english name"] || arr[0]["English Name"] || "").trim();
            const r = allData.find(d => d["Migratory route codes"] === routeCode);
            return r ? String(r["english name"] || r["English Name"] || "").trim() : "";
        }

        function getRouteYearMonth(routeCode) {
            const meta = getRouteMeta(routeCode);
            if (meta && meta.yearMonth) return String(meta.yearMonth);
            const arr = dataByRoute[routeCode];
            if (arr && arr.length) {
                const y = arr[0]["Migration start year"];
                const m = arr[0]["Migration start month"];
                if (y != null && m != null) return `${y}-${("0" + m).slice(-2)}`;
            }
            return null;
        }

        function setLinkedYearHighlight(routeCodes) {
            const ymSet = new Set((routeCodes || []).map(getRouteYearMonth).filter(Boolean));
            xAxisG.selectAll(".tick")
                .classed("route-hover-year", function(d) {
                    return !!(d != null && ymSet.has(String(d)));
                });
            streamHoverYearG.selectAll("*").remove();
            ymSet.forEach(ym => {
                const xx = x(ym);
                if (!isFinite(xx)) return;
                streamHoverYearG.append("line")
                    .attr("x1", xx).attr("x2", xx)
                    .attr("y1", margin.top)
                    .attr("y2", streamHeight + margin.top)
                    .attr("stroke", "#9370db")
                    .attr("stroke-width", 1.7)
                    .attr("stroke-opacity", 0.85)
                    .attr("stroke-dasharray", "4 3");
            });
        }

        /** Reset map ribbon paths from hover/overlay styling (gradient URL, widths). Skips selected route. */
        function restoreMapRibbonHoverVisualIfNotSelected(routeGroupEl) {
            const sel = d3.select(routeGroupEl);
            if (sel.empty() || sel.classed("route-highlight")) return;
            const groupBase = +sel.attr("data-base-width") || 1.8;
            sel.attr("opacity", null);
            sel.selectAll("path.route-stroke").each(function() {
                const p = d3.select(this);
                const baseW = +p.attr("data-base-stroke-width") || +p.attr("stroke-width") || groupBase;
                const bs = p.attr("data-base-stroke");
                if (bs != null && bs !== "") p.attr("stroke", bs);
                p.attr("stroke-width", baseW);
            });
            sel.selectAll("path.route-fill").attr("stroke", "none").attr("stroke-width", null);
            sel.selectAll(".winter-mark").each(function() {
                const p = d3.select(this);
                const baseCol = p.attr("data-base-stroke");
                const baseW = +p.attr("data-base-stroke-width") || +p.attr("stroke-width") || 1;
                if (baseCol != null && baseCol !== "") p.attr("stroke", baseCol);
                p.attr("stroke-width", baseW);
            });
        }

        function restoreAllMapRibbonHoverVisuals() {
            mapSVG.selectAll("g.route-ribbon").each(function() {
                restoreMapRibbonHoverVisualIfNotSelected(this);
            });
        }

        function setLinkedRouteHover(routeCodes, opts) {
            opts = opts || {};
            const codes = Array.from(new Set((routeCodes || []).map(c => String(c))));
            if (!codes.length) {
                clearLinkedRouteHover();
                return;
            }
            // Drop stale inline hover strokes before re-applying overlay (covers paths that never got mouseleave).
            restoreAllMapRibbonHoverVisuals();
            linkedHoverRouteSet = new Set(codes);

            const routeSelector = codes.map(c => `[data-route="${c}"]`).join(",");
            mapSVG.selectAll(".route-overlay-highlight").classed("route-overlay-highlight", false);
            if (routeSelector) {
                if (!opts.skipMapPurpleOverlay) {
                    mapSVG.selectAll(routeSelector).classed("route-overlay-highlight", true);
                }
                // Keep hovered routes on top in map and mini-lens <use>.
                mapSVG.selectAll(routeSelector).each(function() { d3.select(this).raise(); });
            }
            setLinkedYearHighlight(codes);

            const dots = svg.selectAll(".route-dot");
            dots.classed("route-hover-linked", d => linkedHoverRouteSet && linkedHoverRouteSet.has(String(d.routeCode)));
            dots.classed("route-dim-linked", d => linkedHoverRouteSet && !linkedHoverRouteSet.has(String(d.routeCode)));

            const untangled = d3.select("#details-declutter-svg");
            untangled.selectAll(".loupe-unbundle-route")
                .classed("route-hover-linked", function() {
                    const c = this.getAttribute("data-route");
                    return !!(linkedHoverRouteSet && c && linkedHoverRouteSet.has(String(c)));
                })
                .classed("route-dim-linked", function() {
                    const c = this.getAttribute("data-route");
                    return !!(linkedHoverRouteSet && c && !linkedHoverRouteSet.has(String(c)));
                });

            const names = new Set(codes.map(getEnglishNameForRoute).filter(Boolean));
            const overlay = d3.select("#beak-overlay");
            overlay.selectAll(".beak-overlay-falling")
                .classed("route-hover-linked", function() {
                    const c = this.getAttribute("data-route");
                    return !!(linkedHoverRouteSet && c && linkedHoverRouteSet.has(String(c)));
                })
                .classed("route-dim-linked", function() {
                    const c = this.getAttribute("data-route");
                    return !!(linkedHoverRouteSet && c && !linkedHoverRouteSet.has(String(c)));
                });
            overlay.selectAll(".beak-overlay-label-group")
                .classed("route-hover-linked", function() {
                    const n = this.getAttribute("data-name");
                    return !!(n && names.has(n));
                })
                .classed("route-dim-linked", function() {
                    const n = this.getAttribute("data-name");
                    return !!(n && !names.has(n));
                });
        }

        function clearLinkedRouteHover() {
            linkedHoverRouteSet = null;
            miniLensHoverRouteCode = null;
            mapSVG.selectAll("g.route-ribbon.route-lens-hover").attr("transform", null);
            mapSVG.selectAll("g.route-ribbon").classed("route-lens-hover", false);
            mapSVG.selectAll(".route-overlay-highlight").classed("route-overlay-highlight", false);
            restoreAllMapRibbonHoverVisuals();
            svg.selectAll(".route-dot").classed("route-hover-linked", false).classed("route-dim-linked", false);
            setLinkedYearHighlight([]);
            d3.select("#details-declutter-svg").selectAll(".loupe-unbundle-route")
                .classed("route-hover-linked", false).classed("route-dim-linked", false);
            const overlay = d3.select("#beak-overlay");
            overlay.selectAll(".beak-overlay-falling")
                .classed("route-hover-linked", false).classed("route-dim-linked", false);
            overlay.selectAll(".beak-overlay-label-group")
                .classed("route-hover-linked", false).classed("route-dim-linked", false);
        }

        function updateSelectedRouteInStreamgraph(routeCode) {
            selectedRouteCodeGlobal = routeCode != null ? String(routeCode) : null;
            svg.selectAll(".route-dot").each(function(d) {
                const sel = d3.select(this);
                const isSelected = !!(selectedRouteCodeGlobal && d && String(d.routeCode) === selectedRouteCodeGlobal);
                sel.classed("route-selected-linked", isSelected);

                // Keep selected route visually dominant in the streamgraph.
                const name = ((d && d.category) || "").toString().toLowerCase();
                const baseScale = (name.includes("raptor") || name.includes("predator")) ? 0.92 : (name.includes("aerial") ? 1.55 : (name.includes("forest") || name.includes("ground")) ? 1.9 : 1.35);
                const scale = isSelected ? baseScale * 1.28 : baseScale;
                if (d) sel.attr("transform", `translate(${dotX(d)},${dotY(d)}) scale(${scale})`);
                if (isSelected) sel.raise();
            });
        }

        // Simple tab switching between main lat/long view and per-bird animation view.
        function setMapTab(tab) {
            const mainPanel = document.getElementById("map-main-panel");
            const birdPanel = document.getElementById("map-bird-panel");
            if (!mainPanel || !birdPanel) return;
            const tabs = document.querySelectorAll(".map-tab");
            tabs.forEach(btn => {
                const t = btn.getAttribute("data-map-tab");
                btn.classList.toggle("map-tab-active", t === tab);
            });
            if (tab === "bird") {
                mainPanel.style.display = "none";
                birdPanel.style.display = "";
                if (typeof clearLatLongLoupe === "function") clearLatLongLoupe();
            } else {
                mainPanel.style.display = "";
                birdPanel.style.display = "none";
            }
        }

        function isBirdTabActive() {
            const birdPanel = document.getElementById("map-bird-panel");
            return !!(birdPanel && birdPanel.style.display !== "none");
        }

        function setDetailsTab(tab) {
            const routePane = document.getElementById("details-route-pane");
            const declutterPane = document.getElementById("details-declutter-pane");
            if (!routePane || !declutterPane) return;
            activeDetailsTab = (tab === "declutter") ? "declutter" : "route";
            routePane.style.display = activeDetailsTab === "route" ? "" : "none";
            declutterPane.style.display = activeDetailsTab === "declutter" ? "" : "none";
            document.querySelectorAll(".details-tab").forEach(btn => {
                const t = btn.getAttribute("data-details-tab");
                btn.classList.toggle("details-tab-active", t === activeDetailsTab);
            });
            if (activeDetailsTab === "declutter") renderDetailsDeclutterView();
        }

        document.querySelectorAll(".details-tab").forEach(btn => {
            btn.addEventListener("click", () => {
                const tab = btn.getAttribute("data-details-tab");
                setDetailsTab(tab || "route");
            });
        });

        // Static copy of the season-route-pattern legend for the bird timeline tab.
        function drawSeasonPatternLegendStatic(targetSvg, seasonLegX, seasonLegY0) {
            const seasonLeg = targetSvg.append("g").attr("class", "season-legend bird-season-legend");
            seasonLeg.append("text")
                .attr("class", "season-legend-title")
                .attr("x", seasonLegX)
                .attr("y", seasonLegY0)
                .text("Season (route pattern)");
            const seasons = [
                { label: "All", icon: "all" },
                { label: "Spring", icon: "needle" },
                { label: "Summer", icon: "hollow" },
                { label: "Autumn", icon: "wavy" },
                { label: "Winter", icon: "stipple" }
            ];
            const rowH = 14;
            const iconW = 36;
            seasons.forEach((s, i) => {
                const y = seasonLegY0 + 14 + i * rowH + 7;
                const g = seasonLeg.append("g")
                    .attr("class", "season-legend-item")
                    .attr("transform", `translate(${seasonLegX},${y})`);
                g.append("rect")
                    .attr("x", -4).attr("y", -7)
                    .attr("width", iconW + 8).attr("height", 14)
                    .attr("fill", "transparent")
                    .attr("stroke", "none")
                    .attr("stroke-width", 0)
                    .attr("rx", 4).attr("ry", 4);
                if (s.icon === "all") {
                    g.append("rect")
                        .attr("x", 0).attr("y", -3)
                        .attr("width", iconW).attr("height", 6)
                        .attr("fill", "#999")
                        .attr("rx", 3).attr("ry", 3)
                        .attr("opacity", 0.85);
                } else if (s.icon === "needle") {
                    g.append("line")
                        .attr("x1", 0).attr("y1", 0).attr("x2", iconW).attr("y2", 0)
                        .attr("stroke", "#555")
                        .attr("stroke-width", 1.05)
                        .attr("stroke-linecap", "round");
                    const sx = [7, 16, 25, 34];
                    sx.forEach((x) => {
                        const tipX = x, tipY = 0;
                        const leg = 4.2, spread = 2.6;
                        g.append("path")
                            .attr("d", `M${tipX - leg},${tipY + spread} L${tipX},${tipY} L${tipX - leg},${tipY - spread}`)
                            .attr("fill", "none")
                            .attr("stroke", "#555")
                            .attr("stroke-width", 1.0)
                            .attr("stroke-linecap", "round")
                            .attr("stroke-linejoin", "round");
                    });
                } else if (s.icon === "hollow") {
                    const wormY = 0;
                    g.append("line")
                        .attr("x1", 0).attr("y1", wormY).attr("x2", iconW).attr("y2", wormY)
                        .attr("stroke", "#777").attr("stroke-width", 4)
                        .attr("stroke-linecap", "round");
                    g.append("line")
                        .attr("x1", 0).attr("y1", wormY).attr("x2", iconW).attr("y2", wormY)
                        .attr("stroke", "#fff").attr("stroke-width", 2.4)
                        .attr("stroke-linecap", "round")
                        .attr("opacity", 0.9);
                    const tickHalf = 3.2;
                    [6, 12, 18, 24, 30].forEach((tx, k) => {
                        const tilt = (k % 2 === 0) ? -0.6 : 0.6;
                        g.append("line")
                            .attr("x1", tx - tilt).attr("y1", wormY - tickHalf)
                            .attr("x2", tx + tilt).attr("y2", wormY + tickHalf)
                            .attr("stroke", "#666").attr("stroke-width", 1.05)
                            .attr("stroke-linecap", "round")
                            .attr("opacity", 0.95);
                    });
                } else if (s.icon === "wavy") {
                    const w = iconW;
                    const amp = 3;
                    const mid = 0;
                    const steps = 8;
                    const topPts = [];
                    const botPts = [];
                    for (let k = 0; k <= steps; k++) {
                        const t = k / steps;
                        const x = t * w;
                        const phase = t * Math.PI * 2;
                        const yCore = mid + Math.sin(phase) * (k === Math.floor(steps / 2) ? amp : amp * 0.6);
                        const halfThick = 1.4 + 0.4 * Math.sin(phase * 2);
                        topPts.push([x, yCore - halfThick]);
                        botPts.push([x, yCore + halfThick]);
                    }
                    const pts = topPts.concat(botPts.reverse());
                    const dRibbon = "M" + pts.map(([x, y]) => `${x},${y}`).join("L") + "Z";
                    g.append("path")
                        .attr("d", dRibbon)
                        .attr("fill", "#666")
                        .attr("stroke", "#444")
                        .attr("stroke-width", 0.7);
                } else {
                    const pts = [[6, 0], [14, 0], [22, 0], [30, 0], [36, 0]];
                    for (let i = 0; i < pts.length - 1; i++) {
                        const [x0, y0] = pts[i];
                        const [x1, y1] = pts[i + 1];
                        const mx = (x0 + x1) / 2;
                        const my = (y0 + y1) / 2;
                        const side = (i % 2 === 0) ? 1 : -1;
                        const depth = 3.8;
                        const dLoop = `M${x0},${y0} Q${mx},${my + side * depth} ${x1},${y1} Q${mx},${my - side * (depth * 0.55)} ${x0},${y0} Z`;
                        g.append("path")
                            .attr("d", dLoop)
                            .attr("fill", "none")
                            .attr("stroke", "#666")
                            .attr("stroke-width", 1.0)
                            .attr("stroke-linecap", "round")
                            .attr("stroke-linejoin", "round");
                    }
                }
                seasonLeg.append("text")
                    .attr("class", "season-legend-label")
                    .attr("x", seasonLegX + iconW + 6)
                    .attr("y", y + 1)
                    .attr("dominant-baseline", "middle")
                    .text(s.label);
            });
        }

        function getBirdWaypoints(englishName) {
            const nameLC = String(englishName || "").trim().toLowerCase();
            if (!nameLC) return [];
            const order = { "Origin": 1, "Transit locations": 2, "Destination": 3 };
            const rows = allData.filter(d => {
                const nm = String(d["english name"] || d["English Name"] || "").trim().toLowerCase();
                return nm === nameLC && d.GPS_xx != null && d.GPS_yy != null;
            });
            const byRoute = d3.groups(rows, d => d["Migratory route codes"]);
            const seen = new Set();
            const waypoints = [];
            byRoute.forEach(([, arr]) => {
                const sorted = arr.slice().sort((a, b) => {
                    const o = (order[(a["Migration nodes"] || "").trim()] || 2) - (order[(b["Migration nodes"] || "").trim()] || 2);
                    if (o !== 0) return o;
                    return (a["Migration start year"] || 0) * 100 + (a["Migration start month"] || 0) -
                        (b["Migration start year"] || 0) * 100 - (b["Migration start month"] || 0);
                });
                sorted.forEach(d => {
                    const lat = +d.GPS_yy, lon = +d.GPS_xx, year = d["Migration start year"], month = d["Migration start month"];
                    const k = tempCacheKey(lat, lon, year, month);
                    if (!k || seen.has(k)) return;
                    seen.add(k);
                    waypoints.push({ lat, lon, year, month });
                });
            });
            return waypoints;
        }

        document.querySelectorAll(".map-tab").forEach(btn => {
            btn.addEventListener("click", () => {
                const tab = btn.getAttribute("data-map-tab");
                setMapTab(tab || "main");
            });
        });

        // Animate all routes for a given bird in the bird map tab with a
        // shooting-star-like dot moving along each route with a fading trail.
        function showBirdRoutesOnMap(englishName, routeCodes) {
            // Switch tab
            setMapTab("bird");
            currentBirdTimelineName = englishName;
            currentBirdTimelineRouteCodes = Array.isArray(routeCodes) ? routeCodes.slice() : [];

            // Stop any previous animation
            if (birdMapAnimTimer) {
                birdMapAnimTimer.stop();
                birdMapAnimTimer = null;
            }

            // Clear bird map contents
            birdMapSVG.selectAll("*").remove();

            // Background: simple lon/lat axes and grid, reusing main map scales
            const birdLayer = birdMapSVG.append("g").attr("class", "bird-map-layer");
            birdLayer.append("g")
                .attr("class", "x-axis-bird")
                .attr("transform", `translate(0,${mapHeight - mapMargin.bottom})`)
                .call(d3.axisBottom(lonScale).ticks(6).tickFormat(d => `${d}°`));
            birdLayer.append("g")
                .attr("class", "y-axis-bird")
                .attr("transform", `translate(${mapMargin.left},0)`)
                .call(d3.axisLeft(latScale).ticks(5).tickFormat(d => `${d}°`));

            // Optional geographic basemap for bird tab (same toggle as main map)
            const birdGeoLayer = birdMapSVG.append("g").attr("class", "bird-geo-layer");
            if (showGeographicMap && world && world.features) {
                const proj = d3.geoTransform({
                    point: function(lon, lat) {
                        const p = mapProjection([lon, lat]);
                        this.stream.point(p[0], p[1]);
                    }
                });
                const geoPathBird = d3.geoPath(proj);
                birdGeoLayer.selectAll("path")
                    .data(world.features)
                    .enter()
                    .append("path")
                    .attr("d", geoPathBird)
                    .attr("fill", "#f5f5f5")
                    .attr("stroke", "#c9c9c9")
                    .attr("stroke-width", 0.5)
                    .attr("opacity", 0.9);
            }

            // Filter all rows for this bird across all routes/years (ignore current streamgraph filters)
            const nameLC = String(englishName || "").trim().toLowerCase();
            const birdRows = allData.filter(d => {
                const nm = String(d["english name"] || d["English Name"] || "").trim().toLowerCase();
                if (!nm || nm !== nameLC) return false;
                return d.GPS_xx != null && d.GPS_yy != null;
            });
            if (!birdRows.length) return;

            const order = { "Origin": 1, "Transit locations": 2, "Destination": 3 };
            const groupedByRoute = d3.groups(birdRows, d => d["Migratory route codes"]);

            // Build per-route polyline with time ordering + route time span
            const routes = groupedByRoute.map(([code, arr]) => {
                const sorted = arr.slice().sort((a, b) => {
                    const o = (order[(a["Migration nodes"] || "").trim()] || 2) - (order[(b["Migration nodes"] || "").trim()] || 2);
                    if (o !== 0) return o;
                    return (a["Migration start year"] || 0) * 100 + (a["Migration start month"] || 0) -
                           (b["Migration start year"] || 0) * 100 - (b["Migration start month"] || 0);
                });
                const coords = sorted.map(d => mapProjection([+d.GPS_xx, +d.GPS_yy]));
                const colorVal = color(sorted[0]["Bird Category"] || sorted[0]["bird families"] || sorted[0]["english name"]);
                const ymVals = Array.from(new Set(sorted.map(r => {
                    const y = +r["Migration start year"] || 0;
                    const m = +r["Migration start month"] || 0;
                    return (y && m) ? (y * 100 + m) : null;
                }).filter(v => v != null))).sort((a, b) => a - b);
                const minYM = ymVals.length ? ymVals[0] : null;
                const maxYM = ymVals.length ? ymVals[ymVals.length - 1] : null;
                const meta = getRouteMeta(code);
                const season = meta ? meta.season : monthToSeason(sorted[0]["Migration start month"]);
                const direction = routeDirection[code] || "West to East";
                return { code, coords, color: colorVal, ymVals, minYM, maxYM, season, direction };
            }).filter(r => r.coords.length > 1);
            if (!routes.length) return;

            // Optional temperature blotches for bird tab (same toggle as main map)
            const birdTempLayer = birdMapSVG.append("g")
                .attr("class", "bird-city-temp-layer")
                .attr("opacity", temperatureLayerOpacity);
            if (temperatureLayerEnabled && temperatureDataLoaded) {
                const seenTemp = new Set();
                birdRows.forEach(d => {
                    const lat = +d.GPS_yy, lon = +d.GPS_xx, year = d["Migration start year"], month = d["Migration start month"];
                    const k = tempCacheKey(lat, lon, year, month);
                    if (!k || seenTemp.has(k)) return;
                    seenTemp.add(k);
                    const temp = getTemperatureByCoords(lat, lon, year, month);
                    if (temp == null || !isFinite(+temp)) return;
                    const [x, y] = mapProjection([lon, lat]);
                    const fill = tempColorScale(+temp);
                    drawVanGoghBlotch(birdTempLayer, x, y, fill);
                });
            }

            const lineGen = d3.line().curve(d3.curveCatmullRom.alpha(0.6));
            const birdDefs = birdMapSVG.append("defs");

            function getRouteSeason(routeCode) {
                const meta = getRouteMeta(routeCode);
                return meta ? meta.season : null;
            }

            function applyDirectionStroke(selection, routeCode) {
                const directionKey = (routeDirection[routeCode] || "West to East").toLowerCase();
                let dash = null;
                switch (directionKey) {
                    case "east to west":
                        dash = "4,6";
                        break;
                    case "north to south":
                        dash = "2,4";
                        break;
                    case "south to north":
                        dash = "8,3,2,3";
                        break;
                    default:
                        dash = null;
                }
                if (dash) selection.attr("stroke-dasharray", dash);
                else selection.attr("stroke-dasharray", null);
            }

            let selectedBirdRouteCode = null;
            let lastAutoDetailsRouteCode = null;

            function buildBirdRouteVisual(r, idx) {
                const seasonKey = (r.season || "").toLowerCase();
                const colorVal = r.color;
                const pathD = lineGen(r.coords);
                const g = birdMapSVG.append("g")
                    .attr("class", "bird-route-group")
                    .attr("data-route", r.code)
