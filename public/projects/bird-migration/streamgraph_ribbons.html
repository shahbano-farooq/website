                    const waveAmp = 0.36;
                    const pts = [];
                    for (let i = 0; i <= numSamples; i++) {
                        const t = i / numSamples;
                        const len = t * totalLen;
                        const p = measureNode.getPointAtLength(len);
                        const p2 = measureNode.getPointAtLength(Math.min(totalLen, len + 2));
                        let dx = p2.x - p.x, dy = p2.y - p.y;
                        const mag = Math.hypot(dx, dy) || 1;
                        dx /= mag; dy /= mag;
                        const perpX = -dy, perpY = dx;
                        const wave = 1 + waveAmp * Math.sin(t * Math.PI * freq);
                        const halfW = (solidStrokeWidth * 0.62 / 2) * wave;
                        pts.push([p.x + perpX * halfW, p.y + perpY * halfW]);
                        pts.unshift([p.x - perpX * halfW, p.y - perpY * halfW]);
                    }
                    const polygonD = "M" + pts.map(([x, y]) => `${x},${y}`).join("L") + "Z";
                    solidPath.attr("stroke-opacity", 0).style("pointer-events", onRouteClick ? "all" : "none");
                    routesG.append("path")
                        .attr("class", "loupe-unbundle-route route-fill")
                        .attr("data-route", r.routeCode)
                        .attr("d", polygonD)
                        .attr("fill", col)
                        .attr("fill-opacity", 0.92)
                        .attr("stroke", "none")
                        .style("pointer-events", "none");
                } else if (seasonKey === "winter" && measureNode && totalLen > 1) {
                    solidPath.attr("stroke-opacity", 0.22).attr("stroke-dasharray", "1.8 2.8");
                    const loopSpacing = 8.8;
                    const loopCount = Math.max(12, Math.floor(totalLen / loopSpacing));
                    const anchors = [];
                    for (let i = 0; i <= loopCount; i++) {
                        const len = (i / loopCount) * totalLen;
                        const p = measureNode.getPointAtLength(len);
                        anchors.push([p.x, p.y]);
                    }
                    for (let i = 0; i < anchors.length - 1; i++) {
                        const [xA, yA] = anchors[i];
                        const [xB, yB] = anchors[i + 1];
                        let dx = xB - xA, dy = yB - yA;
                        const mag = Math.hypot(dx, dy) || 1;
                        dx /= mag; dy /= mag;
                        const perpX = -dy, perpY = dx;
                        const side = (i % 2 === 0) ? 1 : -1;
                        const depth = 3.9;
                        const mx = (xA + xB) / 2;
                        const my = (yA + yB) / 2;
                        const cOutX = mx + perpX * side * depth;
                        const cOutY = my + perpY * side * depth;
                        const cInX = mx - perpX * side * (depth * 0.55);
                        const cInY = my - perpY * side * (depth * 0.55);
                        const dLoop = `M${xA},${yA} Q${cOutX},${cOutY} ${xB},${yB} Q${cInX},${cInY} ${xA},${yA} Z`;
                        routesG.append("path")
                            .attr("class", "loupe-unbundle-route winter-mark")
                            .attr("data-route", r.routeCode)
                            .attr("d", dLoop)
                            .attr("fill", "none")
                            .attr("stroke", col)
                            .attr("stroke-width", 1.28)
                            .attr("stroke-linecap", "round")
                            .attr("stroke-linejoin", "round")
                            .style("pointer-events", "none");
                    }
                    fadedPath.attr("stroke-dasharray", "1.4 3.6");
                }

                solidMeasure.remove();

                latLongLoupeChordPickData.push({
                    routeCode: r.routeCode,
                    coords: curve.map(p => [p.x, p.y])
                });
            });

            if (showCaption) {
                root.append("text")
                    .attr("class", "loupe-unbundle-caption")
                    .attr("x", st.x + st.width / 2)
                    .attr("y", st.y + st.height - 2)
                    .attr("text-anchor", "middle")
                    .text("Left: source countries · Right: destination countries · faded tail = remaining route");
            }
        }

        function loupePickRouteCodeAtFixedChord(mx, my) {
            const pickR = 18;
            let best = null, bestD = pickR;
            latLongLoupeChordPickData.forEach(({ routeCode, coords }) => {
                for (let i = 0; i < coords.length - 1; i++) {
                    const d = loupeDistPointToSeg(mx, my, coords[i][0], coords[i][1], coords[i + 1][0], coords[i + 1][1]);
                    if (d < bestD) {
                        bestD = d;
                        best = routeCode;
                    }
                }
            });
            return best;
        }

        function renderDetailsDeclutterView() {
            const svgEl = document.getElementById("details-declutter-svg");
            if (!svgEl) return;
            const w = Math.max(240, svgEl.clientWidth || 280);
            const h = Math.max(280, svgEl.clientHeight || 420);
            const svg = d3.select(svgEl);
            svg.selectAll("*").remove();
            svg.attr("viewBox", `0 0 ${w} ${h}`);
            svg.append("rect")
                .attr("x", 0).attr("y", 0).attr("width", w).attr("height", h)
                .attr("fill", "#fbfcff");

            if (latLongLoupeLassoDrawing && !latLongLensPlaced) {
                svg.append("text")
                    .attr("x", w / 2)
                    .attr("y", h / 2 - 6)
                    .attr("text-anchor", "middle")
                    .attr("fill", "#6d778a")
                    .attr("font-size", 12)
                    .text("Draw a closed region on the map, then release near the start.");
                return;
            }
            if (!latLongLensPlaced || !latLongLensPlaced.mini) {
                svg.append("text")
                    .attr("x", w / 2)
                    .attr("y", h / 2 - 10)
                    .attr("text-anchor", "middle")
                    .attr("fill", "#6d778a")
                    .attr("font-size", 12)
                    .text("Enable the lat/long magnifier");
                svg.append("text")
                    .attr("x", w / 2)
                    .attr("y", h / 2 + 8)
                    .attr("text-anchor", "middle")
                    .attr("fill", "#6d778a")
                    .attr("font-size", 12)
                    .text("to see untangled routes.");
                return;
            }

            const pad = 10;
            const st = { x: pad, y: pad, width: w - pad * 2, height: h - pad * 2 };
            const wrap = svg.append("g").attr("class", "details-declutter-wrap");
            wrap.append("rect")
                .attr("x", st.x).attr("y", st.y)

                .attr("fill", "#f8faff")
